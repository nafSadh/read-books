<html lang="bn" data-theme="sepia">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>বেদ সংহিতা — Vedas Full-Bleed Reader</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Jost:wght@300;400;500&family=IBM+Plex+Mono:wght@400;500&family=Noto+Serif+Bengali:wght@400;500;600;700&family=Noto+Serif+Devanagari:wght@400;500;600;700&family=Tiro+Bangla:ital@0;1&display=swap" rel="stylesheet">
<style>
/* ===== RESET & BASE ===== */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100vw; height: 100vh; overflow: hidden; }
body {
  font-family: 'Noto Serif Bengali', serif;
  font-size: 17px; line-height: 1.65;
  background: var(--bg-right);
}

:root {
  --font-bengali: 'Noto Serif Bengali', 'Tiro Bangla', serif;
  --font-devanagari: 'Noto Serif Devanagari', serif;
  --font-serif: 'EB Garamond', Georgia, serif;
  --font-sans: 'Jost', -apple-system, sans-serif;
  --font-mono: 'IBM Plex Mono', monospace;
}

/* ===== THEMES ===== */
html[data-theme="sepia"] {
  --bg-left: #ede5d0; --bg-right: #f5efe0;
  --text: #3a2e1e; --text-muted: #7a6a52;
  --spine: #c8b898; --shadow-left: rgba(0,0,0,0.06); --shadow-right: rgba(0,0,0,0.04);
  --accent: #b45309; --border: #c8b898;
  --control-bg: rgba(245,239,224,0.92); --control-border: rgba(0,0,0,0.08);
  --ch-title: #3a2e1e;
}
html[data-theme="light-purple"] {
  --bg-left: #f0ece4; --bg-right: #f6f4f0;
  --text: #1e2a3a; --text-muted: #6a7a8a;
  --spine: #d0d4da; --shadow-left: rgba(0,0,0,0.06); --shadow-right: rgba(0,0,0,0.04);
  --accent: #7c3aed; --border: #d0d4da;
  --control-bg: rgba(240,236,228,0.92); --control-border: rgba(0,0,0,0.08);
  --ch-title: #2a1a4a;
}
html[data-theme="light-azure"] {
  --bg-left: #eaf2f8; --bg-right: #f0f6fb;
  --text: #1e2a3a; --text-muted: #6a7a8a;
  --spine: #c8d8e8; --shadow-left: rgba(0,0,0,0.06); --shadow-right: rgba(0,0,0,0.04);
  --accent: #2a7ab8; --border: #c8d8e8;
  --control-bg: rgba(234,242,248,0.92); --control-border: rgba(0,0,0,0.08);
  --ch-title: #0a2a4a;
}
html[data-theme="dark-violet"] {
  --bg-left: #181818; --bg-right: #1a1a1a;
  --text: #dce0ec; --text-muted: #8490aa;
  --spine: #333; --shadow-left: rgba(0,0,0,0.3); --shadow-right: rgba(0,0,0,0.2);
  --accent: #9b7aed; --border: #333;
  --control-bg: rgba(26,26,26,0.95); --control-border: rgba(255,255,255,0.08);
  --ch-title: #dce0ec;
}
html[data-theme="dark-blue"] {
  --bg-left: #0c1018; --bg-right: #10141e;
  --text: #9aa8b8; --text-muted: #4a5a6a;
  --spine: #1a2838; --shadow-left: rgba(0,0,0,0.3); --shadow-right: rgba(0,0,0,0.2);
  --accent: #4a8acc; --border: #1a2838;
  --control-bg: rgba(12,16,24,0.92); --control-border: rgba(26,40,56,0.5);
  --ch-title: #88b0d8;
}

/* ===== BOOK SPREAD ===== */
#book {
  width: 100vw; height: 100vh;
  display: flex; position: relative;
  perspective: 1800px;
  user-select: none; -webkit-user-select: none;
}
.page-half {
  width: 50%; height: 100%;
  position: relative; overflow: hidden;
  user-select: none; -webkit-user-select: none;
}
#left-half { background: var(--bg-left); }
#right-half { background: var(--bg-right); }

#book::after {
  content: ''; position: absolute;
  top: 0; bottom: 0; left: 50%;
  width: 1px; background: var(--spine);
  z-index: 5; pointer-events: none;
}
#left-half::after {
  content: ''; position: absolute;
  top: 0; right: 0; width: 40px; height: 100%;
  background: linear-gradient(to left, var(--shadow-left), transparent);
  pointer-events: none; z-index: 2;
}
#right-half::before {
  content: ''; position: absolute;
  top: 0; left: 0; width: 40px; height: 100%;
  background: linear-gradient(to right, var(--shadow-right), transparent);
  pointer-events: none; z-index: 2;
}

/* ===== PAGE CONTENT ===== */
.page-content {
  width: 100%; height: 100%;
  display: flex; flex-direction: column;
  align-items: center; justify-content: flex-start;
  padding: 48px 40px 60px;
  color: var(--text); position: relative;
  overflow-y: auto;
}
.page-inner {
  max-width: 520px; width: 100%; flex: 1;
  overflow: hidden;
}
.page-number {
  position: absolute; bottom: 24px;
  font-family: var(--font-sans);
  font-size: 13px; color: var(--accent);
  opacity: 0.35; letter-spacing: 0.5px;
}
#left-half .page-number { left: 40px; }
#right-half .page-number { right: 40px; }

/* ===== COVER ===== */
#cover-spread {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  flex-direction: column;
  background: var(--bg-right);
  color: var(--text); z-index: 10;
  text-align: center;
}
#cover-spread .cover-title {
  font-family: var(--font-bengali);
  font-size: 44px; font-weight: 700;
  line-height: 1.2; margin-bottom: 8px;
  color: var(--ch-title);
}
#cover-spread .cover-subtitle {
  font-family: var(--font-serif);
  font-size: 24px; font-weight: 400;
  font-style: italic; color: var(--accent);
  margin-bottom: 16px;
}
#cover-spread .cover-author {
  font-family: var(--font-sans);
  font-size: 14px; font-weight: 300;
  letter-spacing: 4px; text-transform: uppercase;
  color: var(--text-muted); margin-bottom: 40px;
}
#cover-spread .cover-ornament {
  font-size: 24px; letter-spacing: 12px;
  color: var(--accent); opacity: 0.35;
  margin-bottom: 40px;
}
#cover-spread .cover-hint {
  font-family: var(--font-sans);
  font-size: 13px; color: var(--text-muted);
  letter-spacing: 1px;
}

/* ===== SUKTA HEADER (in page) ===== */
.sukta-spread-header {
  text-align: center; padding: 20px 0 16px;
}
.sukta-spread-header .mandala-label {
  font-family: var(--font-sans);
  font-size: 10px; letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--accent); opacity: 0.6;
  margin-bottom: 8px;
}
.sukta-spread-header .sukta-title-bn {
  font-family: var(--font-bengali);
  font-size: 26px; font-weight: 600;
  line-height: 1.3; margin-bottom: 4px;
  color: var(--ch-title);
}
.sukta-spread-header .sukta-title-en {
  font-family: var(--font-serif);
  font-size: 18px; font-style: italic;
  color: var(--accent); margin-bottom: 12px;
}
.sukta-spread-header .ornament {
  display: block; text-align: center;
  color: var(--accent); opacity: 0.35;
  font-size: 18px; letter-spacing: 8px;
}
.sukta-spread-header .sukta-meta {
  font-family: var(--font-bengali);
  font-size: 11px; color: var(--text-muted);
  margin-top: 12px; line-height: 1.7;
}
.sukta-spread-header .meta-label {
  font-family: var(--font-sans);
  font-size: 8px; text-transform: uppercase;
  letter-spacing: 1px; color: var(--accent);
  font-weight: 600;
}

/* ===== MANTRA IN SPREAD ===== */
.mantra-page .mantra-num {
  font-family: var(--font-mono);
  font-size: 10px; color: var(--accent);
  opacity: 0.6; margin-bottom: 12px;
}
.mantra-page .sa-bengali {
  font-family: var(--font-bengali);
  font-size: 1.15em; line-height: 2;
  font-weight: 500; color: var(--text);
  white-space: pre-line; margin-bottom: 10px;
}
.mantra-page .sa-devanagari {
  font-family: var(--font-devanagari);
  font-size: 0.92em; line-height: 1.8;
  color: var(--text-muted);
  white-space: pre-line; margin-bottom: 10px;
  padding-top: 8px;
  border-top: 1px dashed var(--border);
}
.mantra-page .sa-iast {
  font-family: var(--font-mono);
  font-size: 0.75em; line-height: 1.7;
  color: var(--text-muted);
  white-space: pre-line;
  letter-spacing: 0.3px;
}

.meaning-page .meaning-label {
  font-family: var(--font-sans);
  font-size: 9px; letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--accent); font-weight: 600;
  margin-bottom: 8px; margin-top: 16px;
}
.meaning-page .meaning-label:first-child { margin-top: 0; }
.meaning-page .meaning-bn {
  font-family: var(--font-bengali);
  font-size: 0.95em; line-height: 1.85;
  color: var(--text); margin-bottom: 16px;
}
.meaning-page .meaning-en {
  font-family: var(--font-serif);
  font-size: 0.9em; line-height: 1.8;
  color: var(--text-muted);
  font-style: italic;
}
.meaning-page .sukta-note {
  font-family: var(--font-bengali);
  font-size: 0.85em; line-height: 1.7;
  color: var(--text-muted);
  margin-top: 16px; padding-top: 12px;
  border-top: 1px dashed var(--border);
  font-style: italic;
}

/* ===== TITLE PAGE ===== */
.title-page {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  height: 100%; text-align: center;
}
.title-page h1 {
  font-family: var(--font-bengali);
  font-size: 36px; font-weight: 700;
  line-height: 1.3; margin-bottom: 8px;
}
.title-page .subtitle {
  font-family: var(--font-serif);
  font-size: 22px; font-style: italic;
  color: var(--accent); margin-bottom: 32px;
}
.title-page .pub-ornament {
  font-size: 20px; letter-spacing: 10px;
  color: var(--text-muted); margin-bottom: 32px;
}
.title-page .pub-info {
  font-family: var(--font-sans);
  font-size: 12px; color: var(--text-muted);
  letter-spacing: 2px; text-transform: uppercase;
}

/* ===== TOC ===== */
.toc-page { padding-top: 20px; }
.toc-page h2 {
  text-align: center; font-size: 22px;
  font-weight: 600; margin-bottom: 24px;
  letter-spacing: 1px; color: var(--ch-title);
  font-family: var(--font-bengali);
}
.toc-page .toc-list { list-style: none; }
.toc-page .toc-list li {
  display: flex; justify-content: space-between;
  align-items: baseline; padding: 8px 0;
  border-bottom: 1px dotted var(--spine);
  cursor: pointer; transition: color 0.2s;
  font-family: var(--font-bengali);
  font-size: 15px;
}
.toc-page .toc-list li:hover { color: var(--accent); }
.toc-page .toc-list .toc-num {
  font-family: var(--font-mono); font-size: 11px;
  color: var(--accent); opacity: 0.55; min-width: 40px;
}
.toc-page .toc-list .toc-title { flex: 1; margin: 0 8px; }
.toc-page .toc-list .toc-page-num {
  font-family: var(--font-mono); font-size: 11px;
  color: var(--accent); opacity: 0.55;
}

/* ===== FOOTER ===== */
#footer {
  position: fixed; bottom: 0; left: 0; right: 0;
  display: flex; justify-content: center;
  align-items: center; gap: 16px;
  padding: 32px 24px 14px;
  font-family: var(--font-sans);
  font-size: 12px; color: var(--text-muted);
  z-index: 50; pointer-events: none;
  background: linear-gradient(to bottom, transparent 0%, var(--bg-right) 80%);
}
#footer > * { pointer-events: auto; }

.footer-nav {
  display: flex; align-items: center; gap: 8px;
}
.footer-nav button {
  background: none; border: none;
  color: var(--text-muted); cursor: pointer;
  font-size: 14px; padding: 4px 6px;
  opacity: 0.5; transition: opacity 0.2s, color 0.2s;
}
.footer-nav button:hover { opacity: 1; color: var(--accent); }

#page-num-wrap {
  font-family: var(--font-mono);
  font-size: 11px; letter-spacing: 0.5px;
}

/* Theme picker in footer */
.theme-picker {
  display: flex; gap: 8px; align-items: center;
}
.theme-picker .td {
  width: 14px; height: 14px; border-radius: 50%;
  border: none; cursor: pointer;
  transition: transform 0.15s, box-shadow 0.15s;
}
.theme-picker .td:hover { transform: scale(1.25); }
.theme-picker .td.active { box-shadow: 0 0 0 2px var(--control-bg), 0 0 0 3.5px var(--accent); }
.theme-picker .td[data-theme="sepia"] { background: #d4a76a; }
.theme-picker .td[data-theme="light-purple"] { background: #c9b8e8; }
.theme-picker .td[data-theme="light-azure"] { background: #d4e8f7; }
.theme-picker .td[data-theme="dark-violet"] { background: #4a3a6a; }
.theme-picker .td[data-theme="dark-blue"] { background: #1e2a4a; }

/* Chapter scrubber */
.chapter-scrubber {
  display: flex; gap: 8px; align-items: center;
}
.chapter-scrubber span {
  font-family: var(--font-mono);
  font-size: 10px; letter-spacing: 0.5px;
  cursor: pointer; opacity: 0.4;
  transition: opacity 0.2s, color 0.2s;
  position: relative;
}
.chapter-scrubber span:hover { opacity: 0.8; }
.chapter-scrubber span.active { opacity: 1; color: var(--accent); }
.chapter-scrubber span::after {
  content: attr(data-title);
  position: absolute; bottom: 100%; left: 50%;
  transform: translateX(-50%);
  padding: 4px 8px;
  font-family: var(--font-bengali);
  font-size: 12px; color: var(--text);
  background: var(--control-bg);
  border: 1px solid var(--border);
  border-radius: 4px;
  white-space: nowrap;
  opacity: 0; pointer-events: none;
  transition: opacity 0.15s;
}
.chapter-scrubber span:hover::after { opacity: 1; }

/* ===== FLIP OVERLAY ===== */
.flip-overlay {
  position: absolute; top: 0;
  width: 50%; height: 100%;
  transform-style: preserve-3d;
  z-index: 20; pointer-events: none;
}
.flip-overlay.right-flip { right: 0; transform-origin: left center; }
.flip-overlay.left-flip { left: 0; transform-origin: right center; }
.flip-face {
  position: absolute; inset: 0;
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
  overflow: hidden;
}
.flip-face.front { z-index: 2; }
.flip-face.back { transform: rotateY(180deg); z-index: 1; }

/* ===== MOBILE ===== */
@media (max-width: 768px) {
  .page-content { padding: 32px 20px 60px; }
  .page-inner { max-width: 100%; }
  #cover-spread .cover-title { font-size: 32px; }
  .sukta-spread-header .sukta-title-bn { font-size: 22px; }
}
</style>
</head>

    <div class="page-content">

<div id="footer">

    <button class="td" data-theme="light-azure" title="Light Azure"></button>
    <button class="td" data-theme="dark-violet" title="Dark Violet"></button>

</div>

 "sa_devanagari": "अग्निना रयिमश्नवत्पोषमेव दिवेदिवे ।\nयशसं वीरवत्तमम् ॥", "sa_bengali": "অগ্নিনা রয়িমশ্নবত্পোষমেব দিবেদিবে ।\nযশসং বীরবত্তমম্ ॥", "transliteration": "agninā rayim aśnavat poṣam eva dive-dive |\nyaśasaṁ vīravattamam ||", "meaning_bn": "অগ্নির মাধ্যমে উপাসক প্রতিদিন ধন, সমৃদ্ধি, যশ এবং বীরপুত্র লাভ করেন।", "meaning_en": "Through Agni may one obtain wealth and prosperity day by day, glory and heroic sons."}, {"num": 4, "sa_devanagari": "अग्ने यं यज्ञमध्वरं विश्वतः परिभूरसि ।\nस इद्देवेषु गच्छति ॥", "sa_bengali": "অগ্নে যং যজ্ঞমধ্বরং বিশ্বতঃ পরিভূরসি ।\nস ইদ্দেবেষু গচ্ছতি ॥", "transliteration": "agne yaṁ yajñam adhvaraṁ viśvataḥ paribhūr asi |\nsa id deveṣu gacchati ||", "meaning_bn": "হে অগ্নি, যে যজ্ঞকে তুমি সকল দিক থেকে পরিবেষ্টন কর, সেই যজ্ঞ দেবতাদের কাছে পৌঁছায়।", "meaning_en": "O Agni, the sacrifice which you encompass on every side, that indeed goes to the gods."}, {"num": 5, "sa_devanagari": "अग्निर्होता कविक्रतुः सत्यश्चित्रश्रवस्तमः ।\nदेवो देवेभिरा गमत् ॥", "sa_bengali": "অগ্নির্হোতা কবিক্রতুঃ সত্যশ্চিত্রশ্রবস্তমঃ ।\nদেবো দেবেভিরা গমত্ ॥", "transliteration": "agnir hotā kavikratuḥ satyaś citraśravastamaḥ |\ndevo devebhir ā gamat ||", "meaning_bn": "অগ্নি হোতা, জ্ঞানী কর্মকারী, সত্য, বিচিত্র যশের অধিকারী। এই দেব অন্যান্য দেবতাদের সাথে আসুন।", "meaning_en": "Agni, the invoker, wise in action, truthful, most renowned — may that god come with the gods."}, {"num": 6, "sa_devanagari": "यदङ्ग दाशुषे त्वमग्ने भद्रं करिष्यसि ।\nतवेत्तत्सत्यमङ्गिरः ॥", "sa_bengali": "যদঙ্গ দাশুষে ত্বমগ্নে ভদ্রং করিষ্যসি ।\nতবেত্তত্সত্যমঙ্গিরঃ ॥", "transliteration": "yad aṅga dāśuṣe tvam agne bhadraṁ kariṣyasi |\ntavet tat satyam aṅgiraḥ ||", "meaning_bn": "হে অগ্নি, তুমি দাতাকে যে কল্যাণ করবে, হে অঙ্গিরস, তা নিশ্চয়ই সত্য।", "meaning_en": "Whatever blessing you will bestow upon the worshipper, O Agni, that indeed is true, O Angiras."}, {"num": 7, "sa_devanagari": "उप त्वाग्ने दिवेदिवे दोषावस्तर्धिया वयम् ।\nनमो भरन्त एमसि ॥", "sa_bengali": "উপ ত্বাগ্নে দিবেদিবে দোষাবস্তর্ধিয়া বয়ম্ ।\nনমো ভরন্ত এমসি ॥", "transliteration": "upa tvāgne dive-dive doṣāvastar dhiyā vayam |\nnamo bharanta emasi ||", "meaning_bn": "হে অগ্নি, হে অন্ধকারের নাশক, আমরা প্রতিদিন ধ্যানচিত্তে তোমার কাছে নমস্কার নিবেদন করতে আসি।", "meaning_en": "To you, O Agni, day by day, O dispeller of darkness, we come bearing our homage with reverential thought."}, {"num": 8, "sa_devanagari": "राजन्तमध्वराणां गोपामृतस्य दीदिविम् ।\nवर्धमानं स्वे दमे ॥", "sa_bengali": "রাজন্তমধ্বরাণাং গোপামৃতস্য দীদিবিম্ ।\nবর্ধমানং স্বে দমে ॥", "transliteration": "rājantam adhvarāṇāṁ gopām ṛtasya dīdivim |\nvardhamānaṁ sve dame ||", "meaning_bn": "যজ্ঞসমূহের রাজা, ঋতের রক্ষক, দীপ্তিমান, নিজ গৃহে বর্ধমান।", "meaning_en": "The ruler of sacrifices, the guardian of truth, the shining one, ever growing in his own abode."}, {"num": 9, "sa_devanagari": "स नः पितेव सूनवेऽग्ने सूपायनो भव ।\nसचस्वा नः स्वस्तये ॥", "sa_bengali": "স নঃ পিতেব সূনবেঽগ্নে সূপায়নো ভব ।\nসচস্বা নঃ স্বস্তয়ে ॥", "transliteration": "sa naḥ piteva sūnave 'gne sūpāyano bhava |\nsacasvā naḥ svastaye ||", "meaning_bn": "হে অগ্নি, পিতা যেমন পুত্রের প্রতি স্নেহশীল, তেমনি তুমি আমাদের প্রতি সহজগম্য হও। আমাদের কল্যাণের জন্য আমাদের সঙ্গী হও।", "meaning_en": "O Agni, be easy of access to us, as a father to a son. Be with us for our well-being."}]}]}, {"title_bn": "তৃতীয় মণ্ডল", "title_en": "Third Mandala", "num": 3, "suktas": [{"sukta_num": 62, "title_bn": "সাবিত্রী সূক্ত (গায়ত্রী মন্ত্র)", "title_en": "Savitri Sukta (Gayatri Mantra)", "rishi": "বিশ্বামিত্র গাথিন / Vishvamitra Gathina", "devata": "সবিতৃ / Savitr", "chanda": "গায়ত্রী / Gayatri", "note_en": "Verse 10 of Sukta 62 in the Third Mandala is the world-famous Gayatri Mantra (also called Savitri), the most sacred verse of the Vedas — a meditation on the divine light of Savitr. Here we present the key verses of this sukta.", "note_bn": "তৃতীয় মণ্ডলের ৬২তম সূক্তের দশম মন্ত্রটি বিশ্ববিখ্যাত গায়ত্রী মন্ত্র (সাবিত্রী মন্ত্র নামেও পরিচিত), বেদের সর্বাধিক পবিত্র মন্ত্র — সবিতৃদেবের দিব্য জ্যোতির ধ্যান।", "mantras": [{"num": 10, "sa_devanagari": "तत्सवितुर्वरेण्यं भर्गो देवस्य धीमहि ।\nधियो यो नः प्रचोदयात् ॥", "sa_bengali": "তৎসবিতুর্বরেণ্যং ভর্গো দেবস্য ধীমহি ।\nধিয়ো যো নঃ প্রচোদয়াৎ ॥", "transliteration": "tat savitur vareṇyaṁ bhargo devasya dhīmahi |\ndhiyo yo naḥ pracodayāt ||", "meaning_bn": "আমরা সেই সবিতৃদেবের উৎকৃষ্ট তেজ ধ্যান করি, যিনি আমাদের বুদ্ধি ও ধীশক্তিকে প্রেরণা দান করেন।", "meaning_en": "We meditate upon the excellent radiance of the divine Savitr; may He inspire our intellects."}, {"num": 11, "sa_devanagari": "देवस्य सवितुर्वयं वाजयन्तः पुरन्ध्या ।\nधियं घृताचीं साधन्ता ॥", "sa_bengali": "দেবস্য সবিতুর্বয়ং বাজয়ন্তঃ পুরন্ধ্যা ।\nধিয়ং ঘৃতাচীং সাধন্তা ॥", "transliteration": "devasya savitur vayaṁ vājayantaḥ purandhyā |\ndhiyaṁ ghṛtācīṁ sādhantā ||", "meaning_bn": "আমরা সবিতৃদেবের শক্তি প্রার্থনা করি, পুষ্টি ও প্রজ্ঞা সহকারে, ঘৃতাক্ত (সমৃদ্ধ) ধীশক্তি সাধন করতে।", "meaning_en": "Of the god Savitr, we, seeking strength and inspired wisdom, perfecting the thought rich as ghee."}, {"num": 18, "sa_devanagari": "विश्वानि देव सवितर्दुरितानि परासुव ।\nयद्भद्रं तन्न आसुव ॥", "sa_bengali": "বিশ্বানি দেব সবিতর্দুরিতানি পরাসুব ।\nযদ্ভদ্রং তন্ন আসুব ॥", "transliteration": "viśvāni deva savitar duritāni parā suva |\nyad bhadraṁ tan na ā suva ||", "meaning_bn": "হে দেব সবিতৃ, সমস্ত পাপ ও দুরিত দূর করো। যা কল্যাণকর তা আমাদের দান করো।", "meaning_en": "O god Savitr, drive away all evils. Bestow upon us that which is auspicious."}]}]}, {"title_bn": "দশম মণ্ডল", "title_en": "Tenth Mandala", "num": 10, "suktas": [{"sukta_num": 90, "title_bn": "পুরুষ সূক্ত", "title_en": "Purusha Sukta", "rishi": "নারায়ণ / Narayana", "devata": "পুরুষ / Purusha", "chanda": "অনুষ্টুপ / Anushtubh", "note_en": "The Purusha Sukta is one of the most important hymns of the Rigveda. It describes the cosmic sacrifice of the primordial being (Purusha) from whose body the universe and all life emerged. It is widely recited in Vedic rituals to this day. The metre is predominantly Anushtubh, with some verses in Trishtubh.", "note_bn": "পুরুষ সূক্ত ঋগ্বেদের অন্যতম গুরুত্বপূর্ণ সূক্ত। এতে আদি পুরুষের বিশ্বজনীন যজ্ঞের বর্ণনা রয়েছে, যাঁর দেহ থেকে সমগ্র বিশ্বব্রহ্মাণ্ড ও সমস্ত প্রাণী সৃষ্টি হয়েছে। বৈদিক অনুষ্ঠানে আজও এই সূক্ত বহুল পঠিত। ছন্দ প্রধানত অনুষ্টুপ, কিছু মন্ত্রে ত্রিষ্টুপ।", "mantras": [{"num": 1, "sa_devanagari": "सहस्रशीर्षा पुरुषः सहस्राक्षः सहस्रपात् ।\nस भूमिं विश्वतो वृत्वात्यतिष्ठद्दशाङ्गुलम् ॥", "sa_bengali": "সহস্রশীর্ষা পুরুষঃ সহস্রাক্ষঃ সহস্রপাৎ ।\nস ভূমিং বিশ্বতো বৃত্বাত্যতিষ্ঠদ্দশাঙ্গুলম্ ॥", "transliteration": "sahasraśīrṣā puruṣaḥ sahasrākṣaḥ sahasrapāt |\nsa bhūmiṁ viśvato vṛtvātyatiṣṭhad daśāṅgulam ||", "meaning_bn": "পুরুষের সহস্র মস্তক, সহস্র চক্ষু, সহস্র পদ। তিনি পৃথিবীকে সর্বদিক থেকে আবৃত করে দশ অঙ্গুলি পরিমাণ অতিক্রম করে বিরাজ করেন।", "meaning_en": "The Purusha has a thousand heads, a thousand eyes, and a thousand feet. He pervades the earth on all sides and extends beyond it by ten fingers' breadth."}, {"num": 2, "sa_devanagari": "पुरुष एवेदं सर्वं यद्भूतं यच्च भव्यम् ।\nउतामृतत्वस्येशानो यदन्नेनातिरोहति ॥", "sa_bengali": "পুরুষ এবেদং সর্বং যদ্ভূতং যচ্চ ভব্যম্ ।\nউতামৃতত্বস্যেশানো যদন্নেনাতিরোহতি ॥", "transliteration": "puruṣa evedaṁ sarvaṁ yad bhūtaṁ yac ca bhavyam |\nutāmṛtatvasyeśāno yad annenātirohati ||", "meaning_bn": "যা কিছু অতীত এবং যা কিছু ভবিষ্যৎ — এই সমস্তই পুরুষ। তিনি অমৃতত্বেরও ঈশান (প্রভু), যা অন্নের দ্বারা অতিক্রম করেন।", "meaning_en": "The Purusha alone is all this — whatever has been and whatever shall be. He is the lord of immortality, which he outgrows through food."}, {"num": 3, "sa_devanagari": "एतावानस्य महिमातो ज्यायांश्च पूरुषः ।\nपादोऽस्य विश्वा भूतानि त्रिपादस्यामृतं दिवि ॥", "sa_bengali": "এতাবানস্য মহিমাতো জ্যায়াংশ্চ পূরুষঃ ।\nপাদোঽস্য বিশ্বা ভূতানি ত্রিপাদস্যামৃতং দিবি ॥", "transliteration": "etāvān asya mahimāto jyāyāṁś ca pūruṣaḥ |\npādo 'sya viśvā bhūtāni tripād asyāmṛtaṁ divi ||", "meaning_bn": "এত তাঁর মহিমা, এবং পুরুষ এর চেয়েও মহত্তর। সমস্ত ভূত-প্রাণী তাঁর এক পদ (চতুর্থাংশ) মাত্র; তাঁর তিন পদ (তিন চতুর্থাংশ) দিব্যলোকে অমৃতরূপে বিরাজমান।", "meaning_en": "Such is his greatness, and the Purusha is even greater than this. All beings are one quarter of him; three quarters are the immortal in heaven."}, {"num": 4, "sa_devanagari": "त्रिपादूर्ध्व उदैत्पुरुषः पादोऽस्येहाभवत्पुनः ।\nततो विष्वङ्व्यक्रामत्साशनानशने अभि ॥", "sa_bengali": "ত্রিপাদূর্ধ্ব উদৈৎপুরুষঃ পাদোঽস্যেহাভবৎপুনঃ ।\nততো বিষ্বঙ্ব্যক্রামৎসাশনানশনে অভি ॥", "transliteration": "tripād ūrdhva udait puruṣaḥ pādo 'syehābhavat punaḥ |\ntato viṣvaṅ vyakrāmat sāśanānaśane abhi ||", "meaning_bn": "পুরুষের তিন পদ ঊর্ধ্বে উঠলেন, এক পদ এই লোকে পুনরায় প্রকাশিত হলেন। তারপর তিনি সর্বদিকে ব্যাপ্ত হলেন — চেতন ও অচেতন সকলের মধ্যে।", "meaning_en": "Three quarters of the Purusha ascended above; one quarter manifested here again. Then he spread everywhere over that which eats and that which does not eat."}, {"num": 5, "sa_devanagari": "तस्माद्विराळजायत विराजो अधि पूरुषः ।\nस जातो अत्यरिच्यत पश्चाद्भूमिमथो पुरः ॥", "sa_bengali": "তস্মাদ্বিরাळজায়ত বিরাজো অধি পূরুষঃ ।\nস জাতো অত্যরিচ্যত পশ্চাদ্ভূমিমথো পুরঃ ॥", "transliteration": "tasmād virāḷ ajāyata virājo adhi pūruṣaḥ |\nsa jāto atyaricyata paścād bhūmim atho puraḥ ||", "meaning_bn": "সেই পুরুষ থেকে বিরাট জন্ম নিলেন, বিরাট থেকে আবার পুরুষ। জন্ম নিয়ে তিনি পৃথিবীকে পশ্চাৎ ও সম্মুখে অতিক্রম করে ব্যাপ্ত হলেন।", "meaning_en": "From him Viraj was born, and from Viraj again the Purusha. Being born, he extended beyond the earth behind and before."}, {"num": 6, "sa_devanagari": "यत्पुरुषेण हविषा देवा यज्ञमतन्वत ।\nवसन्तो अस्यासीदाज्यं ग्रीष्म इध्मः शरद्धविः ॥", "sa_bengali": "যৎপুরুষেণ হবিষা দেবা যজ্ঞমতন্বত ।\nবসন্তো অস্যাসীদাজ্যং গ্রীষ্ম ইধ্মঃ শরদ্ধবিঃ ॥", "transliteration": "yat puruṣeṇa haviṣā devā yajñam atanvata |\nvasanto asyāsīd ājyaṁ grīṣma idhmaḥ śaraddhaviḥ ||", "meaning_bn": "যখন দেবতারা পুরুষকে হবি রূপে যজ্ঞে উৎসর্গ করলেন — বসন্ত ছিল ঘৃত, গ্রীষ্ম ছিল সমিধ, শরৎ ছিল হবি।", "meaning_en": "When the gods performed the sacrifice with the Purusha as the offering — spring was its clarified butter, summer was the fuel, and autumn was the oblation."}, {"num": 7, "sa_devanagari": "तं यज्ञं बर्हिषि प्रौक्षन्पुरुषं जातमग्रतः ।\nतेन देवा अयजन्त साध्या ऋषयश्च ये ॥", "sa_bengali": "তং যজ্ঞং বর্হিষি প্রৌক্ষন্পুরুষং জাতমগ্রতঃ ।\nতেন দেবা অযজন্ত সাধ্যা ঋষয়শ্চ যে ॥", "transliteration": "taṁ yajñaṁ barhiṣi praukṣan puruṣaṁ jātam agrataḥ |\ntena devā ayajanta sādhyā ṛṣayaś ca ye ||", "meaning_bn": "আদিতে জাত সেই পুরুষকে কুশের উপর যজ্ঞপশু রূপে প্রোক্ষণ (সংস্কার) করা হলো। তাঁকে দিয়ে দেবতারা, সাধ্যগণ ও ঋষিগণ যজ্ঞ সম্পাদন করলেন।", "meaning_en": "That sacrifice, the Purusha born in the beginning, was sprinkled on the sacred grass. With him the gods sacrificed, as did the Sadhyas and the sages."}, {"num": 8, "sa_devanagari": "तस्माद्यज्ञात्सर्वहुतः सम्भृतं पृषदाज्यम् ।\nपशून्ताँश्चक्रे वायव्यानारण्यान्ग्राम्याश्च ये ॥", "sa_bengali": "তস্মাদ্যজ্ঞাৎসর্বহুতঃ সম্ভৃতং পৃষদাজ্যম্ ।\nপশূন্তাঁশ্চক্রে বায়ব্যানারণ্যান্গ্রাম্যাশ্চ যে ॥", "transliteration": "tasmād yajñāt sarvahutaḥ sambhṛtaṁ pṛṣadājyam |\npaśūn tām̐ś cakre vāyavyān āraṇyān grāmyāś ca ye ||", "meaning_bn": "সেই সম্পূর্ণ আহুতিযুক্ত যজ্ঞ থেকে দধিমিশ্রিত ঘৃত উৎপন্ন হলো। তিনি বায়ুচর পশু, অরণ্যচর পশু এবং গ্রাম্য পশু — এই সকল প্রাণী সৃষ্টি করলেন।", "meaning_en": "From that sacrifice in which everything was offered, the clotted butter was gathered. He made the beasts of the air, of the forest, and those of the village."}, {"num": 9, "sa_devanagari": "तस्माद्यज्ञात्सर्वहुत ऋचः सामानि जज्ञिरे ।\nछन्दांसि जज्ञिरे तस्माद्यजुस्तस्मादजायत ॥", "sa_bengali": "তস্মাদ্যজ্ঞাৎসর্বহুত ঋচঃ সামানি জজ্ঞিরে ।\nছন্দাংসি জজ্ঞিরে তস্মাদ্যজুস্তস্মাদজায়ত ॥", "transliteration": "tasmād yajñāt sarvahuta ṛcaḥ sāmāni jajñire |\nchandāṁsi jajñire tasmād yajus tasmād ajāyata ||", "meaning_bn": "সেই সর্বহুত যজ্ঞ থেকে ঋক্ ও সাম মন্ত্রসমূহ জন্ম নিল। ছন্দসমূহ তা থেকে জন্ম নিল এবং যজুর্বেদও তা থেকে উৎপন্ন হলো।", "meaning_en": "From that sacrifice in which everything was offered, the Rik and Saman verses were born. The metres were born from it, and the Yajus was born from it."}, {"num": 10, "sa_devanagari": "तस्मादश्वा अजायन्त ये के चोभयादतः ।\nगावो ह जज्ञिरे तस्मात्तस्माज्जाता अजावयः ॥", "sa_bengali": "তস্মাদশ্বা অজায়ন্ত যে কে চোভয়াদতঃ ।\nগাবো হ জজ্ঞিরে তস্মাত্তস্মাজ্জাতা অজাবয়ঃ ॥", "transliteration": "tasmād aśvā ajāyanta ye ke cobhayādataḥ |\ngāvo ha jajñire tasmāt tasmāj jātā ajāvayaḥ ||", "meaning_bn": "তা থেকে অশ্ব জন্ম নিল এবং যাদের উভয় পঙ্ক্তিতে দাঁত আছে তারাও। গাভী তা থেকে জন্ম নিল, এবং ছাগ ও মেষও তা থেকে জন্ম নিল।", "meaning_en": "From that were born horses, and those with two rows of teeth. Cows were born from it, and from it were born goats and sheep."}, {"num": 11, "sa_devanagari": "यत्पुरुषं व्यदधुः कतिधा व्यकल्पयन् ।\nमुखं किमस्य कौ बाहू का ऊरू पादा उच्येते ॥", "sa_bengali": "যৎপুরুষং ব্যদধুঃ কতিধা ব্যকল্পয়ন্ ।\nমুখং কিমস্য কৌ বাহূ কা ঊরূ পাদা উচ্যেতে ॥", "transliteration": "yat puruṣaṁ vyadadhuḥ katidhā vyakalpayan |\nmukhaṁ kim asya kau bāhū kā ūrū pādā ucyete ||", "meaning_bn": "যখন তারা পুরুষকে বিভক্ত করলেন, কত ভাগে তাঁকে কল্পনা করলেন? তাঁর মুখ কী হলো? তাঁর বাহু কী? তাঁর ঊরু ও পদ কী বলে কথিত?", "meaning_en": "When they divided the Purusha, into how many parts did they arrange him? What was his mouth? What were his arms? What were his thighs and feet called?"}, {"num": 12, "sa_devanagari": "ब्राह्मणोऽस्य मुखमासीद्बाहू राजन्यः कृतः ।\nऊरू तदस्य यद्वैश्यः पद्भ्यां शूद्रो अजायत ॥", "sa_bengali": "ব্রাহ্মণোঽস্য মুখমাসীদ্বাহূ রাজন্যঃ কৃতঃ ।\nঊরূ তদস্য যদ্বৈশ্যঃ পদ্ভ্যাং শূদ্রো অজায়ত ॥", "transliteration": "brāhmaṇo 'sya mukham āsīd bāhū rājanyaḥ kṛtaḥ |\nūrū tad asya yad vaiśyaḥ padbhyāṁ śūdro ajāyata ||", "meaning_bn": "তাঁর মুখ ব্রাহ্মণ হলেন, তাঁর বাহু থেকে রাজন্য (ক্ষত্রিয়) সৃষ্ট হলেন, তাঁর ঊরু থেকে বৈশ্য এবং পদদ্বয় থেকে শূদ্র জন্ম নিলেন।", "meaning_en": "His mouth became the Brahmana, his arms were made the Rajanya (Kshatriya), his thighs the Vaishya, and from his feet the Shudra was born."}, {"num": 13, "sa_devanagari": "चन्द्रमा मनसो जातश्चक्षोः सूर्यो अजायत ।\nमुखादिन्द्रश्चाग्निश्च प्राणाद्वायुरजायत ॥", "sa_bengali": "চন্দ্রমা মনসো জাতশ্চক্ষোঃ সূর্যো অজায়ত ।\nমুখাদিন্দ্রশ্চাগ্নিশ্চ প্রাণাদ্বায়ুরজায়ত ॥", "transliteration": "candramā manaso jātaś cakṣoḥ sūryo ajāyata |\nmukhād indraś cāgniś ca prāṇād vāyur ajāyata ||", "meaning_bn": "তাঁর মন থেকে চন্দ্র জন্ম নিলেন, চক্ষু থেকে সূর্য উৎপন্ন হলেন। মুখ থেকে ইন্দ্র ও অগ্নি এবং প্রাণ থেকে বায়ু জন্ম নিলেন।", "meaning_en": "The moon was born from his mind; from his eye the sun was born. From his mouth Indra and Agni, and from his breath Vayu (the wind) was born."}, {"num": 14, "sa_devanagari": "नाभ्या आसीदन्तरिक्षं शीर्ष्णो द्यौः समवर्तत ।\nपद्भ्यां भूमिर्दिशः श्रोत्रात्तथा लोकाँ अकल्पयन् ॥", "sa_bengali": "নাভ্যা আসীদন্তরিক্ষং শীর্ষ্ণো দ্যৌঃ সমবর্তত ।\nপদ্ভ্যাং ভূমির্দিশঃ শ্রোত্রাত্তথা লোকাঁ অকল্পয়ন্ ॥", "transliteration": "nābhyā āsīd antarikṣaṁ śīrṣṇo dyauḥ samavartata |\npadbhyāṁ bhūmir diśaḥ śrotrāt tathā lokām̐ akalpayan ||", "meaning_bn": "তাঁর নাভি থেকে অন্তরীক্ষ (আকাশ) উৎপন্ন হলো, মস্তক থেকে দ্যুলোক (স্বর্গ) সমুদ্ভূত হলো। পদদ্বয় থেকে পৃথিবী এবং কর্ণ থেকে দিকসমূহ — এভাবে লোকসমূহ নির্মিত হলো।", "meaning_en": "From his navel arose the mid-region (atmosphere); from his head the sky evolved. From his feet the earth, and from his ear the directions — thus they fashioned the worlds."}, {"num": 15, "sa_devanagari": "सप्तास्यासन्परिधयस्त्रिः सप्त समिधः कृताः ।\nदेवा यद्यज्ञं तन्वाना अबध्नन्पुरुषं पशुम् ॥", "sa_bengali": "সপ্তাস্যাসন্পরিধয়স্ত্রিঃ সপ্ত সমিধঃ কৃতাঃ ।\nদেবা যদ্যজ্ঞং তন্বানা অবধ্নন্পুরুষং পশুম্ ॥", "transliteration": "saptāsyāsan paridhayaḥ triḥ sapta samidhaḥ kṛtāḥ |\ndevā yad yajñaṁ tanvānā abadhnan puruṣaṁ paśum ||", "meaning_bn": "সেই যজ্ঞে সাতটি পরিধি (বেষ্টনী) ছিল এবং একুশটি সমিধ নির্মিত হয়েছিল। দেবতারা যজ্ঞ বিস্তার করতে গিয়ে পুরুষকে যজ্ঞপশু রূপে বন্ধন করলেন।", "meaning_en": "Seven were the enclosing sticks, and thrice seven were the fuel sticks made, when the gods, performing the sacrifice, bound the Purusha as the sacrificial animal."}, {"num": 16, "sa_devanagari": "यज्ञेन यज्ञमयजन्त देवास्तानि धर्माणि प्रथमान्यासन् ।\nते ह नाकं महिमानः सचन्त यत्र पूर्वे साध्याः सन्ति देवाः ॥", "sa_bengali": "যজ্ঞেন যজ্ঞময়জন্ত দেবাস্তানি ধর্মাণি প্রথমান্যাসন্ ।\nতে হ নাকং মহিমানঃ সচন্ত যত্র পূর্বে সাধ্যাঃ সন্তি দেবাঃ ॥", "transliteration": "yajñena yajñam ayajanta devās tāni dharmāṇi prathamāny āsan |\nte ha nākaṁ mahimānaḥ sacanta yatra pūrve sādhyāḥ santi devāḥ ||", "meaning_bn": "দেবতারা যজ্ঞের দ্বারা যজ্ঞকে সম্পন্ন করলেন — এগুলিই ছিল প্রথম ধর্মানুষ্ঠান। সেই মহিমাশালী দেবতারা সেই নাকলোক (স্বর্গ) প্রাপ্ত হলেন, যেখানে পূর্বকালের সাধ্যগণ ও দেবতারা বিরাজমান।", "meaning_en": "With sacrifice the gods sacrificed the sacrifice — these were the first ordinances. These mighty ones attained the height of heaven, where the ancient Sadhyas and the gods dwell."}]}, {"sukta_num": 129, "title_bn": "নাসদীয় সূক্ত (সৃষ্টিসূক্ত)", "title_en": "Nasadiya Sukta (Hymn of Creation)", "rishi": "প্রজাপতি পরমেষ্ঠিন / Prajapati Parameshtin", "devata": "ভাববৃত্ত (সৃষ্টিতত্ত্ব) / Bhavavrtta (Creation)", "chanda": "ত্রিষ্টুপ / Trishtubh", "note_en": "One of the most celebrated hymns of the Rigveda, a profound philosophical inquiry into the origin of the universe.", "note_bn": "ঋগ্বেদের সর্বাধিক বিখ্যাত সূক্তগুলির অন্যতম। সৃষ্টির আদি রহস্য নিয়ে গভীর দার্শনিক অনুসন্ধান।", "mantras": [{"num": 1, "sa_devanagari": "नासदासीन्नो सदासीत्तदानीं नासीद्रजो नो व्योमा परो यत् ।\nकिमावरीवः कुह कस्य शर्मन्नम्भः किमासीद्गहनं गभीरम् ॥", "sa_bengali": "নাসদাসীন্নো সদাসীত্তদানীং নাসীদ্রজো নো ব্যোমা পরো যৎ ।\nকিমাবরীবঃ কুহ কস্য শর্মন্নম্ভঃ কিমাসীদ্গহনং গভীরম্ ॥", "transliteration": "nāsad āsīn no sad āsīt tadānīṁ nāsīd rajo no vyomā paro yat |\nkim āvarīvaḥ kuha kasya śarmann ambhaḥ kim āsīd gahanaṁ gabhīram ||", "meaning_bn": "তখন অসৎ ছিল না, সৎও ছিল না। রজঃ (অন্তরীক্ষ) ছিল না, তার পরের আকাশও ছিল না। কিসে আবৃত ছিল? কোথায়? কার আশ্রয়ে? জল কি ছিল — গহন, গভীর?", "meaning_en": "Then there was neither existence nor non-existence; there was no realm of air, no sky beyond. What covered it? Where was it? In whose shelter? Was there water, fathomlessly deep?"}, {"num": 2, "sa_devanagari": "न मृत्युरासीदमृतं न तर्हि न रात्र्या अह्न आसीत्प्रकेतः ।\nआनीदवातं स्वधया तदेकं तस्माद्धान्यन्न परः किञ्चनास ॥", "sa_bengali": "ন মৃত্যুরাসীদমৃতং ন তর্হি ন রাত্র্যা অহ্ন আসীৎপ্রকেতঃ ।\nআনীদবাতং স্বধয়া তদেকং তস্মাদ্ধান্যন্ন পরঃ কিঞ্চনাস ॥", "transliteration": "na mṛtyur āsīd amṛtaṁ na tarhi na rātryā ahna āsīt praketaḥ |\nānīd avātaṁ svadhayā tad ekaṁ tasmād dhānyan na paraḥ kiñcanāsa ||", "meaning_bn": "তখন মৃত্যু ছিল না, অমৃতও ছিল না। রাত্রি ও দিনের কোনো চিহ্ন ছিল না। সেই একমাত্র সত্তা বায়ুহীন অবস্থায় স্বশক্তিতে শ্বাস নিচ্ছিল। তা ছাড়া আর কিছুই ছিল না।", "meaning_en": "There was neither death nor immortality then; there was no sign of night or day. That One breathed, windless, by its own power. Apart from that, there was nothing else."}, {"num": 3, "sa_devanagari": "तम आसीत्तमसा गूळ्हमग्रे प्रकेतं सलिलं सर्वमा इदम् ।\nतुच्छ्येनाभ्वपिहितं यदासीत्तपसस्तन्महिनाजायतैकम् ॥", "sa_bengali": "তম আসীত্তমসা গূঢ়মগ্রে প্রকেতং সলিলং সর্বমা ইদম্ ।\nতুচ্ছ্যেনাভ্বপিহিতং যদাসীত্তপসস্তন্মহিনাজায়তৈকম্ ॥", "transliteration": "tama āsīt tamasā gūḷham agre praketaṁ salilaṁ sarvam ā idam |\ntucchyenābhv apihitaṁ yad āsīt tapasas tan mahinājāyataikam ||", "meaning_bn": "আদিতে অন্ধকারে অন্ধকার আবৃত ছিল। সমস্ত কিছু অপ্রকাশিত জলরাশি ছিল। শূন্যতায় আবৃত যে সত্তা ছিল, তপস্যার মহিমায় সেই এক জন্ম নিলেন।", "meaning_en": "Darkness was hidden by darkness in the beginning; all this was an indistinguishable sea. That which was covered by the void, that One was born through the power of heat (tapas)."}, {"num": 4, "sa_devanagari": "कामस्तदग्रे समवर्तताधि मनसो रेतः प्रथमं यदासीत् ।\nसतो बन्धुमसति निरविन्दन्हृदि प्रतीष्या कवयो मनीषा ॥", "sa_bengali": "কামস্তদগ্রে সমবর্ততাধি মনসো রেতঃ প্রথমং যদাসীৎ ।\nসতো বন্ধুমসতি নিরবিন্দন্হৃদি প্রতীষ্যা কবয়ো মনীষা ॥", "transliteration": "kāmas tad agre samavartatādhi manaso retaḥ prathamaṁ yad āsīt |\nsato bandhum asati nir avindan hṛdi pratīṣyā kavayo manīṣā ||", "meaning_bn": "আদিতে কাম (ইচ্ছাশক্তি) সেখানে জাগ্রত হলো, যা ছিল মনের প্রথম বীজ। কবিগণ হৃদয়ে ধ্যান করে অসতের মধ্যে সতের বন্ধন খুঁজে পেলেন।", "meaning_en": "In the beginning desire arose, which was the first seed of mind. The wise, searching in their hearts with wisdom, found the bond of existence in non-existence."}, {"num": 5, "sa_devanagari": "तिरश्चीनो विततो रश्मिरेषामधः स्विदासी दुपरि स्विदासीत् ।\nरेतोधा आसन्महिमान आसन्त्स्वधा अवस्तात्प्रयतिः परस्तात् ॥", "sa_bengali": "তিরশ্চীনো বিততো রশ্মিরেষামধঃ স্বিদাসীদুপরি স্বিদাসীৎ ।\nরেতোধা আসন্মহিমান আসন্ত্স্বধা অবস্তাৎপ্রয়তিঃ পরস্তাৎ ॥", "transliteration": "tiraścīno vitato raśmir eṣām adhaḥ svid āsīd upari svid āsīt |\nretodhā āsan mahimāna āsant svadhā avastāt prayatiḥ parastāt ||", "meaning_bn": "তাঁদের রশ্মি তির্যকভাবে বিস্তৃত ছিল। নিচে কি ছিল? উপরে কি ছিল? রেতোধারক ছিলেন, মহিমাশালী ছিলেন — স্বধা নিচে, প্রয়তি উপরে।", "meaning_en": "Their ray was stretched across — was it below or was it above? There were seed-bearers, there were powers: self-sustaining force below, impulse above."}, {"num": 6, "sa_devanagari": "को अद्धा वेद क इह प्र वोचत्कुत आजाता कुत इयं विसृष्टिः ।\nअर्वाग्देवा अस्य विसर्जनेनाथा को वेद यत आबभूव ॥", "sa_bengali": "কো অদ্ধা বেদ ক ইহ প্র বোচৎকুত আজাতা কুত ইয়ং বিসৃষ্টিঃ ।\nঅর্বাগ্দেবা অস্য বিসর্জনেনাথা কো বেদ যত আববভূব ॥", "transliteration": "ko addhā veda ka iha pra vocat kuta ājātā kuta iyaṁ visṛṣṭiḥ |\narvāg devā asya visarjanenāthā ko veda yata ābabhūva ||", "meaning_bn": "কে সত্যই জানে? কে এখানে বলতে পারবে — কোথা থেকে এই সৃষ্টি এলো, কোথা থেকে এই বিশ্বসৃজন? দেবতারাও এই সৃষ্টির পরে এসেছেন — তাহলে কে জানে কোথা থেকে এটি উদ্ভূত হয়েছে?", "meaning_en": "Who truly knows? Who can declare it here — whence this creation arose, whence this emanation? The gods came later than this creation — so who knows whence it came into being?"}, {"num": 7, "sa_devanagari": "इयं विसृष्टिर्यत आबभूव यदि वा दधे यदि वा न ।\nयो अस्याध्यक्षः परमे व्योमन्त्सो अङ्ग वेद यदि वा न वेद ॥", "sa_bengali": "ইয়ং বিসৃষ্টির্যত আববভূব যদি বা দধে যদি বা ন ।\nযো অস্যাধ্যক্ষঃ পরমে ব্যোমন্ত্সো অঙ্গ বেদ যদি বা ন বেদ ॥", "transliteration": "iyaṁ visṛṣṭir yata ābabhūva yadi vā dadhe yadi vā na |\nyo asyādhyakṣaḥ parame vyomantso aṅga veda yadi vā na veda ||", "meaning_bn": "এই সৃষ্টি কোথা থেকে উদ্ভূত হলো — তিনি কি এটি ধারণ করেছেন, নাকি করেননি — যিনি পরম ব্যোমে এর অধ্যক্ষ, তিনিই জানেন — অথবা তিনিও কি জানেন না?", "meaning_en": "That from which this creation arose — whether it held it or did not — He who surveys it from the highest heaven, He alone knows — or perhaps even He does not know."}]}, {"sukta_num": 121, "title_bn": "হিরণ্যগর্ভ সূক্ত", "title_en": "Hiranyagarbha Sukta", "rishi": "হিরণ্যগর্ভ প্রাজাপত্য / Hiranyagarbha Prajapatya", "devata": "কঃ (প্রজাপতি) / Ka (Prajapati)", "chanda": "ত্রিষ্টুপ / Trishtubh", "note_en": "The Hiranyagarbha Sukta is a celebrated cosmogonic hymn inquiring into the identity of the supreme creator god. Each verse describes an attribute of the unknown creator and concludes with the refrain 'kasmai devaya havisha vidhema' — 'To which god shall we offer our oblation?' The word 'Ka' (who?) was later interpreted as a name for Prajapati, the Lord of Creatures. The tenth verse breaks the pattern by directly addressing Prajapati, considered by some scholars to be a later addition.", "note_bn": "হিরণ্যগর্ভ সূক্ত একটি বিখ্যাত সৃষ্টিতত্ত্বমূলক সূক্ত যা পরম স্রষ্টার স্বরূপ অনুসন্ধান করে। প্রতিটি মন্ত্রে অজ্ঞাত স্রষ্টার একটি গুণ বর্ণনা করা হয়েছে এবং প্রতিটি মন্ত্রের শেষে একই ধ্রুবপদ — 'কস্মৈ দেবায় হবিষা বিধেম' অর্থাৎ 'কোন দেবতাকে আমরা হবি দিয়ে পূজা করব?' 'কঃ' (কে?) শব্দটি পরবর্তীকালে প্রজাপতির নাম হিসেবে ব্যাখ্যা করা হয়েছে। দশম মন্ত্রটি সরাসরি প্রজাপতিকে সম্বোধন করে ধ্রুবপদটি ভঙ্গ করে এবং কোনো কোনো পণ্ডিত এটিকে পরবর্তী সংযোজন মনে করেন।", "mantras": [{"num": 1, "sa_devanagari": "हिरण्यगर्भः समवर्तताग्रे भूतस्य जातः पतिरेक आसीत् ।\nस दाधार पृथिवीं द्यामुतेमां कस्मै देवाय हविषा विधेम ॥", "sa_bengali": "হিরণ্যগর্ভঃ সমবর্ততাগ্রে ভূতস্য জাতঃ পতিরেক আসীৎ ।\nস দাধার পৃথিবীং দ্যামুতেমাং কস্মৈ দেবায় হবিষা বিধেম ॥", "transliteration": "hiraṇyagarbhaḥ samavartatāgre bhūtasya jātaḥ patir eka āsīt |\nsa dādhāra pṛthivīṁ dyām utemāṁ kasmai devāya haviṣā vidhema ||", "meaning_bn": "সৃষ্টির আদিতে হিরণ্যগর্ভ আবির্ভূত হলেন। জন্মের সাথে সাথে তিনিই ছিলেন সমস্ত সৃষ্টির একমাত্র প্রভু। তিনি এই পৃথিবী ও আকাশকে ধারণ করলেন — কোন দেবতাকে আমরা হবি দিয়ে পূজা করব?", "meaning_en": "In the beginning arose Hiranyagarbha (the Golden Embryo); born, he was the sole lord of all that exists. He established the earth and this heaven — to which god shall we offer our oblation?"}, {"num": 2, "sa_devanagari": "य आत्मदा बलदा यस्य विश्व उपासते प्रशिषं यस्य देवाः ।\nयस्य छायामृतं यस्य मृत्युः कस्मै देवाय हविषा विधेम ॥", "sa_bengali": "য আত্মদা বলদা যস্য বিশ্ব উপাসতে প্রশিষং যস্য দেবাঃ ।\nযস্য ছায়ামৃতং যস্য মৃত্যুঃ কস্মৈ দেবায় হবিষা বিধেম ॥", "transliteration": "ya ātmadā baladā yasya viśva upāsate praśiṣaṁ yasya devāḥ |\nyasya chāyāmṛtaṁ yasya mṛtyuḥ kasmai devāya haviṣā vidhema ||", "meaning_bn": "যিনি আত্মাদাতা ও বলদাতা, যাঁর আদেশ সমগ্র বিশ্ব ও দেবগণ মান্য করেন, যাঁর ছায়া হলো অমৃত এবং যাঁর ছায়া হলো মৃত্যু — কোন দেবতাকে আমরা হবি দিয়ে পূজা করব?", "meaning_en": "He who gives life and strength, whose command all beings and the gods revere, whose shadow is immortality and whose shadow is death — to which god shall we offer our oblation?"}, {"num": 3, "sa_devanagari": "यः प्राणतो निमिषतो महित्वैक इद्राजा जगतो बभूव ।\nय ईशे अस्य द्विपदश्चतुष्पदः कस्मै देवाय हविषा विधेम ॥", "sa_bengali": "যঃ প্রাণতো নিমিষতো মহিত্বৈক ইদ্রাজা জগতো বভূব ।\nয ঈশে অস্য দ্বিপদশ্চতুষ্পদঃ কস্মৈ দেবায় হবিষা বিধেম ॥", "transliteration": "yaḥ prāṇato nimiṣato mahitvaika id rājā jagato babhūva |\nya īśe asya dvipadaś catuṣpadaḥ kasmai devāya haviṣā vidhema ||", "meaning_bn": "যিনি তাঁর মহিমায় প্রাণীকুলের — যারা শ্বাস নেয় ও চোখের পলক ফেলে — একমাত্র রাজা হলেন, যিনি দ্বিপদ ও চতুষ্পদ সকলের ঈশ্বর — কোন দেবতাকে আমরা হবি দিয়ে পূজা করব?", "meaning_en": "He whose greatness made him the sole king of the breathing and blinking world, who is the lord of all two-footed and four-footed beings — to which god shall we offer our oblation?"}, {"num": 4, "sa_devanagari": "यस्येमे हिमवन्तो महित्वा यस्य समुद्रं रसया सहाहुः ।\nयस्येमाः प्रदिशो यस्य बाहू कस्मै देवाय हविषा विधेम ॥", "sa_bengali": "যস্যেমে হিমবন্তো মহিত্বা যস্য সমুদ্রং রসয়া সহাহুঃ ।\nযস্যেমাঃ প্রদিশো যস্য বাহূ কস্মৈ দেবায় হবিষা বিধেম ॥", "transliteration": "yasyeme himavanto mahitvā yasya samudraṁ rasayā sahāhuḥ |\nyasyemāḥ pradiśo yasya bāhū kasmai devāya haviṣā vidhema ||", "meaning_bn": "যাঁর মহিমা এই হিমবান পর্বতমালা ঘোষণা করে, সমুদ্র ও রসা নদী যাঁর বলে পরিচিত, যাঁর এই দিকসমূহ এবং যাঁর বাহুদ্বয় — কোন দেবতাকে আমরা হবি দিয়ে পূজা করব?", "meaning_en": "Whose greatness these snowy mountains proclaim, whose are the ocean and the river Rasa, they say, whose are these directions and whose are the arms — to which god shall we offer our oblation?"}, {"num": 5, "sa_devanagari": "येन द्यौरुग्रा पृथिवी च दृळ्हा येन स्वः स्तभितं येन नाकः ।\nयो अन्तरिक्षे रजसो विमानः कस्मै देवाय हविषा विधेम ॥", "sa_bengali": "যেন দ্যৌরুগ্রা পৃথিবী চ দৃঢ়া যেন স্বঃ স্তভিতং যেন নাকঃ ।\nযো অন্তরিক্ষে রজসো বিমানঃ কস্মৈ দেবায় হবিষা বিধেম ॥", "transliteration": "yena dyaur ugrā pṛthivī ca dṛḷhā yena svaḥ stabhitaṁ yena nākaḥ |\nyo antarikṣe rajaso vimānaḥ kasmai devāya haviṣā vidhema ||", "meaning_bn": "যাঁর দ্বারা মহান আকাশ ও পৃথিবী সুদৃঢ় হয়েছে, যাঁর দ্বারা স্বর্গলোক স্থাপিত, যাঁর দ্বারা নাক (আকাশমণ্ডল) প্রতিষ্ঠিত, যিনি অন্তরীক্ষে রজঃলোকের পরিমাপকারী — কোন দেবতাকে আমরা হবি দিয়ে পূজা করব?", "meaning_en": "By whom the mighty heaven and the earth were made firm, by whom the sun was established, by whom the vault of heaven, who is the measurer of the mid-region — to which god shall we offer our oblation?"}, {"num": 6, "sa_devanagari": "यं क्रन्दसी अवसा तस्तभाने अभ्यैक्षेतां मनसा रेजमाने ।\nयत्राधि सूर उदितो विभाति कस्मै देवाय हविषा विधेम ॥", "sa_bengali": "যং ক্রন্দসী অবসা তস্তভানে অভ্যৈক্ষেতাং মনসা রেজমানে ।\nযত্রাধি সূর উদিতো বিভাতি কস্মৈ দেবায় হবিষা বিধেম ॥", "transliteration": "yaṁ krandasī avasā tastabhāne abhyaikṣetāṁ manasā rejamāne |\nyatrādhi sūra udito vibhāti kasmai devāya haviṣā vidhema ||", "meaning_bn": "তাঁর সহায়তায় স্থিত আকাশ ও পৃথিবী কম্পমান হৃদয়ে যাঁর দিকে দৃষ্টিপাত করে, যাঁর উপরে উদিত সূর্য দীপ্তি বিকিরণ করে — কোন দেবতাকে আমরা হবি দিয়ে পূজা করব?", "meaning_en": "To whom the two heaven and earth, established by his aid, look up trembling in their mind, over whom the risen sun shines forth — to which god shall we offer our oblation?"}, {"num": 7, "sa_devanagari": "आपो ह यद्बृहतीर्विश्वमायन्गर्भं दधानाः जनयन्तीरग्निम् ।\nततो देवानां समवर्ततासुरेकः कस्मै देवाय हविषा विधेम ॥", "sa_bengali": "আপো হ যদ্বৃহতীর্বিশ্বমায়ন্গর্ভং দধানাঃ জনয়ন্তীরগ্নিম্ ।\nততো দেবানাং সমবর্ততাসুরেকঃ কস্মৈ দেবায় হবিষা বিধেম ॥", "transliteration": "āpo ha yad bṛhatīr viśvam āyan garbhaṁ dadhānāḥ janayantīr agnim |\ntato devānāṁ samavartatāsur ekaḥ kasmai devāya haviṣā vidhema ||", "meaning_bn": "যখন মহাজলরাশি সর্বত্র বিস্তৃত হয়ে গর্ভ ধারণ করে অগ্নি জন্ম দিল, তখন সেই জল থেকে দেবতাদের একমাত্র প্রাণশক্তি (অসু) আবির্ভূত হলো — কোন দেবতাকে আমরা হবি দিয়ে পূজা করব?", "meaning_en": "When the mighty waters came, bearing all as a germ, generating fire, thence arose the one life-breath of the gods — to which god shall we offer our oblation?"}, {"num": 8, "sa_devanagari": "यश्चिदापो महिना पर्यपश्यद्दक्षं दधाना जनयन्तीर्यज्ञम् ।\nयो देवेष्वधि देव एक आसीत्कस्मै देवाय हविषा विधेम ॥", "sa_bengali": "যশ্চিদাপো মহিনা পর্যপশ্যদ্দক্ষং দধানা জনয়ন্তীর্যজ্ঞম্ ।\nযো দেবেষ্বধি দেব এক আসীৎকস্মৈ দেবায় হবিষা বিধেম ॥", "transliteration": "yaś cid āpo mahinā paryapaśyad dakṣaṁ dadhānā janayantīr yajñam |\nyo deveṣv adhi deva eka āsīt kasmai devāya haviṣā vidhema ||", "meaning_bn": "যিনি স্বীয় মহিমায় সেই জলরাশির উপর দৃষ্টিপাত করেছিলেন — যে জল দক্ষতা ধারণ করে যজ্ঞকে জন্ম দিচ্ছিল — যিনি দেবতাদের মধ্যেও একমাত্র পরম দেবতা — কোন দেবতাকে আমরা হবি দিয়ে পূজা করব?", "meaning_en": "He who by his might surveyed the waters, which held power and generated the sacrifice — he who among the gods was the one supreme god — to which god shall we offer our oblation?"}, {"num": 9, "sa_devanagari": "मा नो हिंसीज्जनिता यः पृथिव्या यो वा दिवं सत्यधर्मा जजान ।\nयश्चापश्चन्द्रा बृहतीर्जजान कस्मै देवाय हविषा विधेम ॥", "sa_bengali": "মা নো হিংসীজ্জনিতা যঃ পৃথিব্যা যো বা দিবং সত্যধর্মা জজান ।\nযশ্চাপশ্চন্দ্রা বৃহতীর্জজান কস্মৈ দেবায় হবিষা বিধেম ॥", "transliteration": "mā no hiṁsīj janitā yaḥ pṛthivyā yo vā divaṁ satyadharmā jajāna |\nyaś cāpaś candrā bṛhatīr jajāna kasmai devāya haviṣā vidhema ||", "meaning_bn": "যিনি পৃথিবীর জনক, তিনি আমাদের হিংসা করবেন না — যিনি সত্যধর্মা হয়ে আকাশকে জন্ম দিয়েছেন এবং যিনি উজ্জ্বল মহাজলরাশিকে সৃষ্টি করেছেন — কোন দেবতাকে আমরা হবি দিয়ে পূজা করব?", "meaning_en": "May he not harm us — he who is the father of the earth, who with true laws created the heaven, and who generated the great shining waters — to which god shall we offer our oblation?"}, {"num": 10, "sa_devanagari": "प्रजापते न त्वदेतान्यन्यो विश्वा जातानि परि ता बभूव ।\nयत्कामास्ते जुहुमस्तन्नो अस्तु वयं स्याम पतयो रयीणाम् ॥", "sa_bengali": "প্রজাপতে ন ত্বদেতান্যন্যো বিশ্বা জাতানি পরি তা বভূব ।\nযৎকামাস্তে জুহুমস্তন্নো অস্তু বয়ং স্যাম পতয়ো রয়ীণাম্ ॥", "transliteration": "prajāpate na tvad etāny anyo viśvā jātāni pari tā babhūva |\nyatkāmās te juhumas tan no astu vayaṁ syāma patayo rayīṇām ||", "meaning_bn": "হে প্রজাপতি! তুমি ছাড়া অন্য কেউ এই সমস্ত সৃষ্টিকে পরিবেষ্টন করেনি। আমরা যে কামনায় তোমাকে হবি প্রদান করি, তা আমাদের পূর্ণ হোক। আমরা যেন ধনসম্পদের অধিপতি হই।", "meaning_en": "O Prajapati! None other than you has encompassed all these created things. May that be ours for which we offer oblations unto you — may we be lords of riches."}]}, {"sukta_num": 191, "title_bn": "সংজ্ঞান সূক্ত (ঐক্যসূক্ত)", "title_en": "Samjnana Sukta (Unity Hymn)", "rishi": "সংবনন আঙ্গিরস / Samvanana Angirasa", "devata": "সংজ্ঞান / Samjnana", "chanda": "অনুষ্টুপ ও গায়ত্রী / Anushtubh and Gayatri", "note_en": "The final hymn of the Rigveda, a powerful call for unity and harmony among people. It exhorts all to come together, speak together, and think together — a timeless vision of collective accord.", "note_bn": "ঋগ্বেদের শেষ সূক্ত, মানুষের মধ্যে ঐক্য ও সম্প্রীতির এক শক্তিশালী আহ্বান। এতে সকলকে একত্রে চলতে, একত্রে বলতে এবং একত্রে চিন্তা করতে আহ্বান জানানো হয়েছে — সম্মিলিত সংহতির এক কালজয়ী দৃষ্টিভঙ্গি।", "mantras": [{"num": 1, "sa_devanagari": "सं समिद्युवसे वृषन्नग्ने विश्वान्यर्य आ ।\nइळस्पदे समिध्यसे स नो वसून्या भर ॥", "sa_bengali": "সং সমিদ্যুবসে বৃষন্নগ্নে বিশ্বান্যর্য আ ।\nইলস্পদে সমিধ্যসে স নো বসূন্যা ভর ॥", "transliteration": "saṁ samid yuvase vṛṣann agne viśvāny arya ā |\niḷas pade samidhyase sa no vasūny ā bhara ||", "meaning_bn": "হে বৃষভ অগ্নি, তুমি সমিধের সাথে সকল আর্যজনকে একত্রিত কর। ইলার স্থানে তুমি প্রজ্বলিত হও — আমাদের জন্য ধনসম্পদ বহন করে আনো।", "meaning_en": "O mighty Agni, with the sacred fuel you bring all people together. You are kindled at the place of offering — bring us wealth and treasures."}, {"num": 2, "sa_devanagari": "सं गच्छध्वं सं वदध्वं सं वो मनांसि जानताम् ।\nदेवा भागं यथा पूर्वे सञ्जानाना उपासते ॥", "sa_bengali": "সং গচ্ছধ্বং সং বদধ্বং সং বো মনাংসি জানতাম্ ।\nদেবা ভাগং যথা পূর্বে সঞ্জানানা উপাসতে ॥", "transliteration": "saṁ gacchadhvaṁ saṁ vadadhvaṁ saṁ vo manāṁsi jānatām |\ndevā bhāgaṁ yathā pūrve sañjānānā upāsate ||", "meaning_bn": "একত্রে চলো, একত্রে বলো, তোমাদের মন একমত হোক। পূর্বকালে দেবতারা যেমন একমতে নিজ নিজ ভাগ গ্রহণ করতেন, তোমরাও তেমন করো।", "meaning_en": "Come together, speak together, let your minds be in harmony — just as the ancient gods, being of one mind, duly received their share of the offering."}, {"num": 3, "sa_devanagari": "समानो मन्त्रः समितिः समानी समानं मनः सह चित्तमेषाम् ।\nसमानं मन्त्रमभि मन्त्रये वः समानेन वो हविषा जुहोमि ॥", "sa_bengali": "সমানো মন্ত্রঃ সমিতিঃ সমানী সমানং মনঃ সহ চিত্তমেষাম্ ।\nসমানং মন্ত্রমভি মন্ত্রয়ে বঃ সমানেন বো হবিষা জুহোমি ॥", "transliteration": "samāno mantraḥ samitiḥ samānī samānaṁ manaḥ saha cittam eṣām |\nsamānaṁ mantram abhi mantraye vaḥ samānena vo haviṣā juhomi ||", "meaning_bn": "মন্ত্র হোক সমান, সভা হোক সমান, মন হোক সমান, এদের চিত্ত হোক একত্রিত। আমি তোমাদের সমান মন্ত্রে উপদেশ দিই এবং সমান হবিষ্যে তোমাদের জন্য আহুতি দিই।", "meaning_en": "Common be your prayer, common be your assembly, common be your mind, united be your thoughts. I offer you a common prayer; I make oblation for you with a common offering."}, {"num": 4, "sa_devanagari": "समानी व आकूतिः समाना हृदयानि वः ।\nसमानमस्तु वो मनो यथा वः सुसहासति ॥", "sa_bengali": "সমানী ব আকূতিঃ সমানা হৃদয়ানি বঃ ।\nসমানমস্তু বো মনো যথা বঃ সুসহাসতি ॥", "transliteration": "samānī va ākūtiḥ samānā hṛdayāni vaḥ |\nsamānam astu vo mano yathā vaḥ susahāsati ||", "meaning_bn": "তোমাদের সংকল্প হোক সমান, তোমাদের হৃদয় হোক সমান। তোমাদের মন হোক এক, যাতে তোমাদের মধ্যে পূর্ণ সংহতি থাকে।", "meaning_en": "Common be your intentions, united be your hearts. Common be your mind, so that there may be perfect unity among you."}]}]}]}, {"id": "samaveda", "title": "সামবেদ সংহিতা", "title_en": "Samaveda Samhita", "title_sa": "सामवेद संहिता", "description_bn": "সামবেদ হলো চারটি বেদের মধ্যে তৃতীয়, যা 'সাম' অর্থাৎ সুরসংযুক্ত মন্ত্রের সংকলন। এটি মূলত ঋগ্বেদের মন্ত্রসমূহকে সঙ্গীতের সুরে বিন্যস্ত করে যজ্ঞে গানের জন্য সংকলিত। সামবেদে ১,৫৪৯টি মন্ত্র রয়েছে, যার মধ্যে ৭৫টি ব্যতীত সবগুলি ঋগ্বেদ থেকে গৃহীত। এটি দুটি প্রধান ভাগে বিভক্ত — পূর্বার্চিক ও উত্তরার্চিক। সামবেদ ভারতীয় সঙ্গীত ঐতিহ্যের আদি উৎস বলে বিবেচিত। এই বেদ থেকেই কেনোপনিষদ ও ছান্দোগ্যোপনিষদের মতো গুরুত্বপূর্ণ উপনিষদসমূহ উদ্ভূত।", "description_en": "The Samaveda is the third of the four Vedas, known as the 'Veda of melodies' or 'Veda of chants'. It is primarily a liturgical collection of hymns taken mostly from the Rigveda but rearranged and set to musical notation (saman) for singing during Soma sacrifices. Of its 1,549 verses, all but 75 are derived from the Rigveda. It is divided into two main parts — Purvarchika (first collection) and Uttararchika (latter collection). The Samaveda is regarded as the fountainhead of Indian musical tradition. Important Upanishads such as the Kena Upanishad and the Chandogya Upanishad originate from this Veda.", "sections": [{"title_bn": "উত্তরার্চিক — প্রথম প্রপাঠক", "title_en": "Uttararchika — First Prapathaka", "num": 1, "suktas": [{"sukta_num": 1, "title_bn": "অগ্নি আবাহন (সামবেদ প্রথম সূক্ত)", "title_en": "Invocation of Agni (Samaveda Opening Hymn)", "rishi": "গৌতম রাহূগণ / Gautama Rahugana", "devata": "অগ্নি / Agni", "chanda": "গায়ত্রী / Gayatri", "note_en": "The opening hymn of the Samaveda Uttararchika. These verses correspond to Rigveda 6.16.10–12 but are rearranged and set to the saman melody for chanting during the Soma sacrifice. The famous opening 'agna a yahi' is one of the most recognizable invocations in Vedic literature — a call for Agni to come to the sacrifice. As the god of fire and the divine messenger between humans and gods, Agni's invocation opens the chanting tradition.", "note_bn": "সামবেদ উত্তরার্চিকের প্রারম্ভিক সূক্ত। এই মন্ত্রগুলি ঋগ্বেদ ৬.১৬.১০–১২ থেকে গৃহীত কিন্তু সোমযজ্ঞে গানের জন্য সামসুরে পুনর্বিন্যস্ত। বিখ্যাত প্রারম্ভিক পদ 'অগ্ন আ যাহি' বৈদিক সাহিত্যের সর্বাধিক পরিচিত আবাহন মন্ত্রগুলির অন্যতম — যজ্ঞে অগ্নিকে আহ্বান করার মন্ত্র। অগ্নি দেবতা আগুনের দেবতা এবং মানুষ ও দেবতাদের মধ্যে দিব্য দূত হওয়ায় তাঁর আবাহনেই সামগানের পরম্পরা শুরু হয়।", "mantras": [{"num": 1, "sa_devanagari": "अग्न आ याहि वीतये गृणानो हव्यदातये ।\nनि होता सत्सि बर्हिषि ॥", "sa_bengali": "অগ্ন আ যাহি বীতয়ে গৃণানো হব্যদাতয়ে ।\nনি হোতা সত্সি বর্হিষি ॥", "transliteration": "agna ā yāhi vītaye gṛṇāno havyadātaye |\nni hotā satsi barhiṣi ||", "meaning_bn": "হে অগ্নি, আমাদের উপভোগের (যজ্ঞভোজনের) জন্য এসো, স্তুতিলাভ করে হব্যদানের জন্য এসো। হোতারূপে কুশাসনে (বর্হিষে) উপবেশন করো।", "meaning_en": "O Agni, come hither for the feast, praised one, come for the offering of oblations. Sit down as the invoking priest upon the sacred grass."}, {"num": 2, "sa_devanagari": "अग्ने विवस्वदुषसो विभावसो दिवस्पृथिव्योरभि सन्धिमेषाम् ।\nमा नो मर्ता अभि दुश्चर्माणो मा तान्तृणद्वनुषो भूर्यग्ने ॥", "sa_bengali": "অগ্নে বিবস্বদুষসো বিভাবসো দিবস্পৃথিব্যোরভি সন্ধিমেষাম্ ।\nমা নো মর্তা অভি দুশ্চর্মাণো মা তান্তৃণদ্বনুষো ভূর্যগ্নে ॥", "transliteration": "agne vivasvad uṣaso vibhāvaso divas pṛthivyor abhi sandhim eṣām |\nmā no martā abhi duścarmāṇo mā tān tṛṇad vanuṣo bhūry agne ||", "meaning_bn": "হে দীপ্তিমান অগ্নি, যিনি সূর্যের ন্যায় ঊষার আলো দান করেন, আকাশ ও পৃথিবীর সন্ধিস্থলে তুমি বিরাজ কর। দুর্বৃত্ত মর্ত্যরা যেন আমাদের ক্ষতি করতে না পারে; হে অগ্নি, সেই শত্রুদের তুমি বিনাশ করো।", "meaning_en": "O Agni, radiant one, who illuminates the dawn like the sun, you stand at the junction of heaven and earth. May no evil-doers harm us; O Agni, destroy those enemies."}, {"num": 3, "sa_devanagari": "तं त्वा समिद्भिरङ्गिरो घृतेन वर्धयामसि ।\nबृहच्छोचा यविष्ठ्य ॥", "sa_bengali": "তং ত্বা সমিদ্ভিরঙ্গিরো ঘৃতেন বর্ধয়ামসি ।\nবৃহচ্ছোচা যবিষ্ঠ্য ॥", "transliteration": "taṁ tvā samidbhir aṅgiro ghṛtena vardhayāmasi |\nbṛhac chocā yaviṣṭhya ||", "meaning_bn": "হে অঙ্গিরস, সেই তোমাকে আমরা সমিধ ও ঘৃত দিয়ে বর্ধিত করি। হে নবীনতম, মহান দীপ্তিতে জ্বলে ওঠো।", "meaning_en": "O Angiras, with fuel sticks and with ghee we make you grow. Blaze forth with great brilliance, O youngest one."}]}]}, {"title_bn": "কেনোপনিষদ (তলবকার উপনিষদ)", "title_en": "Kena Upanishad (Talavakara Upanishad)", "num": 2, "suktas": [{"sukta_num": 1, "title_bn": "কেনোপনিষদ — প্রথম খণ্ড (ব্রহ্মজিজ্ঞাসা)", "title_en": "Kena Upanishad — Chapter 1 (Inquiry into Brahman)", "rishi": "তলবকার / Talavakara", "devata": "ব্রহ্ম (পরমাত্মা) / Brahman (Supreme Self)", "chanda": "অনুষ্টুপ ও ত্রিষ্টুপ / Anushtubh and Trishtubh", "note_en": "The Kena Upanishad derives its name from the opening word 'kena' (by whom?). It belongs to the Talavakara Brahmana of the Jaiminiya Samaveda and is one of the primary Upanishads commented upon by Adi Shankaracharya. The first chapter consists of a dialogue between a student and teacher, probing the nature of the ultimate reality (Brahman) that powers the mind, breath, speech, eyes, and ears. The teacher reveals that Brahman cannot be known as an object of knowledge — it is the very subject, the knower behind all knowing.", "note_bn": "কেনোপনিষদ প্রথম শব্দ 'কেন' (কার দ্বারা?) থেকে এই নাম পেয়েছে। এটি সামবেদের জৈমিনীয় শাখার তলবকার ব্রাহ্মণের অন্তর্গত এবং আদি শঙ্করাচার্য ভাষ্যকৃত প্রধান উপনিষদগুলির অন্যতম। প্রথম খণ্ডে শিষ্য ও গুরুর সংলাপে পরমসত্তা (ব্রহ্ম) সম্পর্কে জিজ্ঞাসা করা হয়েছে — যা মন, প্রাণ, বাক্, চক্ষু ও শ্রোত্রকে চালিত করে। গুরু প্রকাশ করেন যে ব্রহ্মকে জ্ঞানের বিষয়রূপে জানা যায় না — তিনি স্বয়ং সকল জ্ঞানের পশ্চাতে বিরাজমান জ্ঞাতা।", "mantras": [{"num": 1, "sa_devanagari": "केनेषितं पतति प्रेषितं मनः केन प्राणः प्रथमः प्रैति युक्तः ।\nकेनेषितां वाचमिमां वदन्ति चक्षुः श्रोत्रं क उ देवो युनक्ति ॥", "sa_bengali": "কেনেষিতং পততি প্রেষিতং মনঃ কেন প্রাণঃ প্রথমঃ প্রৈতি যুক্তঃ ।\nকেনেষিতাং বাচমিমাং বদন্তি চক্ষুঃ শ্রোত্রং ক উ দেবো যুনক্তি ॥", "transliteration": "keneṣitaṁ patati preṣitaṁ manaḥ kena prāṇaḥ prathamaḥ praiti yuktaḥ |\nkeneṣitāṁ vācam imāṁ vadanti cakṣuḥ śrotraṁ ka u devo yunakti ||", "meaning_bn": "কার দ্বারা প্রেরিত হয়ে মন গতিশীল হয়? কার দ্বারা প্রথম প্রাণ যুক্ত হয়ে চলে? কার ইচ্ছায় মানুষ এই বাক্য বলে? কোন দেব চক্ষু ও শ্রোত্রকে নিযুক্ত করেন?", "meaning_en": "By whom directed does the mind go forth to its object? By whom commanded does the first breath move? By whose will do people utter this speech? What god directs the eyes and the ears?"}, {"num": 2, "sa_devanagari": "श्रोत्रस्य श्रोत्रं मनसो मनो यद्वाचो ह वाचं स उ प्राणस्य प्राणः ।\nचक्षुषश्चक्षुरतिमुच्य धीराः प्रेत्यास्माल्लोकादमृता भवन्ति ॥", "sa_bengali": "শ্রোত্রস্য শ্রোত্রং মনসো মনো যদ্বাচো হ বাচং স উ প্রাণস্য প্রাণঃ ।\nচক্ষুষশ্চক্ষুরতিমুচ্য ধীরাঃ প্রেত্যাস্মাল্লোকাদমৃতা ভবন্তি ॥", "transliteration": "śrotrasya śrotraṁ manaso mano yad vāco ha vācaṁ sa u prāṇasya prāṇaḥ |\ncakṣuṣaś cakṣur atimucya dhīrāḥ pretyāsmāl lokād amṛtā bhavanti ||", "meaning_bn": "তিনি শ্রোত্রের শ্রোত্র, মনের মন, বাক্যের বাক্য, তিনিই প্রাণের প্রাণ এবং চক্ষুর চক্ষু। এই সত্য জেনে ধীর ব্যক্তিরা এই লোক ত্যাগ করে অমৃতত্ব লাভ করেন।", "meaning_en": "He is the ear of the ear, the mind of the mind, the speech of speech, the breath of breath, and the eye of the eye. Knowing this, the wise, relinquishing this world, become immortal."}, {"num": 3, "sa_devanagari": "न तत्र चक्षुर्गच्छति न वाग्गच्छति नो मनः ।\nन विद्मो न विजानीमो यथैतदनुशिष्यात् ॥", "sa_bengali": "ন তত্র চক্ষুর্গচ্ছতি ন বাগ্গচ্ছতি নো মনঃ ।\nন বিদ্মো ন বিজানীমো যথৈতদনুশিষ্যাৎ ॥", "transliteration": "na tatra cakṣur gacchati na vāg gacchati no manaḥ |\nna vidmo na vijānīmo yathaitad anuśiṣyāt ||", "meaning_bn": "সেখানে চক্ষু যায় না, বাক্য যায় না, মনও যায় না। আমরা জানি না, বুঝিও না, কীভাবে কেউ এটি শেখাতে পারে।", "meaning_en": "The eye does not go there, nor speech, nor the mind. We do not know, we do not understand, how one can teach it."}, {"num": 4, "sa_devanagari": "अन्यदेव तद्विदितादथो अविदितादधि ।\nइति शुश्रुम पूर्वेषां ये नस्तद्व्याचचक्षिरे ॥", "sa_bengali": "অন্যদেব তদ্বিদিতাদথো অবিদিতাদধি ।\nইতি শুশ্রুম পূর্বেষাং যে নস্তদ্ব্যাচচক্ষিরে ॥", "transliteration": "anyad eva tad viditād atho aviditād adhi |\niti śuśruma pūrveṣāṁ ye nas tad vyācacakṣire ||", "meaning_bn": "তা জানা বস্তু থেকে ভিন্ন এবং অজানা বস্তু থেকেও অতীত — এইরূপ আমরা পূর্বাচার্যদের কাছে শুনেছি যাঁরা আমাদের কাছে তা ব্যাখ্যা করেছেন।", "meaning_en": "It is other than the known and also above the unknown — thus we have heard from the ancients who explained it to us."}, {"num": 5, "sa_devanagari": "यद्वाचानभ्युदितं येन वागभ्युद्यते ।\nतदेव ब्रह्म त्वं विद्धि नेदं यदिदमुपासते ॥", "sa_bengali": "যদ্বাচানভ্যুদিতং যেন বাগভ্যুদ্যতে ।\nতদেব ব্রহ্ম ত্বং বিদ্ধি নেদং যদিদমুপাসতে ॥", "transliteration": "yad vācānabhyuditaṁ yena vāg abhyudyate |\ntad eva brahma tvaṁ viddhi nedaṁ yad idam upāsate ||", "meaning_bn": "যা বাক্যের দ্বারা প্রকাশিত হয় না, কিন্তু যার দ্বারা বাক্য প্রকাশিত হয় — তাকেই তুমি ব্রহ্ম বলে জানো; মানুষ যা উপাসনা করে তা (ব্রহ্ম) নয়।", "meaning_en": "That which is not expressed by speech, but by which speech is expressed — know that alone as Brahman, not this that people worship here."}, {"num": 6, "sa_devanagari": "यन्मनसा न मनुते येनाहुर्मनो मतम् ।\nतदेव ब्रह्म त्वं विद्धि नेदं यदिदमुपासते ॥", "sa_bengali": "যন্মনসা ন মনুতে যেনাহুর্মনো মতম্ ।\nতদেব ব্রহ্ম ত্বং বিদ্ধি নেদং যদিদমুপাসতে ॥", "transliteration": "yan manasā na manute yenāhur mano matam |\ntad eva brahma tvaṁ viddhi nedaṁ yad idam upāsate ||", "meaning_bn": "যা মনের দ্বারা চিন্তিত হয় না, কিন্তু যার দ্বারা মন চিন্তা করে বলে কথিত হয় — তাকেই তুমি ব্রহ্ম বলে জানো; মানুষ যা উপাসনা করে তা (ব্রহ্ম) নয়।", "meaning_en": "That which cannot be thought by the mind, but by which, they say, the mind thinks — know that alone as Brahman, not this that people worship here."}, {"num": 7, "sa_devanagari": "यच्चक्षुषा न पश्यति येन चक्षूंषि पश्यति ।\nतदेव ब्रह्म त्वं विद्धि नेदं यदिदमुपासते ॥", "sa_bengali": "যচ্চক্ষুষা ন পশ্যতি যেন চক্ষূংষি পশ্যতি ।\nতদেব ব্রহ্ম ত্বং বিদ্ধি নেদং যদিদমুপাসতে ॥", "transliteration": "yac cakṣuṣā na paśyati yena cakṣūṁṣi paśyati |\ntad eva brahma tvaṁ viddhi nedaṁ yad idam upāsate ||", "meaning_bn": "যা চক্ষুর দ্বারা দেখা যায় না, কিন্তু যার দ্বারা চক্ষুসমূহ দেখে — তাকেই তুমি ব্রহ্ম বলে জানো; মানুষ যা উপাসনা করে তা (ব্রহ্ম) নয়।", "meaning_en": "That which cannot be seen by the eye, but by which the eyes see — know that alone as Brahman, not this that people worship here."}, {"num": 8, "sa_devanagari": "यच्छ्रोत्रेण न शृणोति येन श्रोत्रमिदं श्रुतम् ।\nतदेव ब्रह्म त्वं विद्धि नेदं यदिदमुपासते ॥", "sa_bengali": "যচ্ছ্রোত্রেণ ন শৃণোতি যেন শ্রোত্রমিদং শ্রুতম্ ।\nতদেব ব্রহ্ম ত্বং বিদ্ধি নেদং যদিদমুপাসতে ॥", "transliteration": "yac chrotreṇa na śṛṇoti yena śrotram idaṁ śrutam |\ntad eva brahma tvaṁ viddhi nedaṁ yad idam upāsate ||", "meaning_bn": "যা কানের দ্বারা শোনা যায় না, কিন্তু যার দ্বারা কান শোনে — তাকেই তুমি ব্রহ্ম বলে জানো; মানুষ যা উপাসনা করে তা (ব্রহ্ম) নয়।", "meaning_en": "That which cannot be heard by the ear, but by which the ear hears — know that alone as Brahman, not this that people worship here."}, {"num": 9, "sa_devanagari": "यत्प्राणेन न प्राणिति येन प्राणः प्रणीयते ।\nतदेव ब्रह्म त्वं विद्धि नेदं यदिदमुपासते ॥", "sa_bengali": "যৎপ্রাণেন ন প্রাণিতি যেন প্রাণঃ প্রণীয়তে ।\nতদেব ব্রহ্ম ত্বং বিদ্ধি নেদং যদিদমুপাসতে ॥", "transliteration": "yat prāṇena na prāṇiti yena prāṇaḥ praṇīyate |\ntad eva brahma tvaṁ viddhi nedaṁ yad idam upāsate ||", "meaning_bn": "যা প্রাণের দ্বারা প্রাণিত হয় না, কিন্তু যার দ্বারা প্রাণ পরিচালিত হয় — তাকেই তুমি ব্রহ্ম বলে জানো; মানুষ যা উপাসনা করে তা (ব্রহ্ম) নয়।", "meaning_en": "That which one does not breathe with the breath, but by which breath is drawn — know that alone as Brahman, not this that people worship here."}]}]}]}, {"id": "yajurveda", "title": "যজুর্বেদ সংহিতা", "title_en": "Yajurveda Samhita", "title_sa": "यजुर्वेद संहिता", "description_bn": "যজুর্বেদ হলো চার বেদের দ্বিতীয়। এটি প্রধানত যজ্ঞানুষ্ঠানের মন্ত্র ও বিধি সম্বলিত। শুক্ল যজুর্বেদ (বাজসনেয়ী সংহিতা) ৪০টি অধ্যায়ে বিভক্ত; এর ৪০তম অধ্যায়টি ঈশোপনিষদ নামে সুপরিচিত।", "description_en": "The Yajurveda is the second of the four Vedas, primarily containing mantras and prose formulas for Vedic rituals. The Shukla (White) Yajurveda, also known as the Vajasaneyi Samhita, is organized in 40 chapters (adhyayas); its 40th chapter is the celebrated Isha Upanishad.", "sections": [{"title_bn": "শুক্ল যজুর্বেদ", "title_en": "Shukla Yajurveda", "num": 1, "suktas": [{"sukta_num": 1, "title_bn": "পূর্ণমদঃ শান্তি মন্ত্র (ঈশোপনিষদ আবাহন)", "title_en": "Purnamadah Shanti Mantra (Isha Upanishad Invocation)", "rishi": "দধ্যঙ্ আথর্বণ / Dadhyang Atharvana", "devata": "পরব্রহ্ম (পূর্ণতা) / Parabrahman (Wholeness)", "chanda": "অনুষ্টুপ / Anushtubh", "source": "বাজসনেয়ী সংহিতা ৪০ (শান্তিপাঠ) / Vajasaneyi Samhita 40 (Shanti Patha)", "note_en": "This is the invocation (shanti mantra) of the Isha Upanishad, the 40th and final chapter of the Shukla Yajurveda. It is one of the most celebrated verses in all of Vedic literature, expressing the concept of absolute wholeness (purna) — that Brahman is complete, the manifest world is complete, and completeness arises from completeness while remaining complete. It is recited at the beginning and end of Upanishadic study.", "note_bn": "এটি ঈশোপনিষদের আবাহন মন্ত্র (শান্তিপাঠ), শুক্ল যজুর্বেদের ৪০তম ও শেষ অধ্যায়। বৈদিক সাহিত্যের সর্বাধিক বিখ্যাত মন্ত্রগুলির অন্যতম। এটি পূর্ণতার (পূর্ণ) ধারণা প্রকাশ করে — ব্রহ্ম পূর্ণ, প্রকাশিত জগৎ পূর্ণ, পূর্ণ থেকে পূর্ণ উৎপন্ন হলেও পূর্ণই অবশিষ্ট থাকে। উপনিষদ পাঠের আরম্ভে ও সমাপ্তিতে এই মন্ত্র উচ্চারিত হয়।", "mantras": [{"num": 1, "sa_devanagari": "ॐ पूर्णमदः पूर्णमिदं पूर्णात्पूर्णमुदच्यते ।\nपूर्णस्य पूर्णमादाय पूर्णमेवावशिष्यते ॥\nॐ शान्तिः शान्तिः शान्तिः ॥", "sa_bengali": "ওঁ পূর্ণমদঃ পূর্ণমিদং পূর্ণাৎপূর্ণমুদচ্যতে ।\nপূর্ণস্য পূর্ণমাদায় পূর্ণমেবাবশিষ্যতে ॥\nওঁ শান্তিঃ শান্তিঃ শান্তিঃ ॥", "transliteration": "oṁ pūrṇam adaḥ pūrṇam idaṁ pūrṇāt pūrṇam udacyate |\npūrṇasya pūrṇam ādāya pūrṇam evāvaśiṣyate ||\noṁ śāntiḥ śāntiḥ śāntiḥ ||", "meaning_bn": "ওঁ। ওটা (পরব্রহ্ম) পূর্ণ, এটা (দৃশ্যমান জগৎ) পূর্ণ। পূর্ণ থেকে পূর্ণ উৎপন্ন হয়। পূর্ণ থেকে পূর্ণ গ্রহণ করলেও পূর্ণই অবশিষ্ট থাকে। ওঁ শান্তি শান্তি শান্তি।", "meaning_en": "Om. That (Brahman, the invisible) is whole; this (the visible universe) is whole. From wholeness emerges wholeness. When wholeness is taken from wholeness, wholeness alone remains. Om, peace, peace, peace."}]}, {"sukta_num": 2, "title_bn": "ঈশোপনিষদ (মূল মন্ত্রসমূহ)", "title_en": "Isha Upanishad (Core Verses)", "rishi": "দধ্যঙ্ আথর্বণ / Dadhyang Atharvana", "devata": "আত্মবিদ্যা / Atmavidya (Self-knowledge)", "chanda": "অনুষ্টুপ ও জগতী / Anushtubh and Jagati", "source": "বাজসনেয়ী সংহিতা ৪০.১–৮ / Vajasaneyi Samhita 40.1–8", "note_en": "The Isha Upanishad (Ishavasyopanishad) is the 40th chapter of the Vajasaneyi Samhita. It is the shortest major Upanishad, with only 18 verses, yet it is considered one of the most profound. The name comes from its opening word 'isha' (the Lord). Mahatma Gandhi regarded it as encapsulating the essence of Hinduism. These opening verses establish the core teaching: renunciation amid engagement with the world, and seeing the Self in all beings.", "note_bn": "ঈশোপনিষদ (ঈশাবাস্যোপনিষদ) বাজসনেয়ী সংহিতার ৪০তম অধ্যায়। মাত্র ১৮টি মন্ত্রে রচিত এই ক্ষুদ্রতম প্রধান উপনিষদটি গভীরতম দার্শনিক গ্রন্থগুলির অন্যতম। এর নাম প্রথম শব্দ 'ঈশ' (ঈশ্বর) থেকে এসেছে। মহাত্মা গান্ধী এটিকে হিন্দুধর্মের সারসংক্ষেপ বলে মনে করতেন। এই প্রারম্ভিক মন্ত্রগুলিতে মূল শিক্ষা প্রতিষ্ঠিত: জগতে নিযুক্ত থেকেও বৈরাগ্য, এবং সমস্ত প্রাণীর মধ্যে আত্মদর্শন।", "mantras": [{"num": 1, "sa_devanagari": "ॐ ईशा वास्यमिदं सर्वं यत्किञ्च जगत्यां जगत् ।\nतेन त्यक्तेन भुञ्जीथा मा गृधः कस्यस्विद्धनम् ॥", "sa_bengali": "ওঁ ঈশা বাস্যমিদং সর্বং যৎকিঞ্চ জগত্যাং জগৎ ।\nতেন ত্যক্তেন ভুঞ্জীথা মা গৃধঃ কস্যস্বিদ্ধনম্ ॥", "transliteration": "oṁ īśā vāsyam idaṁ sarvaṁ yat kiñca jagatyāṁ jagat |\ntena tyaktena bhuñjīthā mā gṛdhaḥ kasya svid dhanam ||", "meaning_bn": "ওঁ। এই জগতে যা কিছু আছে, সমস্তই ঈশ্বর দ্বারা আচ্ছাদিত (ব্যাপ্ত)। ত্যাগের মাধ্যমে ভোগ কর। কারো ধনে লোভ করো না।", "meaning_en": "Om. All this — whatever moves in this moving world — is pervaded by the Lord. Enjoy through renunciation; do not covet, for whose is wealth?"}, {"num": 2, "sa_devanagari": "कुर्वन्नेवेह कर्माणि जिजीविषेच्छतं समाः ।\nएवं त्वयि नान्यथेतोऽस्ति न कर्म लिप्यते नरे ॥", "sa_bengali": "কুর্বন্নেবেহ কর্মাণি জিজীবিষেচ্ছতং সমাঃ ।\nএবং ত্বয়ি নান্যথেতোঽস্তি ন কর্ম লিপ্যতে নরে ॥", "transliteration": "kurvan neveha karmāṇi jijīviṣec chataṁ samāḥ |\nevaṁ tvayi nānyatheto 'sti na karma lipyate nare ||", "meaning_bn": "এই জগতে কর্ম করতে করতে শত বৎসর বাঁচতে ইচ্ছা করবে। এই পথেই (ত্যাগভাবে কর্ম করলে) তোমার প্রতি কর্ম লিপ্ত হয় না — এ ছাড়া অন্য কোনো উপায় নেই।", "meaning_en": "By performing actions here, one should wish to live a hundred years. For a person such as you, there is no other way than this — action does not cling to one (who acts without attachment)."}, {"num": 3, "sa_devanagari": "असुर्या नाम ते लोका अन्धेन तमसावृताः ।\nतांस्ते प्रेत्याभिगच्छन्ति ये के चात्महनो जनाः ॥", "sa_bengali": "অসুর্যা নাম তে লোকা অন্ধেন তমসাবৃতাঃ ।\nতাংস্তে প্রেত্যাভিগচ্ছন্তি যে কে চাত্মহনো জনাঃ ॥", "transliteration": "asuryā nāma te lokā andhena tamasāvṛtāḥ |\ntāṁs te pretyābhigacchanti ye ke cātmahano janāḥ ||", "meaning_bn": "অসুর্য (সূর্যবিহীন) নামক সেই লোকগুলি ঘন অন্ধকারে আবৃত। যারা আত্মহন্তা (আত্মজ্ঞানের বিনাশকারী) তারা দেহত্যাগের পর সেই লোকে গমন করে।", "meaning_en": "Sunless are those worlds, enveloped in blinding darkness. Those who are slayers of the Self (who deny their true nature) go to those worlds after departing from here."}, {"num": 4, "sa_devanagari": "अनेजदेकं मनसो जवीयो नैनद्देवा आप्नुवन्पूर्वमर्षत् ।\nतद्धावतोऽन्यानत्येति तिष्ठत्तस्मिन्नपो मातरिश्वा दधाति ॥", "sa_bengali": "অনেজদেকং মনসো জবীয়ো নৈনদ্দেবা আপ্নুবন্পূর্বমর্ষৎ ।\nতদ্ধাবতোঽন্যানত্যেতি তিষ্ঠত্তস্মিন্নপো মাতরিশ্বা দধাতি ॥", "transliteration": "anejad ekaṁ manaso javīyo nainad devā āpnuvan pūrvam arṣat |\ntad dhāvato 'nyān atyeti tiṣṭhat tasmin napo mātariśvā dadhāti ||", "meaning_bn": "সেই এক (আত্মা) অচঞ্চল, কিন্তু মনের চেয়ে দ্রুতগামী। দেবতারাও তাঁকে প্রাপ্ত হতে পারলেন না — তিনি সবার আগে গমন করেন। তিনি স্থির থেকেও দ্রুতগামীদের অতিক্রম করেন। তাঁর মধ্যে মাতরিশ্বা (বায়ু) সমস্ত কর্ম ধারণ করে।", "meaning_en": "That One is motionless, yet swifter than the mind. The gods could not reach It, for It moves ahead of all. Standing still, It outstrips those who run. In It, Matarishvan (the cosmic breath) sustains all activity."}, {"num": 5, "sa_devanagari": "तदेजति तन्नैजति तद्दूरे तद्वन्तिके ।\nतदन्तरस्य सर्वस्य तदु सर्वस्यास्य बाह्यतः ॥", "sa_bengali": "তদেজতি তন্নৈজতি তদ্দূরে তদ্বন্তিকে ।\nতদন্তরস্য সর্বস্য তদু সর্বস্যাস্য বাহ্যতঃ ॥", "transliteration": "tad ejati tan naijati tad dūre tad v antike |\ntad antar asya sarvasya tad u sarvasyāsya bāhyataḥ ||", "meaning_bn": "সেটি চলে, সেটি চলে না। সেটি দূরে, সেটি নিকটে। সেটি এই সমস্তের অভ্যন্তরে, সেটি আবার এই সমস্তের বাহিরে।", "meaning_en": "It moves and It moves not. It is far and It is near. It is within all this, and It is also outside all this."}, {"num": 6, "sa_devanagari": "यस्तु सर्वाणि भूतान्यात्मन्येवानुपश्यति ।\nसर्वभूतेषु चात्मानं ततो न विजुगुप्सते ॥", "sa_bengali": "যস্তু সর্বাণি ভূতান্যাত্মন্যেবানুপশ্যতি ।\nসর্বভূতেষু চাত্মানং ততো ন বিজুগুপ্সতে ॥", "transliteration": "yas tu sarvāṇi bhūtāny ātmany evānupaśyati |\nsarvabhūteṣu cātmānaṁ tato na vijugupsate ||", "meaning_bn": "যিনি সমস্ত ভূত (প্রাণী) কে আত্মাতেই দর্শন করেন এবং সমস্ত ভূতে আত্মাকে দর্শন করেন, তিনি আর কাউকে ঘৃণা করেন না।", "meaning_en": "He who sees all beings in the Self alone, and the Self in all beings, does not feel hatred toward anyone."}, {"num": 7, "sa_devanagari": "यस्मिन्सर्वाणि भूतान्यात्मैवाभूद्विजानतः ।\nतत्र को मोहः कः शोक एकत्वमनुपश्यतः ॥", "sa_bengali": "যস্মিন্সর্বাণি ভূতান্যাত্মৈবাভূদ্বিজানতঃ ।\nতত্র কো মোহঃ কঃ শোক একত্বমনুপশ্যতঃ ॥", "transliteration": "yasmin sarvāṇi bhūtāny ātmaivābhūd vijānataḥ |\ntatra ko mohaḥ kaḥ śoka ekatvam anupaśyataḥ ||", "meaning_bn": "যিনি জানেন যে সমস্ত ভূতই আত্মা হয়ে গেছে, সেই একত্ব-দর্শনকারী জ্ঞানীর মোহ কোথায়? শোক কোথায়?", "meaning_en": "When, to the knower, all beings have become one with his own Self, then what delusion, what sorrow can afflict him who sees oneness everywhere?"}, {"num": 8, "sa_devanagari": "स पर्यगाच्छुक्रमकायमव्रणमस्नाविरं शुद्धमपापविद्धम् ।\nकविर्मनीषी परिभूः स्वयम्भूर्याथातथ्यतोऽर्थान्व्यदधाच्छाश्वतीभ्यः समाभ्यः ॥", "sa_bengali": "স পর্যগাচ্ছুক্রমকায়মব্রণমস্নাবিরং শুদ্ধমপাপবিদ্ধম্ ।\nকবির্মনীষী পরিভূঃ স্বয়ম্ভূর্যাথাতথ্যতোঽর্থান্ব্যদধাচ্ছাশ্বতীভ্যঃ সমাভ্যঃ ॥", "transliteration": "sa paryagāc chukram akāyam avraṇam asnāviraṁ śuddham apāpaviddham |\nkavir manīṣī paribhūḥ svayambhūr yāthātathyato 'rthān vyadadhāc chāśvatībhyaḥ samābhyaḥ ||", "meaning_bn": "তিনি সর্বব্যাপী, শুভ্র (জ্যোতির্ময়), শরীরবিহীন, ক্ষতবিহীন, স্নায়ুবিহীন (অশরীরী), শুদ্ধ, পাপ দ্বারা অবিদ্ধ। তিনি কবি (সর্বদ্রষ্টা), মনীষী (মেধাবী), সর্বোপরি স্থিত, স্বয়ম্ভূ — তিনিই অনাদিকাল থেকে সমস্ত বস্তুকে যথাযথরূপে বিধান করেছেন।", "meaning_en": "He pervades all — radiant, bodiless, without scar, without sinews, pure, untouched by evil. He is the Seer, the Thinker, the All-pervading, the Self-existent; He has duly assigned their respective duties to the eternal years."}]}, {"sukta_num": 3, "title_bn": "শিবসঙ্কল্প সূক্ত", "title_en": "Shiva Sankalpa Sukta (Hymn of Noble Resolve)", "rishi": "মেধাতিথি কাণ্ব / Medhatithi Kanva", "devata": "মনস্ (মন) / Manas (Mind)", "chanda": "জগতী / Jagati", "source": "বাজসনেয়ী সংহিতা ৩৪.১–৬ / Vajasaneyi Samhita 34.1–6", "note_en": "The Shiva Sankalpa Sukta is a hymn of six verses from the Shukla Yajurveda (Vajasaneyi Samhita 34.1-6) dedicated to the mind (manas). Each verse ends with the refrain 'tan me manaḥ śivasaṅkalpam astu' — 'may my mind be of noble resolve.' It is one of the earliest known hymns exploring the nature of consciousness, describing the mind as the faculty that travels far in waking and sleep, as the inner light of beings, and as the charioteer of the senses. The word 'shiva' here means 'auspicious' or 'noble.'", "note_bn": "শিবসঙ্কল্প সূক্ত শুক্ল যজুর্বেদের (বাজসনেয়ী সংহিতা ৩৪.১-৬) ছয়টি মন্ত্রের একটি সূক্ত, যা মনকে (মনস্) উদ্দেশ্য করে রচিত। প্রতিটি মন্ত্র 'তন্মে মনঃ শিবসঙ্কল্পমস্তু' — 'আমার মন শুভসঙ্কল্পযুক্ত হোক' — এই ধ্রুবপদে সমাপ্ত হয়। চেতনার প্রকৃতি অনুসন্ধানকারী প্রাচীনতম সূক্তগুলির অন্যতম। এতে মনকে জাগ্রত ও স্বপ্নে দূরগামী, প্রাণীদের অন্তর্জ্যোতি এবং ইন্দ্রিয়সমূহের সারথি রূপে বর্ণনা করা হয়েছে। এখানে 'শিব' শব্দের অর্থ 'মঙ্গলকর' বা 'কল্যাণকর'।", "mantras": [{"num": 1, "sa_devanagari": "यज्जाग्रतो दूरमुदैति दैवं तदु सुप्तस्य तथैवैति ।\nदूरङ्गमं ज्योतिषां ज्योतिरेकं तन्मे मनः शिवसङ्कल्पमस्तु ॥", "sa_bengali": "যজ্জাগ্রতো দূরমুদৈতি দৈবং তদু সুপ্তস্য তথৈবৈতি ।\nদূরঙ্গমং জ্যোতিষাং জ্যোতিরেকং তন্মে মনঃ শিবসঙ্কল্পমস্তু ॥", "transliteration": "yaj jāgrato dūram udaiti daivaṁ tad u suptasya tathaivāiti |\ndūraṅgamaṁ jyotiṣāṁ jyotir ekaṁ tan me manaḥ śivasaṅkalpam astu ||", "meaning_bn": "জাগ্রত অবস্থায় যে (মন) দিব্যরূপে দূরে গমন করে, নিদ্রিত অবস্থাতেও সেই একইভাবে গমন করে — যে দূরগামী, জ্যোতিসমূহের একমাত্র জ্যোতি — আমার সেই মন শুভসঙ্কল্পযুক্ত হোক।", "meaning_en": "That divine faculty which wanders far when one is awake, and likewise travels far when one is asleep — that far-reaching one, the one light of all lights — may my mind be of noble resolve."}, {"num": 2, "sa_devanagari": "येन कर्माण्यपसो मनीषिणो यज्ञे कृण्वन्ति विदथेषु धीराः ।\nयदपूर्वं यक्षमन्तः प्रजानां तन्मे मनः शिवसङ्कल्पमस्तु ॥", "sa_bengali": "যেন কর্মাণ্যপসো মনীষিণো যজ্ঞে কৃণ্বন্তি বিদথেষু ধীরাঃ ।\nযদপূর্বং যক্ষমন্তঃ প্রজানাং তন্মে মনঃ শিবসঙ্কল্পমস্তু ॥", "transliteration": "yena karmāṇy apaso manīṣiṇo yajñe kṛṇvanti vidatheṣu dhīrāḥ |\nyad apūrvaṁ yakṣam antaḥ prajānāṁ tan me manaḥ śivasaṅkalpam astu ||", "meaning_bn": "যার সাহায্যে কর্মনিপুণ মনীষীরা যজ্ঞে ও বিদ্যাসভায় ধীরভাবে কর্ম সম্পাদন করেন — যে অপূর্ব রহস্যরূপ সত্তা প্রাণীদের অন্তরে বিরাজ করে — আমার সেই মন শুভসঙ্কল্পযুক্ত হোক।", "meaning_en": "That by which the wise and diligent perform their works in sacrifice and in the assemblies of knowledge — that wondrous being dwelling within all creatures — may my mind be of noble resolve."}, {"num": 3, "sa_devanagari": "यत्प्रज्ञानमुत चेतो धृतिश्च यज्ज्योतिरन्तरमृतं प्रजासु ।\nयस्मान्न ऋते किञ्चन कर्म क्रियते तन्मे मनः शिवसङ्कल्पमस्तु ॥", "sa_bengali": "যৎপ্রজ্ঞানমুত চেতো ধৃতিশ্চ যজ্জ্যোতিরন্তরমৃতং প্রজাসু ।\nযস্মান্ন ঋতে কিঞ্চন কর্ম ক্রিয়তে তন্মে মনঃ শিবসঙ্কল্পমস্তু ॥", "transliteration": "yat prajñānam uta ceto dhṛtiś ca yaj jyotir antaram amṛtaṁ prajāsu |\nyasmān na ṛte kiñcana karma kriyate tan me manaḥ śivasaṅkalpam astu ||", "meaning_bn": "যা প্রজ্ঞান, চেতনা ও ধৃতি (ধৈর্য) — যা প্রাণীদের অন্তরে অমৃতরূপ জ্যোতি — যাকে ছাড়া কোনো কর্মই সম্পাদিত হয় না — আমার সেই মন শুভসঙ্কল্পযুক্ত হোক।", "meaning_en": "That which is wisdom, consciousness, and steadfastness — that immortal light within all beings — without which no action whatsoever is performed — may my mind be of noble resolve."}, {"num": 4, "sa_devanagari": "येनेदं भूतं भुवनं भविष्यत्परिगृहीतममृतेन सर्वम् ।\nयेन यज्ञस्तायते सप्तहोता तन्मे मनः शिवसङ्कल्पमस्तु ॥", "sa_bengali": "যেনেদং ভূতং ভুবনং ভবিষ্যৎপরিগৃহীতমমৃতেন সর্বম্ ।\nযেন যজ্ঞস্তায়তে সপ্তহোতা তন্মে মনঃ শিবসঙ্কল্পমস্তু ॥", "transliteration": "yenedaṁ bhūtaṁ bhuvanaṁ bhaviṣyat parigṛhītam amṛtena sarvam |\nyena yajñas tāyate saptahotā tan me manaḥ śivasaṅkalpam astu ||", "meaning_bn": "যার দ্বারা অতীত, বর্তমান ভুবন ও ভবিষ্যৎ — সমস্তই অমৃতরূপে পরিগ্রহ করা হয়েছে — যার দ্বারা সপ্তহোতা বিশিষ্ট যজ্ঞ বিস্তৃত হয় — আমার সেই মন শুভসঙ্কল্পযুক্ত হোক।", "meaning_en": "That by which the past, the present world, and the future are all encompassed as the immortal — by which the sevenfold sacrifice is extended — may my mind be of noble resolve."}, {"num": 5, "sa_devanagari": "यस्मिन्नृचः साम यजूंषि यस्मिन्प्रतिष्ठिता रथनाभाविवाराः ।\nयस्मिंश्चित्तं सर्वमोतं प्रजानां तन्मे मनः शिवसङ्कल्पमस्तु ॥", "sa_bengali": "যস্মিন্নৃচঃ সাম যজূংষি যস্মিন্প্রতিষ্ঠিতা রথনাভাবিবারাঃ ।\nযস্মিংশ্চিত্তং সর্বমোতং প্রজানাং তন্মে মনঃ শিবসঙ্কল্পমস্তু ॥", "transliteration": "yasminn ṛcaḥ sāma yajūṁṣi yasmin pratiṣṭhitā rathanābhāv ivārāḥ |\nyasmiṁś cittaṁ sarvam otaṁ prajānāṁ tan me manaḥ śivasaṅkalpam astu ||", "meaning_bn": "যার মধ্যে ঋক্, সাম ও যজুর্মন্ত্রসমূহ প্রতিষ্ঠিত — যেমন রথের নাভিতে অরাগুলি প্রতিষ্ঠিত — যার মধ্যে সমস্ত প্রাণীর চিত্ত ওতপ্রোত — আমার সেই মন শুভসঙ্কল্পযুক্ত হোক।", "meaning_en": "That in which the Rik, Saman, and Yajus verses are fixed, like spokes in the hub of a wheel — in which is woven the consciousness of all beings — may my mind be of noble resolve."}, {"num": 6, "sa_devanagari": "सुषारथिरश्वानिव यन्मनुष्यान्नेनीयतेऽभीशुभिर्वाजिन इव ।\nहृत्प्रतिष्ठं यदजिरं जविष्ठं तन्मे मनः शिवसङ्कल्पमस्तु ॥", "sa_bengali": "সুষারথিরশ্বানিব যন্মনুষ্যান্নেনীয়তেঽভীশুভির্বাজিন ইব ।\nহৃৎপ্রতিষ্ঠং যদজিরং জবিষ্ঠং তন্মে মনঃ শিবসঙ্কল্পমস্তু ॥", "transliteration": "suṣārathir aśvān iva yan manuṣyān nenīyate 'bhīśubhir vājina iva |\nhṛtpratiṣṭhaṁ yad ajiraṁ javiṣṭhaṁ tan me manaḥ śivasaṅkalpam astu ||", "meaning_bn": "দক্ষ সারথি যেমন লাগাম দিয়ে অশ্বদের নিয়ন্ত্রণ করেন, তেমনি যা মানুষকে (ইন্দ্রিয়সমূহের মাধ্যমে) পরিচালনা করে — যে বেগবান অশ্বের ন্যায় — হৃদয়ে প্রতিষ্ঠিত, চঞ্চল ও দ্রুততম — আমার সেই মন শুভসঙ্কল্পযুক্ত হোক।", "meaning_en": "That which, like a skilled charioteer controlling horses with reins, guides human beings — that which is seated in the heart, swift-moving and swiftest of all — may my mind be of noble resolve."}]}]}]}, {"id": "atharvaveda", "title": "অথর্ববেদ সংহিতা", "title_en": "Atharvaveda Samhita", "title_sa": "अथर्ववेद संहिता", "description_bn": "অথর্ববেদ চতুর্বেদের চতুর্থ বেদ। এতে ৭৩০টি সূক্তে প্রায় ৬,০০০ মন্ত্র রয়েছে, বিশটি কাণ্ডে বিভক্ত। এই বেদে দৈনন্দিন জীবনের প্রার্থনা, রোগমুক্তি, শান্তি, পৃথিবীর স্তুতি এবং দার্শনিক চিন্তার অপূর্ব সমন্বয় রয়েছে।", "description_en": "The Atharvaveda is the fourth of the four Vedas. It contains approximately 6,000 mantras in 730 hymns, divided into 20 books (kandas). This Veda uniquely combines prayers for daily life, healing, peace, praise of the Earth, and profound philosophical speculation.", "sections": [{"title_bn": "দ্বাদশ কাণ্ড", "title_en": "Twelfth Kanda", "num": 12, "suktas": [{"sukta_num": 1, "title_bn": "পৃথিবী সূক্ত (ভূমি সূক্ত)", "title_en": "Prithivi Sukta (Bhumi Sukta) — Hymn to the Earth", "rishi": "অথর্বা / Atharvan", "devata": "ভূমি (পৃথিবী) / Bhumi (Prithivi)", "chanda": "অনুষ্টুপ ও ত্রিষ্টুপ / Anushtubh and Trishtubh", "note_en": "The Prithivi Sukta (also called Bhumi Sukta) of Atharvaveda 12.1 is one of the most celebrated hymns in all of Vedic literature. With 63 verses, it is the longest single hymn devoted to the Earth in any ancient scripture. It extols the Earth as mother, sustainer, and sacred ground of all life. These selected verses represent the most famous and frequently cited portions.", "note_bn": "অথর্ববেদ ১২.১-এর পৃথিবী সূক্ত (ভূমি সূক্ত) সমগ্র বৈদিক সাহিত্যের অন্যতম বিখ্যাত স্তোত্র। ৬৩টি মন্ত্রে রচিত এটি প্রাচীন বিশ্বের পৃথিবীর প্রতি নিবেদিত দীর্ঘতম সূক্ত। পৃথিবীকে মাতা, পালনকর্ত্রী এবং সমস্ত জীবনের পবিত্র ভূমি রূপে স্তুতি করা হয়েছে। এখানে সর্বাধিক বিখ্যাত ও বহুল উদ্ধৃত মন্ত্রগুলি নির্বাচিত হয়েছে।", "mantras": [{"num": 1, "sa_devanagari": "सत्यं बृहद्ऋतमुग्रं दीक्षा तपो ब्रह्म यज्ञः पृथिवीं धारयन्ति ।\nसा नो भूतस्य भव्यस्य पत्न्युरुं लोकं पृथिवी नः कृणोतु ॥", "sa_bengali": "সত্যং বৃহদৃতমুগ্রং দীক্ষা তপো ব্রহ্ম যজ্ঞঃ পৃথিবীং ধারয়ন্তি ।\nসা নো ভূতস্য ভব্যস্য পত্ন্যুরুং লোকং পৃথিবী নঃ কৃণোতু ॥", "transliteration": "satyaṁ bṛhad ṛtam ugraṁ dīkṣā tapo brahma yajñaḥ pṛthivīṁ dhārayanti |\nsā no bhūtasya bhavyasya patny uruṁ lokaṁ pṛthivī naḥ kṛṇotu ||", "meaning_bn": "সত্য, মহান ঋত (বিশ্বনিয়ম), তীব্র দীক্ষা, তপস্যা, ব্রহ্ম এবং যজ্ঞ — এরাই পৃথিবীকে ধারণ করে। সেই পৃথিবী, যিনি অতীত ও ভবিষ্যতের পত্নী, তিনি আমাদের জন্য প্রশস্ত লোক (স্থান) প্রদান করুন।", "meaning_en": "Truth, the great cosmic order, consecration, austerity, prayer, and sacrifice sustain the Earth. May she, the mistress of what has been and what shall be, make wide space for us."}, {"num": 2, "sa_devanagari": "असंबाधं मध्यतो मानवानां यस्या उद्वतः प्रवतः समं बहु ।\nनानावीर्या ओषधीर्या बिभर्ति पृथिवी नः प्रथतां राध्यतां नः ॥", "sa_bengali": "অসংবাধং মধ্যতো মানবানাং যস্যা উদ্বতঃ প্রবতঃ সমং বহু ।\nনানাবীর্যা ওষধীর্যা বিভর্তি পৃথিবী নঃ প্রথতাং রাধ্যতাং নঃ ॥", "transliteration": "asaṁbādhaṁ madhyato mānavānāṁ yasyā udvataḥ pravataḥ samaṁ bahu |\nnānāvīryā oṣadhīr yā bibharti pṛthivī naḥ prathatāṁ rādhyatāṁ naḥ ||", "meaning_bn": "যিনি মানবদের মধ্যে অবাধ বিস্তৃত, যাঁর উচ্চভূমি, নিম্নভূমি ও সমতলভূমি প্রচুর, যিনি নানা শক্তিসম্পন্ন ওষধি ধারণ করেন — সেই পৃথিবী আমাদের জন্য প্রসারিত হোন, আমাদের সমৃদ্ধ করুন।", "meaning_en": "Unconfined in the midst of men, she who has many heights, slopes, and plains, who bears plants of manifold potency — may that Earth spread wide for us and be bountiful."}, {"num": 3, "sa_devanagari": "यस्यां समुद्र उत सिन्धुरापो यस्यामन्नं कृष्टयः सम्बभूवुः ।\nयस्यामिदं जिन्वति प्राणदेजत् सा नो भूमिः पूर्वपेये दधातु ॥", "sa_bengali": "যস্যাং সমুদ্র উত সিন্ধুরাপো যস্যামন্নং কৃষ্টয়ঃ সম্বভূবুঃ ।\nযস্যামিদং জিন
