// ===== PAGINATION =====
function paginateContent() {
  pages = [];

  // Page 0: Cover
  pages.push({
    type: 'cover',
    html: `<div class="cover-page">
      <div class="cover-ornament">&#10070;</div>
      <div class="cover-title">The Prophet</div>
      <div class="cover-author">Kahlil Gibran</div>
      <div class="cover-ornament" style="margin-top:32px;margin-bottom:0">&#10070;</div>
      <div class="cover-year" style="margin-top:12px">1923</div>
    </div>`
  });

  // Page 1: TOC — pre-calculate chapter start pages
  const chapterStartPages = [];
  let pageOffset = 2; // cover + toc
  CHAPTERS.forEach(ch => {
    chapterStartPages.push(pageOffset);
    pageOffset += splitChapterIntoPages(ch).length;
  });

  let tocHtml = '<div class="toc-page"><div class="toc-heading">Contents</div><ul class="toc-list">';
  CHAPTERS.forEach((ch, i) => {
    tocHtml += `<li onclick="goToPage(${chapterStartPages[i]})">`
      + `<span>${ch.title}</span>`
      + `<span class="toc-pnum">${chapterStartPages[i] + 1}</span></li>`;
  });
  tocHtml += '</ul></div>';
  pages.push({ type: 'toc', html: tocHtml });

  // Content pages
  CHAPTERS.forEach((ch, i) => {
    const chPages = splitChapterIntoPages(ch);
    chPages.forEach((html, j) => {
      pages.push({
        type: 'content',
        chapter: i,
        chapterPage: j,
        chapterTitle: ch.title,
        chapterNum: ch.num,
        isChapterStart: j === 0,
        html: html
      });
    });
  });
}

function splitChapterIntoPages(chapter) {
  const tmp = document.createElement('div');
  tmp.innerHTML = chapter.html;
  const stanzas = Array.from(tmp.children); // these are .stanza divs

  const result = [];
  const isFirst = true;

  // First page header (always present for chapter start)
  const headerHtml = `<div class="ch-label">The Prophet</div><div class="ch-title">${chapter.title}</div>`;
  const headerLines = 5; // approximate lines consumed by header

  let currentPageContent = headerHtml;
  let lineEstimate = headerLines;
  const linesPerPage = getEffectiveLinesPerPage();
  let isFirstPage = true;

  stanzas.forEach(stanza => {
    const paras = stanza.querySelectorAll('p');
    const stanzaLines = Array.from(paras).reduce((sum, p) => {
      return sum + Math.ceil(p.textContent.length / getCharsPerLine()) + 1;
    }, 0) + 1; // +1 for stanza spacing

    // If this stanza won't fit, flush current page
    if (!isFirstPage && lineEstimate + stanzaLines > linesPerPage && lineEstimate > headerLines) {
      result.push(currentPageContent);
      currentPageContent = '';
      lineEstimate = 0;
    } else if (isFirstPage && lineEstimate + stanzaLines > linesPerPage) {
      result.push(currentPageContent);
      currentPageContent = '';
      lineEstimate = 0;
      isFirstPage = false;
    }

    currentPageContent += stanza.outerHTML;
    lineEstimate += stanzaLines;
    isFirstPage = false;
  });

  if (currentPageContent) result.push(currentPageContent);
  return result.length ? result : [headerHtml];
}

function getCharsPerLine() {
  // ~60 chars per line at 560px, 17px EB Garamond; adjust for zoom
  return Math.round(55 * (100 / zoomLevel));
}

function getEffectiveLinesPerPage() {
  // At 100% zoom, page ~900px tall, padding ~96px, content ~800px / (17*2) ≈ 23 lines
  return Math.round(22 * (100 / zoomLevel));
}

// ===== RENDERING =====
function renderPage() {
  const page = pages[currentPage];
  if (!page) return;

  const inner = document.getElementById('pageInner');

  if (page.type === 'cover') {
    inner.innerHTML = page.html;
  } else if (page.type === 'toc') {
    inner.innerHTML = page.html;
  } else {
    // Wrap content in a scrollable area + page number footer
    inner.innerHTML = `<div class="content-area">${page.html}</div>`
      + `<div class="page-num-footer">${currentPage + 1}</div>`;
  }

  // Update toolbar
  document.getElementById('pageInput').value = currentPage + 1;
  document.getElementById('pageTotal').textContent = `/ ${pages.length}`;

  // Update chapter select
  if (page.chapter !== undefined) {
    document.getElementById('chapterSelect').value = page.chapter;
  } else {
    document.getElementById('chapterSelect').value = '';
  }

  // Prev/next button state
  document.getElementById('prevBtn').disabled = currentPage === 0;
  document.getElementById('nextBtn').disabled = currentPage === pages.length - 1;

  // Sidebar highlight
  document.querySelectorAll('.thumb').forEach((t, i) => {
    t.classList.toggle('current', i === currentPage);
  });
  const currentThumb = document.querySelector('.thumb.current');
  if (currentThumb) {
    currentThumb.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
  }
}

function renderSidebar() {
  const sidebar = document.getElementById('sidebar');
  sidebar.innerHTML = '';
  pages.forEach((page, i) => {
    const wrapper = document.createElement('div');

    const thumb = document.createElement('div');
    thumb.className = 'thumb' + (i === currentPage ? ' current' : '');
    thumb.onclick = () => goToPage(i);

    let label = '';
    if (page.type === 'cover') {
      thumb.textContent = '◆';
      label = 'Cover';
    } else if (page.type === 'toc') {
      thumb.textContent = '≡';
      label = 'Contents';
    } else {
      thumb.textContent = i + 1;
      if (page.isChapterStart) {
        label = page.chapterNum <= 9 ? page.chapterTitle.substring(0, 16) : page.chapterTitle.substring(0, 14);
      }
    }

    wrapper.appendChild(thumb);
    if (label) {
      const lbl = document.createElement('div');
      lbl.className = 'thumb-label';
      lbl.textContent = label;
      wrapper.appendChild(lbl);
    }
    sidebar.appendChild(wrapper);
  });
}

function populateChapterSelect() {
  const sel = document.getElementById('chapterSelect');
  sel.innerHTML = '<option value="">— Chapter —</option>';
  CHAPTERS.forEach((ch, i) => {
    const opt = document.createElement('option');
    opt.value = i;
    opt.textContent = `${ch.num}. ${ch.title}`;
    sel.appendChild(opt);
  });
}

// ===== PAGE SIZING =====
function resizePageCard() {
  const vp = document.getElementById('viewport');
  const card = document.getElementById('pageCard');
  const vpH = vp.clientHeight - 28;
  const vpW = vp.clientWidth - 28;

  // US Letter ratio 8.5:11
  const ratio = 8.5 / 11;
  let h = vpH;
  let w = h * ratio;
  if (w > vpW) { w = vpW; h = w / ratio; }
  if (w > 760) { w = 760; h = w / ratio; }

  card.style.width = w + 'px';
  card.style.height = h + 'px';
}

// ===== NAVIGATION =====
function goToPage(n) {
  if (n < 0) n = 0;
  if (n >= pages.length) n = pages.length - 1;
  currentPage = n;
  renderPage();
}

function nextPage() { if (currentPage < pages.length - 1) goToPage(currentPage + 1); }
function prevPage() { if (currentPage > 0) goToPage(currentPage - 1); }

function goToChapter(chapterIndex) {
  const idx = pages.findIndex(p => p.chapter === chapterIndex && p.isChapterStart);
  if (idx >= 0) goToPage(idx);
}

// ===== ZOOM =====
const ZOOM_LEVELS = [75, 100, 125, 150];
function setZoom(level) {
  const body = document.body;
  ZOOM_LEVELS.forEach(z => body.classList.remove('zoom-' + z));
  zoomLevel = level;
  body.classList.add('zoom-' + level);
  document.getElementById('zoomLabel').textContent = level + '%';

  // Re-paginate, try to stay near same chapter
  const oldChapter = pages[currentPage]?.chapter;
  const oldChapterPage = pages[currentPage]?.chapterPage || 0;
  paginateContent();
  renderSidebar();

  if (oldChapter !== undefined) {
    let idx = pages.findIndex(p => p.chapter === oldChapter && p.chapterPage === oldChapterPage);
    if (idx < 0) idx = pages.findIndex(p => p.chapter === oldChapter && p.isChapterStart);
    if (idx >= 0) currentPage = idx;
  }
  renderPage();
}

// ===== THEME =====
function setTheme(theme) {
  currentTheme = theme;
  document.body.setAttribute('data-theme', theme);
  document.querySelectorAll('.theme-dot').forEach(d => {
    d.classList.toggle('active', d.getAttribute('data-t') === theme);
  });
  localStorage.setItem('prophet-pdf-theme', theme);
}

// ===== SIDEBAR =====
function toggleSidebar() {
  sidebarOpen = !sidebarOpen;
  document.getElementById('sidebar').classList.toggle('open', sidebarOpen);
  document.getElementById('viewport').classList.toggle('sidebar-open', sidebarOpen);
  document.getElementById('sidebarToggle').classList.toggle('active', sidebarOpen);
  document.getElementById('sidebar-overlay').classList.toggle('open', sidebarOpen);
  setTimeout(resizePageCard, 220);
}
function closeSidebar() {
  if (!sidebarOpen) return;
  toggleSidebar();
}

// ===== INIT =====
function init() {
  // Restore theme preference
  const savedTheme = localStorage.getItem('prophet-pdf-theme');
  if (savedTheme) setTheme(savedTheme);

  populateChapterSelect();
  document.body.classList.add('zoom-100');
  paginateContent();
  renderSidebar();
  resizePageCard();
  renderPage();

  // Toolbar events
  document.getElementById('sidebarToggle').onclick = toggleSidebar;
  document.getElementById('prevBtn').onclick = prevPage;
  document.getElementById('nextBtn').onclick = nextPage;
  document.getElementById('navLeft').onclick = prevPage;
  document.getElementById('navRight').onclick = nextPage;

  document.getElementById('zoomIn').onclick = () => {
    const i = ZOOM_LEVELS.indexOf(zoomLevel);
    if (i < ZOOM_LEVELS.length - 1) setZoom(ZOOM_LEVELS[i + 1]);
  };
  document.getElementById('zoomOut').onclick = () => {
    const i = ZOOM_LEVELS.indexOf(zoomLevel);
    if (i > 0) setZoom(ZOOM_LEVELS[i - 1]);
  };

  document.getElementById('chapterSelect').onchange = function() {
    if (this.value !== '') goToChapter(parseInt(this.value));
  };

  document.getElementById('pageInput').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') {
      const n = parseInt(this.value);
      if (!isNaN(n) && n >= 1 && n <= pages.length) goToPage(n - 1);
      else renderPage();
      this.blur();
    }
    if (e.key === 'Escape') { renderPage(); this.blur(); }
  });

  // Theme dots
  document.querySelectorAll('.theme-dot').forEach(dot => {
    dot.onclick = () => setTheme(dot.getAttribute('data-t'));
  });

  // Sidebar overlay
  document.getElementById('sidebar-overlay').addEventListener('click', closeSidebar);

  // Keyboard navigation
  document.addEventListener('keydown', function(e) {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
    switch (e.key) {
      case 'ArrowRight': case 'ArrowDown': case 'j': case 'PageDown':
        nextPage(); e.preventDefault(); break;
      case 'ArrowLeft': case 'ArrowUp': case 'k': case 'PageUp':
        prevPage(); e.preventDefault(); break;
      case 'Home': goToPage(0); e.preventDefault(); break;
      case 'End': goToPage(pages.length - 1); e.preventDefault(); break;
    }
  });

  // Mouse wheel on page card
  document.getElementById('pageCard').addEventListener('wheel', function(e) {
    e.preventDefault();
    if (e.deltaY > 0) nextPage();
    else if (e.deltaY < 0) prevPage();
  }, { passive: false });

  // Touch swipe
  let touchX = 0, touchY = 0;
  document.getElementById('viewport').addEventListener('touchstart', e => {
    touchX = e.touches[0].clientX;
    touchY = e.touches[0].clientY;
  }, { passive: true });
  document.getElementById('viewport').addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - touchX;
    const dy = e.changedTouches[0].clientY - touchY;
    if (Math.abs(dx) > 50 && Math.abs(dx) > Math.abs(dy) * 2) {
      if (dx < 0) nextPage(); else prevPage();
    }
  });

  // Resize
  window.addEventListener('resize', resizePageCard);
}

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
