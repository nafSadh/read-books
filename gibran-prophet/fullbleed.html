  const controlsReserve = (vw <= 768) ? 64 : 0;
  // Safety margin to prevent edge-case clipping
  const safetyMargin = 12;
  const availableHeight = vh - padTop - padBottom - pageNumReserve - controlsReserve - safetyMargin;

  // Set measure box width to match actual content width
  const contentWidth = (vw <= 768)
    ? (vw - padLR * 2)           // mobile: full width minus padding
    : Math.min(560, vw / 2 - padLR * 2); // desktop: max-width 560px or half-viewport minus padding
  measureBox.style.width = contentWidth + 'px';
  const pages = [];

  for (const chapter of CHAPTERS) {
    // Parse chapter HTML into a temp container
    const temp = document.createElement('div');
    temp.innerHTML = chapter.html;

    // Build chapter header
    const headerHTML =
      '<div class="chapter-header">' +
        '<div class="chapter-book-title">The Prophet</div>' +
        '<div class="chapter-num">Chapter ' + chapter.num + '</div>' +
        '<div class="chapter-title">' + chapter.title + '</div>' +
        '<div class="ornament">&mdash; &#x2766; &mdash;</div>' +
      '</div>';

    // Collect block-level children.
    // For poetry content, stanza divs are the block units (kept together).
    const blocks = [];
    for (let i = 0; i < temp.childNodes.length; i++) {
      const node = temp.childNodes[i];
      if (node.nodeType === 1) { // Element node
        blocks.push(node.outerHTML);
      } else if (node.nodeType === 3 && node.textContent.trim()) {
        blocks.push('<p>' + node.textContent + '</p>');
      }
    }

    let blockIdx = 0;
    let isFirst = true;

    while (blockIdx < blocks.length) {
      let pageHTML = '';

      // Add chapter header on first page of chapter
      if (isFirst) {
        pageHTML += headerHTML;
      }

      // Greedily add blocks until we exceed available height
      let testHTML = pageHTML;
      let lastFit = blockIdx;

      while (blockIdx < blocks.length) {
        let blockHTML = blocks[blockIdx];

        // Add drop-cap class to the very first content of the chapter
        // For stanza-based content, find the first <p> inside the first stanza
        if (isFirst && blockIdx === 0 && blockHTML.startsWith('<div class="stanza">')) {
          blockHTML = blockHTML.replace('<p>', '<p class="drop-cap">', 1);
        } else if (isFirst && blockIdx === 0 && blockHTML.startsWith('<p')) {
          blockHTML = blockHTML.replace('<p', '<p class="drop-cap"');
        }

        testHTML += blockHTML;
        measureBox.innerHTML = testHTML;

        if (measureBox.scrollHeight > availableHeight && blockIdx > lastFit) {
          // This block doesn't fit; remove it
          testHTML = testHTML.slice(0, testHTML.length - blockHTML.length);
          break;
        }
        blockIdx++;
      }

      // If we couldn't fit even one block (very tall block), force it
      if (blockIdx === lastFit) {
        let blockHTML = blocks[blockIdx];
        if (isFirst && blockIdx === 0 && blockHTML.startsWith('<div class="stanza">')) {
          blockHTML = blockHTML.replace('<p>', '<p class="drop-cap">', 1);
        } else if (isFirst && blockIdx === 0 && blockHTML.startsWith('<p')) {
          blockHTML = blockHTML.replace('<p', '<p class="drop-cap"');
        }
        testHTML = pageHTML + blockHTML;
        blockIdx++;
      }

      const isChapterEnd = (blockIdx >= blocks.length);
      pages.push({
        html: testHTML,
        chapterNum: chapter.num,
        isChapterStart: isFirst,
        isChapterEnd: isChapterEnd
      });
      isFirst = false;
    }
  }

  // Clean up
  measureBox.innerHTML = '';
  measureBox.style.width = '';
  return pages;
}

// ===================================================================
// APP STATE
// ===================================================================

let contentPages = [];  // Paginated content pages
let totalSpreads = 0;   // Total number of spreads (0=cover, 1=title, 2=TOC+p1, etc.)
let currentSpread = 0;  // Current spread index
let busy = false;        // Animation lock
let chapterStartSpreads = {}; // chapter num -> spread index

// Spread layout:
//   Spread 0 = cover
//   Spread 1 = left: blank, right: title page
//   Spread 2 = left: blank, right: TOC
//   Spread 3 = left: blank (content[-1]), right: content[0]
//   Spread 4 = left: content[1], right: content[2]
//   Spread N (N>=3) = left: content[2*N - 7], right: content[2*N - 6]

function contentIndexForSpreadLeft(s) {
  if (s < 3) return -1;
  return 2 * s - 7;
}
function contentIndexForSpreadRight(s) {
  if (s < 3) return -1;
  return 2 * s - 6;
}

// ===================================================================
// DOM REFERENCES
// ===================================================================
const leftInner = document.getElementById('left-inner');
const rightInner = document.getElementById('right-inner');
const leftPageNum = document.getElementById('left-page-num');
const rightPageNum = document.getElementById('right-page-num');
const leftHalf = document.getElementById('left-half');
const rightHalf = document.getElementById('right-half');
const coverSpread = document.getElementById('cover-spread');
const bookEl = document.getElementById('book');

// ===================================================================
// RENDER HELPERS
// ===================================================================

function getPageHTML(contentIdx) {
  if (contentIdx < 0 || contentIdx >= contentPages.length) return '';
  let html = contentPages[contentIdx].html;
  if (contentPages[contentIdx].isChapterEnd) {
    html += '<div class="end-of-chapter-ornament">&mdash; &#x2766; &mdash;</div>';
  }
  return html;
}

function applyShortPage(el, contentIdx) {
  if (contentIdx >= 0 && contentIdx < contentPages.length && contentPages[contentIdx].isChapterEnd) {
    el.classList.add('short-page');
  } else {
    el.classList.remove('short-page');
  }
}

function getPageNumber(contentIdx) {
  if (contentIdx < 0 || contentIdx >= contentPages.length) return '';
  if (contentPages[contentIdx].isBlank) return '';
  return String(contentIdx + 1);
}

/** Build the TOC page HTML */
function buildTOC() {
  let html = '<div class="toc-page"><h2>Contents</h2><ol class="toc-list">';
  for (const ch of CHAPTERS) {
    const spread = chapterStartSpreads[ch.num] || 2;
    const contentIdx = contentIndexForSpreadRight(spread);
    const pageNum = (contentIdx >= 0) ? contentIdx + 1 : '';
    html += '<li data-chapter="' + ch.num + '">' +
      '<span class="toc-num">' + ch.num + '.</span>' +
      '<span class="toc-title">' + ch.title + '</span>' +
      '<span class="toc-page-num">' + pageNum + '</span>' +
      '</li>';
  }
  html += '</ol></div>';
  return html;
}

function buildTitlePage() {
  return '<div class="title-page">' +
    '<h1>The Prophet</h1>' +
    '<div class="subtitle">Kahlil Gibran</div>' +
    '<div class="pub-ornament">&mdash; &#x2766; &mdash;</div>' +
    '<div class="pub-info">Originally published 1923</div>' +
    '</div>';
}

/** Render a spread (update left and right page content) */
function renderSpread(s) {
  const footer = document.getElementById('footer');
  if (s === 0) {
    // Cover
    coverSpread.style.display = 'flex';
    leftHalf.style.display = 'none';
    rightHalf.style.display = 'none';
    leftPageNum.textContent = '';
    rightPageNum.textContent = '';
    // Cover: show only theme picker, hide nav + scrubber
    footer.style.display = 'flex';
    document.querySelector('.footer-nav').style.display = 'none';
    document.getElementById('chapter-scrubber').style.display = 'none';
  } else if (isMobile()) {
    // Single-page mode on mobile
    coverSpread.style.display = 'none';
    leftHalf.style.display = 'none';
    rightHalf.style.display = '';
    footer.style.display = 'flex';
    document.querySelector('.footer-nav').style.display = '';
    document.getElementById('chapter-scrubber').style.display = '';

    if (s === 1) {
      rightInner.innerHTML = buildTitlePage();
      rightPageNum.textContent = '';
    } else if (s === 2) {
      rightInner.innerHTML = buildTOC();
      rightPageNum.textContent = '';
      attachTOCHandlers();
    } else {
      // Single-page: spread 3+ maps to content page s-3
      const ci = s - 3;
      rightInner.innerHTML = getPageHTML(ci);
      rightPageNum.textContent = getPageNumber(ci);
      applyShortPage(rightInner, ci);
    }
  } else {
    coverSpread.style.display = 'none';
    leftHalf.style.display = '';
    rightHalf.style.display = '';
    footer.style.display = 'flex';
    document.querySelector('.footer-nav').style.display = '';
    document.getElementById('chapter-scrubber').style.display = '';

    if (s === 1) {
      // Title spread: left blank, right title
      leftInner.innerHTML = '';
      rightInner.innerHTML = buildTitlePage();
      leftPageNum.textContent = '';
      rightPageNum.textContent = '';
    } else if (s === 2) {
      // TOC spread: blank left, TOC right
      leftInner.innerHTML = '';
      rightInner.innerHTML = buildTOC();
      leftPageNum.textContent = '';
      rightPageNum.textContent = '';
      attachTOCHandlers();
    } else {
      const li = contentIndexForSpreadLeft(s);
      const ri = contentIndexForSpreadRight(s);
      leftInner.innerHTML = getPageHTML(li);
      rightInner.innerHTML = getPageHTML(ri);
      leftPageNum.textContent = getPageNumber(li);
      rightPageNum.textContent = getPageNumber(ri);
      applyShortPage(leftInner, li);
      applyShortPage(rightInner, ri);
    }
  }

  updateIndicator();

  // Update URL hash with current page
  if (s === 0) {
    history.replaceState(null, '', location.pathname);
  } else if (s <= 2) {
    history.replaceState(null, '', '#s-' + s);
  } else {
    const ri = isMobile() ? (s - 3) : contentIndexForSpreadRight(s);
    const li = isMobile() ? -1 : contentIndexForSpreadLeft(s);
    const ci = ri >= 0 ? ri : li;
    if (ci >= 0) history.replaceState(null, '', '#p-' + (ci + 1));
    else history.replaceState(null, '', '#s-' + s);
  }
}

function computeTotalSpreads() {
  if (isMobile()) {
    // Single-page: cover(0), title(1), TOC(2), then one content page per spread
    totalSpreads = 3 + contentPages.length;
  } else {
    totalSpreads = 3 + Math.ceil((contentPages.length + 1) / 2);
  }
}

function updateIndicator() {
  const pageNumEl = document.getElementById('page-num');
  const pageTotalEl = document.getElementById('page-total');
  const rhLeft = document.getElementById('rh-left-half');
  const rhRight = document.getElementById('rh-right-half');

  // Running headers: show on content pages (spread >= 2), inside each page half
  const showHeaders = currentSpread >= 2;
  rhLeft.classList.toggle('visible', showHeaders && !isMobile());
  rhRight.classList.toggle('visible', showHeaders);

  const maxPage = contentPages.length;
  let curPage = -1;

  if (currentSpread === 0) {
    curPage = -1;
  } else if (isMobile()) {
    const ci = currentSpread - 3;
    if (ci >= 0 && ci < maxPage) curPage = ci + 1;
  } else {
    const ri = contentIndexForSpreadRight(currentSpread);
    if (ri >= 0 && ri < maxPage) {
      curPage = ri + 1;
    } else {
      const li = contentIndexForSpreadLeft(currentSpread);
      if (li >= 0) curPage = li + 1;
    }
  }

  if (curPage > 0) {
    pageNumEl.textContent = curPage;
    pageTotalEl.textContent = ' / ' + maxPage;
  } else {
    pageNumEl.textContent = '';
    pageTotalEl.textContent = '';
  }

  // Update running headers per-page
  const ch = getCurrentChapter();
  const chTitle = ch ? (CHAPTERS.find(c => c.num === ch)?.title || '') : '';

  if (isMobile()) {
    const ci = currentSpread - 3;
    const pg = (ci >= 0 && ci < contentPages.length) ? contentPages[ci] : null;
    if (pg && (pg.isBlank || pg.isChapterStart)) {
      rhRight.classList.remove('visible');
    }
    if (pg && !pg.isBlank && !pg.isChapterStart) {
      rhRight.querySelector('.rh-chapter-label').textContent = chTitle;
    }
  } else {
    const li = contentIndexForSpreadLeft(currentSpread);
    const ri = contentIndexForSpreadRight(currentSpread);
    const lpg = (li >= 0 && li < contentPages.length) ? contentPages[li] : null;
    const rpg = (ri >= 0 && ri < contentPages.length) ? contentPages[ri] : null;
    // Left half
    if (!lpg || lpg.isBlank || lpg.isChapterStart) {
      rhLeft.classList.remove('visible');
    } else {
      rhLeft.querySelector('.rh-chapter-label').textContent = chTitle;
    }
    // Right half
    if (!rpg || rpg.isBlank || rpg.isChapterStart) {
      rhRight.classList.remove('visible');
    } else {
      rhRight.querySelector('.rh-chapter-label').textContent = chTitle;
    }
  }

  document.querySelectorAll('.chapter-scrubber span').forEach(s => {
    s.classList.toggle('active', parseInt(s.dataset.chapter) === ch);
  });
}

function getCurrentChapter() {
  let idx;
  if (isMobile()) {
    idx = currentSpread - 3;
  } else {
    const ri = contentIndexForSpreadRight(currentSpread);
    const li = contentIndexForSpreadLeft(currentSpread);
    idx = ri >= 0 ? ri : li;
  }
  if (idx >= 0 && idx < contentPages.length) {
    return contentPages[idx].chapterNum;
  }
  return 0;
}

function attachTOCHandlers() {
  const items = document.querySelectorAll('.toc-list li[data-chapter]');
  items.forEach(item => {
    item.addEventListener('click', () => {
      const chNum = parseInt(item.getAttribute('data-chapter'));
      goToChapter(chNum);
    });
  });
}

// ===================================================================
// FLIP ANIMATION
// ===================================================================

const FLIP_DURATION = 700; // ms
const FLIP_EASING = 'cubic-bezier(0.4, 0.0, 0.2, 1)';

/**
 * Create a flip-face div with the given background color and inner HTML.
 */
function createFlipFace(cssClass, bgColor, innerHTML, shadowSide) {
  const face = document.createElement('div');
  face.className = 'flip-face ' + cssClass;
  face.style.background = bgColor;

  // Content container matching page layout
  const content = document.createElement('div');
  content.className = 'page-content';
  const inner = document.createElement('div');
  inner.className = 'page-inner';
  inner.innerHTML = innerHTML;
  content.appendChild(inner);
  face.appendChild(content);

  return face;
}

/**
 * Forward flip: turn current right page over to reveal next spread.
 */
function flipForward() {
  if (busy) return;
  if (currentSpread >= totalSpreads - 1) return;

  // No flip animation from cover -- just jump
  if (currentSpread === 0) {
    currentSpread = 1;
    renderSpread(currentSpread);
    return;
  }

  // Mobile: simple transition, no 3D flip
  if (isMobile()) {
    currentSpread++;
    renderSpread(currentSpread);
    return;
  }

  busy = true;
  const nextSpread = currentSpread + 1;

  // --- Content for the flip faces ---
  // Front face: current right page content
  let frontHTML, frontPageNum;
  if (currentSpread === 1) {
    frontHTML = buildTitlePage();
    frontPageNum = '';
  } else if (currentSpread === 2) {
    frontHTML = buildTOC();
    frontPageNum = '';
  } else {
    const ri = contentIndexForSpreadRight(currentSpread);
    frontHTML = getPageHTML(ri);
    frontPageNum = getPageNumber(ri);
  }

  // Back face: next spread's left page content
  let backHTML, backPageNum;
  if (nextSpread <= 2) {
    backHTML = '';
    backPageNum = '';
  } else {
    const li = contentIndexForSpreadLeft(nextSpread);
    backHTML = getPageHTML(li);
    backPageNum = getPageNumber(li);
  }

  // --- Create overlay ---
  const overlay = document.createElement('div');
  overlay.className = 'flip-overlay right-flip';

  const bgRight = getComputedStyle(document.body).getPropertyValue('--bg-right').trim();
  const bgLeft = getComputedStyle(document.body).getPropertyValue('--bg-left').trim();

  const front = createFlipFace('front', bgRight, frontHTML);
  const back = createFlipFace('back', bgLeft, backHTML);

  overlay.appendChild(front);
  overlay.appendChild(back);

  // Add overlay to book
  bookEl.appendChild(overlay);

  // While overlay covers right side, update underlying right page
  // to show the NEXT spread's right page.
  if (nextSpread === 1) {
    rightInner.innerHTML = buildTitlePage();
    rightPageNum.textContent = '';
  } else if (nextSpread === 2) {
    rightInner.innerHTML = buildTOC();
    rightPageNum.textContent = '';
  } else {
    const nri = contentIndexForSpreadRight(nextSpread);
    rightInner.innerHTML = getPageHTML(nri);
    rightPageNum.textContent = getPageNumber(nri);
  }

  // Animate
  // Force layout before starting transition
  overlay.getBoundingClientRect();

  overlay.style.transition = 'transform ' + FLIP_DURATION + 'ms ' + FLIP_EASING;
  overlay.style.transform = 'rotateY(-180deg)';

  // After animation completes
  setTimeout(() => {
    currentSpread = nextSpread;

    // Update underlying LEFT page to match overlay back face
    if (nextSpread <= 2) {
      leftInner.innerHTML = '';
      leftPageNum.textContent = '';
    } else {
      const li = contentIndexForSpreadLeft(nextSpread);
      leftInner.innerHTML = getPageHTML(li);
      leftPageNum.textContent = getPageNumber(li);
    }
    if (nextSpread === 2) attachTOCHandlers();

    // Brief delay to ensure paint, then remove overlay
    setTimeout(() => {
      overlay.remove();
      updateIndicator();
      busy = false;
    }, 20);
  }, FLIP_DURATION);
}

/**
 * Backward flip: turn current left page back to reveal previous spread.
 */
function flipBackward() {
  if (busy) return;
  if (currentSpread <= 0) return;

  // Jump to cover without animation
  if (currentSpread === 1) {
    currentSpread = 0;
    renderSpread(currentSpread);
    return;
  }

  // Mobile: simple transition, no 3D flip
  if (isMobile()) {
    currentSpread--;
    renderSpread(currentSpread);
    return;
  }

  busy = true;
  const prevSpread = currentSpread - 1;

  // --- Content for the flip faces ---
  // Front face: current left page content
  let frontHTML;
  if (currentSpread <= 2) {
    frontHTML = ''; // spreads 1-2 have blank left
  } else {
    const li = contentIndexForSpreadLeft(currentSpread);
    frontHTML = getPageHTML(li);
  }

  // Back face: previous spread's right page content
  let backHTML;
  if (prevSpread === 1) {
    backHTML = buildTitlePage();
  } else if (prevSpread === 2) {
    backHTML = buildTOC();
  } else {
    const ri = contentIndexForSpreadRight(prevSpread);
    backHTML = getPageHTML(ri);
  }

  // --- Create overlay ---
  const overlay = document.createElement('div');
  overlay.className = 'flip-overlay left-flip';

  const bgLeft = getComputedStyle(document.body).getPropertyValue('--bg-left').trim();
  const bgRight = getComputedStyle(document.body).getPropertyValue('--bg-right').trim();

  const front = createFlipFace('front', bgLeft, frontHTML);
  const back = createFlipFace('back', bgRight, backHTML);

  overlay.appendChild(front);
  overlay.appendChild(back);

  bookEl.appendChild(overlay);

  // While overlay covers left side, update underlying left page
  // to show the PREVIOUS spread's left page.
  if (prevSpread <= 2) {
    leftInner.innerHTML = '';
    leftPageNum.textContent = '';
  } else {
    const pli = contentIndexForSpreadLeft(prevSpread);
    leftInner.innerHTML = getPageHTML(pli);
    leftPageNum.textContent = getPageNumber(pli);
  }

  // Force layout
  overlay.getBoundingClientRect();

  overlay.style.transition = 'transform ' + FLIP_DURATION + 'ms ' + FLIP_EASING;
  overlay.style.transform = 'rotateY(180deg)';

  // After animation completes
  setTimeout(() => {
    currentSpread = prevSpread;

    // Update underlying RIGHT page to match overlay back face
    if (prevSpread === 1) {
      rightInner.innerHTML = buildTitlePage();
      rightPageNum.textContent = '';
    } else if (prevSpread === 2) {
      rightInner.innerHTML = buildTOC();
      rightPageNum.textContent = '';
      attachTOCHandlers();
    } else {
      const ri = contentIndexForSpreadRight(prevSpread);
      rightInner.innerHTML = getPageHTML(ri);
      rightPageNum.textContent = getPageNumber(ri);
    }

    setTimeout(() => {
      overlay.remove();
      updateIndicator();
      busy = false;
    }, 20);
  }, FLIP_DURATION);
}

// ===================================================================
// NAVIGATION
// ===================================================================

function goToChapter(chNum) {
  if (busy) return;
  if (isMobile()) {
    // In mobile single-page mode, find the first content page for this chapter
    for (let i = 0; i < contentPages.length; i++) {
      if (contentPages[i].chapterNum === chNum && contentPages[i].isChapterStart) {
        currentSpread = i + 3; // content page i maps to spread i+3
        renderSpread(currentSpread);
        return;
      }
    }
  } else {
    const spread = chapterStartSpreads[chNum];
    if (spread !== undefined) {
      currentSpread = spread;
      renderSpread(currentSpread);
    }
  }
}

// ===================================================================
// THEME
// ===================================================================

function isMobile() {
  return window.innerWidth <= 768;
}

const THEME_ORDER = ['sepia','light-azure','light-purple','dark-violet','dark-blue'];

function setTheme(name) {
  document.documentElement.setAttribute('data-theme', name);
  // Update active dot
  document.querySelectorAll('.theme-dot').forEach(d => {
    d.classList.toggle('active', d.dataset.theme === name);
  });
  try { localStorage.setItem('prophet-fullbleed-prefs', name); } catch(e) {}
}

function cycleTheme() {
  const cur = document.documentElement.getAttribute('data-theme') || 'light-purple';
  const idx = THEME_ORDER.indexOf(cur);
  setTheme(THEME_ORDER[(idx + 1) % THEME_ORDER.length]);
}

// ===================================================================
// INITIALIZATION
// ===================================================================

function ensureRectoChapterStarts(pages) {
  // Insert blank pages so every chapter start lands on an even index (right/recto page).
  // Index 0 = right (spread 3). Even indices = right, odd = left.
  const result = [];
  for (let i = 0; i < pages.length; i++) {
    if (pages[i].isChapterStart && result.length > 0 && result.length % 2 !== 0) {
      // Would land on odd index (left/verso) -- insert a blank page
      result.push({ html: '', chapterNum: pages[i].chapterNum, isChapterStart: false, isChapterEnd: false, isBlank: true });
    }
    result.push(pages[i]);
  }
  return result;
}

function init() {
  // 1. Paginate
  contentPages = paginateAll();
  // 1b. Ensure chapters start on recto (right) pages
  if (!isMobile()) {
    contentPages = ensureRectoChapterStarts(contentPages);
  }

  // 2. Compute total spreads (adapts to mobile single-page mode)
  computeTotalSpreads();

  // 3. Build chapter -> spread mapping
  // contentIndexForSpreadRight(s) = 2s - 6, so s = (i + 6) / 2 for right side
  // contentIndexForSpreadLeft(s) = 2s - 7, so s = (i + 7) / 2 for left side
  for (let i = 0; i < contentPages.length; i++) {
    const pg = contentPages[i];
    if (pg.isChapterStart && !(pg.chapterNum in chapterStartSpreads)) {
      const spreadForRight = Math.ceil((i + 6) / 2);
      const spreadForLeft = Math.ceil((i + 7) / 2);
      if (contentIndexForSpreadRight(spreadForRight) === i) {
        chapterStartSpreads[pg.chapterNum] = spreadForRight;
      } else {
        chapterStartSpreads[pg.chapterNum] = spreadForLeft;
      }
    }
  }

  // 4. Build chapter scrubber (Arabic numbers 1-28)
  const scrubber = document.getElementById('chapter-scrubber');
  CHAPTERS.forEach((ch, i) => {
    const s = document.createElement('span');
    s.textContent = ch.num;
    s.dataset.chapter = ch.num;
    s.dataset.title = ch.title;
    s.addEventListener('click', () => goToChapter(ch.num));
    scrubber.appendChild(s);
  });

  // 5. Render initial spread (cover, or restore from hash)
  currentSpread = 0;
  if (location.hash) {
    const h = location.hash.replace('#', '');
    const pm = h.match(/^p-(\d+)$/);
    const sm = h.match(/^s-(\d+)$/);
    if (pm) {
      const ci = parseInt(pm[1]) - 1;
      if (ci >= 0 && ci < contentPages.length) {
        if (isMobile()) { currentSpread = ci + 3; }
        else if (ci === 0) { currentSpread = 3; }
        else { currentSpread = 3 + Math.floor((ci + 1) / 2); }
      }
    } else if (sm) {
      currentSpread = Math.min(parseInt(sm[1]), totalSpreads - 1);
    }
  }
  renderSpread(currentSpread);

  // 6. Event listeners
  document.getElementById('btn-prev').addEventListener('click', flipBackward);
  document.getElementById('btn-next').addEventListener('click', flipForward);
  document.getElementById('click-left').addEventListener('click', flipBackward);
  document.getElementById('click-right').addEventListener('click', flipForward);

  coverSpread.addEventListener('click', () => {
    if (currentSpread === 0) {
      currentSpread = 1;
      renderSpread(1);
    }
  });

  document.getElementById('theme-btn').addEventListener('click', cycleTheme);
  // Theme dots
  document.querySelectorAll('.theme-dot').forEach(d => {
    d.addEventListener('click', () => setTheme(d.dataset.theme));
  });

  // Editable page number -- click the number to edit, / total stays
  function initPageNumClick() {
    const el = document.getElementById('page-num');
    if (!el) return;
    el.addEventListener('click', function handler() {
      const maxPage = contentPages.length;
      const cur = el.textContent.trim();
      if (!cur) return;
      const input = document.createElement('input');
      input.id = 'page-num-input';
      input.type = 'text';
      input.value = cur;
      input.setAttribute('maxlength', '4');
      el.replaceWith(input);
      input.focus();
      input.select();
      let done = false;
      function commit() {
        if (done) return; done = true;
        const val = parseInt(input.value);
        const span = document.createElement('span');
        span.id = 'page-num';
        input.replaceWith(span);
        if (val >= 1 && val <= maxPage) {
          const ci = val - 1;
          if (isMobile()) { currentSpread = ci + 3; }
          else if (ci === 0) { currentSpread = 2; }
          else { currentSpread = 3 + Math.floor((ci - 1) / 2); }
          renderSpread(currentSpread);
        } else { updateIndicator(); }
        initPageNumClick();
      }
      input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') { e.preventDefault(); commit(); }
        if (e.key === 'Escape') { e.preventDefault(); input.value = cur; commit(); }
      });
      input.addEventListener('blur', commit);
    });
  }
  initPageNumClick();

  document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowRight' || e.key === ' ') {
      e.preventDefault();
      flipForward();
    } else if (e.key === 'ArrowLeft') {
      e.preventDefault();
      flipBackward();
    }
  });

  // Touch swipe
  let touchX = 0, touchY = 0;
  document.addEventListener('touchstart', (e) => {
    touchX = e.touches[0].clientX;
    touchY = e.touches[0].clientY;
  }, { passive: false });
  document.addEventListener('touchend', (e) => {
    const dx = e.changedTouches[0].clientX - touchX;
    const dy = e.changedTouches[0].clientY - touchY;
    if (Math.abs(dx) > 50 && Math.abs(dx) > Math.abs(dy) * 2) {
      e.preventDefault();
      if (dx < 0) flipForward();
      else flipBackward();
    }
  });

  // Load saved theme
  try {
    const saved = localStorage.getItem('prophet-fullbleed-prefs');
    if (saved && THEME_ORDER.includes(saved)) setTheme(saved);
  } catch(e) {}

  // Resize: repaginate and recompute
  let resizeTimer;
  window.addEventListener('resize', () => {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(() => {
      contentPages = paginateAll();
      if (!isMobile()) contentPages = ensureRectoChapterStarts(contentPages);
      computeTotalSpreads();
      if (currentSpread >= totalSpreads) currentSpread = totalSpreads - 1;
      renderSpread(currentSpread);
    }, 250);
  });
}

// Run after fonts load for accurate pagination
if (document.fonts && document.fonts.ready) {
  document.fonts.ready.then(init);
} else {
  window.addEventListener('load', init);
}
</script>
</body>
