<!DOCTYPE html>
<html lang="en" data-theme="light-purple">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Prophet &mdash; Full-Bleed Book Reader</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Jost:wght@300;400;500&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ===== RESET & BASE ===== */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100vw; height: 100vh; overflow: hidden; }
body { font-family: 'EB Garamond', 'Georgia', serif; font-size: 17px; line-height: 1.65; background: var(--bg-right); }

/* ===== THEME VARIABLES ===== */
html[data-theme="sepia"] {
  --bg-left: #ede5d0; --bg-right: #f5efe0;
  --text: #3a2e1e; --text-muted: #7a6a52;
  --spine: #c8b898; --shadow-left: rgba(0,0,0,0.06); --shadow-right: rgba(0,0,0,0.04);
  --accent: #b45309; --border: #d4c8a8;
  --control-bg: rgba(245,239,224,0.92); --control-border: rgba(0,0,0,0.06);
  --drop-cap-color: #b45309; --ch-title: #3a2e1e;
}
html[data-theme="light-azure"] {
  --bg-left: #eaf2f8; --bg-right: #f0f6fb;
  --text: #1e2a3a; --text-muted: #6a7a8a;
  --spine: #c8d8e8; --shadow-left: rgba(0,0,0,0.06); --shadow-right: rgba(0,0,0,0.04);
  --accent: #2a7ab8; --border: #c8d8e8;
  --control-bg: rgba(234,242,248,0.92); --control-border: rgba(0,0,0,0.08);
  --drop-cap-color: #2a7ab8; --ch-title: #0a2a4a;
}
html[data-theme="light-purple"] {
  --bg-left: #f0ece4; --bg-right: #f6f4f0;
  --text: #1e2a3a; --text-muted: #6a7a8a;
  --spine: #d0d4da; --shadow-left: rgba(0,0,0,0.06); --shadow-right: rgba(0,0,0,0.04);
  --accent: #7c3aed; --border: #d0d4da;
  --control-bg: rgba(240,236,228,0.92); --control-border: rgba(0,0,0,0.08);
  --drop-cap-color: #7c3aed; --ch-title: #2a1a4a;
}
html[data-theme="dark-violet"] {
  --bg-left: #181818; --bg-right: #1a1a1a;
  --text: #dce0ec; --text-muted: #8490aa;
  --spine: #333; --shadow-left: rgba(0,0,0,0.3); --shadow-right: rgba(0,0,0,0.2);
  --accent: #9b7aed; --border: #333;
  --control-bg: rgba(26,26,26,0.95); --control-border: rgba(255,255,255,0.08);
  --drop-cap-color: #b598ff; --ch-title: #dce0ec;
}
html[data-theme="dark-blue"] {
  --bg-left: #0c1018; --bg-right: #10141e;
  --text: #9aa8b8; --text-muted: #4a5a6a;
  --spine: #1a2838; --shadow-left: rgba(0,0,0,0.3); --shadow-right: rgba(0,0,0,0.2);
  --accent: #4a8acc; --border: #1a2838;
  --control-bg: rgba(12,16,24,0.92); --control-border: rgba(26,40,56,0.5);
  --drop-cap-color: #4a8acc; --ch-title: #88b0d8;
}

/* ===== BOOK SPREAD ===== */
#book {
  width: 100vw; height: 100vh;
  display: flex; position: relative;
  perspective: 1800px;
  user-select: none; -webkit-user-select: none;
}
.page-half {
  width: 50%; height: 100%;
  position: relative; overflow: hidden;
  user-select: none; -webkit-user-select: none;
}
#left-half { background: var(--bg-left); }
#right-half { background: var(--bg-right); }

/* Spine line */
#book::after {
  content: ''; position: absolute;
  top: 0; bottom: 0; left: 50%;
  width: 1px; background: var(--spine);
  z-index: 5; pointer-events: none;
}

/* Inner edge shadow gradients (toward spine) */
#left-half::after {
  content: ''; position: absolute;
  top: 0; right: 0; width: 40px; height: 100%;
  background: linear-gradient(to left, var(--shadow-left), transparent);
  pointer-events: none; z-index: 2;
}
#right-half::before {
  content: ''; position: absolute;
  top: 0; left: 0; width: 40px; height: 100%;
  background: linear-gradient(to right, var(--shadow-right), transparent);
  pointer-events: none; z-index: 2;
}

/* ===== PAGE CONTENT AREA ===== */
.page-content {
  width: 100%; height: 100%;
  display: flex; flex-direction: column;
  align-items: center; justify-content: flex-start;
  padding: 48px 40px 60px;
  color: var(--text);
  position: relative;
}
.page-inner {
  max-width: 560px; width: 100%;
  flex: 1; overflow: hidden;
  text-align: left;
  hyphens: manual;
  -webkit-hyphens: manual;
}
.page-number {
  position: absolute; bottom: 24px;
  font-family: 'Jost', sans-serif;
  font-size: 13px; color: var(--accent);
  opacity: 0.35; letter-spacing: 0.5px;
}
#left-half .page-number { left: 40px; }
#right-half .page-number { right: 40px; }

/* ===== CHAPTER HEADERS ===== */
.chapter-header {
  text-align: center;
  margin-bottom: 28px;
  padding-top: 40px;
}
.chapter-header .chapter-book-title {
  font-family: 'EB Garamond', Georgia, serif;
  font-size: 11px;
  font-style: italic;
  letter-spacing: 1px;
  color: var(--accent);
  opacity: 0.4;
  margin-bottom: 28px;
}
.chapter-header .chapter-num {
  font-family: 'Jost', sans-serif;
  font-size: 12px; font-weight: 500;
  letter-spacing: 3px; text-transform: uppercase;
  color: var(--accent);
  opacity: 0.6;
  margin-bottom: 8px;
}
.chapter-header .chapter-title {
  font-size: 26px; font-weight: 600;
  line-height: 1.3; margin-bottom: 16px;
  color: var(--ch-title);
}
.chapter-header .ornament {
  display: block; text-align: center;
  color: var(--accent); opacity: 0.35;
  font-size: 18px; letter-spacing: 8px;
}

/* ===== DROP CAP ===== */
.drop-cap::first-letter {
  float: left;
  font-size: 3.5em;
  line-height: 0.8;
  padding-right: 8px;
  padding-top: 4px;
  font-weight: 600;
  color: var(--drop-cap-color);
}

/* ===== TYPOGRAPHY INSIDE PAGES (poetry) ===== */
.page-inner p { margin-bottom: 0.3em; text-indent: 0; }
.page-inner p:first-child { text-indent: 0; }
.page-inner .chapter-header + p { text-indent: 0; }
.page-inner .stanza { margin: 1.2em 0; }
.page-inner .stanza p { margin: 0 0 0.2em 0; }

/* ===== COVER ===== */
#cover-spread {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  flex-direction: column;
  background: var(--bg-right);
  color: var(--text); z-index: 10;
  text-align: center;
}
#cover-spread .cover-title {
  font-size: 48px; font-weight: 700;
  line-height: 1.2; margin-bottom: 12px;
  letter-spacing: 1px;
  color: var(--ch-title);
}
#cover-spread .cover-author {
  font-family: 'Jost', sans-serif;
  font-size: 18px; font-weight: 300;
  letter-spacing: 4px; text-transform: uppercase;
  color: var(--accent); margin-bottom: 40px;
}
#cover-spread .cover-ornament {
  font-size: 24px; letter-spacing: 12px;
  color: var(--accent); opacity: 0.35;
  margin-bottom: 40px;
}
#cover-spread .cover-hint {
  font-family: 'Jost', sans-serif;
  font-size: 13px; color: var(--text-muted);
  letter-spacing: 1px;
}

/* ===== RUNNING HEADER ===== */
.running-header {
  position: absolute;
  top: 0; left: 0; right: 0;
  display: none;
  justify-content: space-between;
  align-items: center;
  padding: 14px 0 0;
  max-width: 560px;
  margin: 0 auto;
  font-family: 'EB Garamond', Georgia, serif;
  font-size: 12px;
  color: var(--text-muted);
  opacity: 0.55;
  pointer-events: none;
}
.running-header.visible { display: flex; }
.running-header .rh-left {
  font-style: italic;
}

/* ===== TITLE PAGE ===== */
.title-page {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  height: 100%; text-align: center;
}
.title-page h1 {
  font-size: 36px; font-weight: 700;
  line-height: 1.3; margin-bottom: 16px;
}
.title-page .subtitle {
  font-family: 'Jost', sans-serif;
  font-size: 15px; font-weight: 300;
  letter-spacing: 3px; text-transform: uppercase;
  color: var(--text-muted); margin-bottom: 32px;
}
.title-page .pub-ornament {
  font-size: 20px; letter-spacing: 10px;
  color: var(--text-muted); margin-bottom: 32px;
}
.title-page .pub-info {
  font-family: 'Jost', sans-serif;
  font-size: 12px; color: var(--text-muted);
  letter-spacing: 2px; text-transform: uppercase;
}

/* ===== TOC ===== */
.toc-page { padding-top: 20px; }
.toc-page h2 {
  text-align: center; font-size: 22px;
  font-weight: 600; margin-bottom: 24px;
  letter-spacing: 1px;
  color: var(--ch-title);
}
.toc-page .toc-list { list-style: none; }
.toc-page .toc-list li {
  display: flex; justify-content: space-between;
  align-items: baseline; padding: 6px 0;
  border-bottom: 1px dotted var(--spine);
  cursor: pointer; transition: color 0.2s;
}
.toc-page .toc-list li:hover { color: var(--accent); }
.toc-page .toc-list .toc-num {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 13px; color: var(--accent); opacity: 0.55;
  min-width: 28px;
}
.toc-page .toc-list .toc-title { flex: 1; margin: 0 8px; }
.toc-page .toc-list .toc-page-num {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 13px; color: var(--accent); opacity: 0.55;
}

/* ===== FLIP OVERLAY ===== */
.flip-overlay {
  position: absolute; top: 0;
  width: 50%; height: 100%;
  transform-style: preserve-3d;
  z-index: 20;
  pointer-events: none;
}
.flip-overlay.right-flip {
  right: 0;
  transform-origin: left center;
}
.flip-overlay.left-flip {
  left: 0;
  transform-origin: right center;
}
.flip-face {
  position: absolute; inset: 0;
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
  overflow: hidden;
}
.flip-face.front { z-index: 2; }
.flip-face.back {
  transform: rotateY(180deg);
  z-index: 1;
}

/* Inner shadow on flip faces */
.flip-face::after {
  content: ''; position: absolute;
  top: 0; width: 40px; height: 100%;
  pointer-events: none; z-index: 3;
}
.right-flip .flip-face.front::after {
  left: 0;
  background: linear-gradient(to right, var(--shadow-right), transparent);
}
.right-flip .flip-face.back::after {
  right: 0;
  background: linear-gradient(to left, var(--shadow-left), transparent);
}
.left-flip .flip-face.front::after {
  right: 0;
  background: linear-gradient(to left, var(--shadow-left), transparent);
}
.left-flip .flip-face.back::after {
  left: 0;
  background: linear-gradient(to right, var(--shadow-right), transparent);
}

/* ===== FOOTER ===== */
#footer {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 16px;
  padding: 32px 24px 14px;
  font-family: 'Jost', sans-serif;
  font-size: 12px;
  color: var(--text-muted);
  z-index: 50;
  pointer-events: none;
  background: linear-gradient(to bottom, transparent 0%, var(--bg-right) 80%);
}
#footer > * { pointer-events: auto; }
.footer-nav {
  display: flex;
  align-items: center;
  gap: 8px;
}
.footer-nav button {
  background: none; border: none;
  color: var(--text-muted); cursor: pointer;
  font-size: 14px; padding: 4px 6px;
  opacity: 0.5; transition: opacity 0.2s, color 0.2s;
}
.footer-nav button:hover { opacity: 1; color: var(--accent); }
#page-num-wrap {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.5px;
}
#page-num {
  cursor: pointer;
  border-bottom: 1px dashed transparent;
  transition: border-color 0.2s;
}
#page-num:hover { border-color: var(--text-muted); }
#page-total {
  opacity: 0.5;
}
#page-num-input {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.5px;
  width: 28px;
  text-align: center;
  background: transparent;
  border: none;
  border-bottom: 1px solid var(--accent);
  color: var(--text);
  outline: none;
  padding: 0;
}
.chapter-scrubber {
  display: flex;
  gap: 4px;
  align-items: center;
}
.chapter-scrubber span {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.5px;
  cursor: pointer;
  opacity: 0.4;
  transition: opacity 0.2s, color 0.2s;
  position: relative;
}
.chapter-scrubber span:hover { opacity: 0.8; }
.chapter-scrubber span.active { opacity: 1; color: var(--accent); }
.chapter-scrubber span::after {
  content: attr(data-title);
  position: absolute;
  bottom: 100%;
  left: 50%;
  transform: translateX(-50%);
  padding: 4px 8px;
  font-family: 'EB Garamond', Georgia, serif;
  font-size: 12px;
  font-style: italic;
  white-space: nowrap;
  color: var(--text);
  background: var(--bg-right);
  border: 1px solid var(--border);
  border-radius: 4px;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.15s;
  margin-bottom: 6px;
}
.chapter-scrubber span:hover::after { opacity: 1; }

/* Theme toggle in footer */
.theme-wrap {
  position: relative;
  display: flex;
  align-items: center;
}
.theme-dots {
  position: absolute;
  bottom: 100%;
  right: 50%;
  transform: translateX(50%);
  display: flex;
  gap: 6px;
  align-items: center;
  padding-bottom: 8px;
  opacity: 0;
  pointer-events: none;
  transition: opacity .2s ease;
}
.theme-wrap:hover .theme-dots {
  opacity: 1;
  pointer-events: auto;
}
.theme-dot {
  width: 12px;
  height: 12px;
  border-radius: 50%;
  border: none;
  cursor: pointer;
  transition: transform 0.15s, box-shadow 0.15s;
  flex-shrink: 0;
}
.theme-dot:hover { transform: scale(1.25); }
.theme-dot.active { box-shadow: 0 0 0 2px var(--bg-right), 0 0 0 3.5px var(--accent); }
.theme-dot[data-theme="sepia"] { background: #d4c8a8; }
.theme-dot[data-theme="light-azure"] { background: #d4e8f7; }
.theme-dot[data-theme="light-purple"] { background: #c9b8e8; }
.theme-dot[data-theme="dark-violet"] { background: #4a3a6a; }
.theme-dot[data-theme="dark-blue"] { background: #1e2a4a; }
.theme-btn {
  background: none;
  border: none;
  color: var(--text-muted);
  cursor: pointer;
  padding: 4px;
  display: flex;
  align-items: center;
  transition: color 0.2s;
}
.theme-btn:hover { color: var(--accent); }

/* ===== CLICK ZONES ===== */
.click-zone {
  position: absolute; top: 0; width: 50%; height: 100%;
  z-index: 8; cursor: pointer;
}
#click-left { left: 0; }
#click-right { right: 0; }

/* ===== HIDDEN MEASURE DIV ===== */
#measure-box {
  position: absolute; top: -9999px; left: -9999px;
  visibility: hidden; pointer-events: none;
}
.measure-content {
  width: 560px;
  font-family: 'EB Garamond', 'Georgia', serif;
  font-size: 17px; line-height: 1.65;
  text-align: left; hyphens: manual;
  -webkit-hyphens: manual;
}
.measure-content p { margin-bottom: 0.3em; text-indent: 0; }
.measure-content p:first-child { text-indent: 0; }
.measure-content .stanza { margin: 1.2em 0; }
.measure-content .stanza p { margin: 0 0 0.2em 0; }

/* ===== SHORT PAGE (end-of-chapter) ===== */
.page-inner.short-page {
  display: flex; flex-direction: column;
  justify-content: flex-start;
}
.end-of-chapter-ornament {
  text-align: center;
  margin-top: auto;
  padding: 24px 0 12px;
  color: var(--text-muted);
  font-size: 16px;
  letter-spacing: 6px;
}

/* ===== RESPONSIVE ===== */
@media (max-width: 768px) {
  #left-half { display: none; }
  #right-half { width: 100%; }
  #book::after { display: none; }
  #right-half::before { display: none; }
  .page-content { padding: 32px 24px 52px; }
  .page-inner { max-width: 100%; }
  .running-header { padding: 10px 0 0; max-width: 100%; margin: 0 24px; font-size: 11px; }
  #cover-spread .cover-title { font-size: 32px; }
  #cover-spread .cover-author { font-size: 14px; }
  .click-zone { width: 50%; }
}
@media (max-width: 600px) {
  .page-content { padding: 24px 16px 48px; }
  .chapter-header { padding-top: 32px; }
  .chapter-header .chapter-title { font-size: 22px; }
  .running-header { padding: 8px 0 0; margin: 0 16px; font-size: 10px; }
  #cover-spread .cover-title { font-size: 26px; }
}
</style>
</head>
<body>

<!-- Book spread -->
<div id="book">
  <div id="left-half" class="page-half">
    <div class="page-content">
      <div class="running-header" id="rh-left-half">
        <span class="rh-left">The Prophet</span>
        <span class="rh-right rh-chapter-label"></span>
      </div>
      <div class="page-inner" id="left-inner"></div>
      <div class="page-number" id="left-page-num"></div>
    </div>
  </div>
  <div id="right-half" class="page-half">
    <div class="page-content">
      <div class="running-header" id="rh-right-half">
        <span class="rh-left">The Prophet</span>
        <span class="rh-right rh-chapter-label"></span>
      </div>
      <div class="page-inner" id="right-inner"></div>
      <div class="page-number" id="right-page-num"></div>
    </div>
  </div>

  <!-- Cover overlay -->
  <div id="cover-spread">
    <div class="cover-ornament">&#x2767; &#x2767; &#x2767;</div>
    <div class="cover-title">The Prophet</div>
    <div class="cover-author">Kahlil Gibran</div>
    <div class="cover-ornament">&#x2766; &#x2766; &#x2766;</div>
    <div class="cover-hint">Click anywhere to open</div>
  </div>

  <!-- Click zones (behind cover, behind flip overlay) -->
  <div id="click-left" class="click-zone"></div>
  <div id="click-right" class="click-zone"></div>
</div>

<!-- Footer -->
<div id="footer">
  <div class="footer-nav">
    <button id="btn-prev" title="Previous">&larr;</button>
    <span id="page-num-wrap"><span id="page-num"></span><span id="page-total"></span></span>
    <button id="btn-next" title="Next">&rarr;</button>
  </div>
  <div class="chapter-scrubber" id="chapter-scrubber"></div>
  <div class="theme-wrap" id="theme-wrap">
    <button class="theme-btn" id="theme-btn" title="Cycle theme">
      <svg width="16" height="16" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
        <circle cx="10" cy="10" r="4"/>
        <path d="M10 6V10H6A4 4 0 0 1 10 6z" fill="currentColor" stroke="none"/>
        <path d="M10 10V14H14A4 4 0 0 1 10 14z" fill="currentColor" stroke="none"/>
        <line x1="10" y1="2" x2="10" y2="4"/>
        <line x1="10" y1="16" x2="10" y2="18"/>
        <line x1="2" y1="10" x2="4" y2="10"/>
        <line x1="16" y1="10" x2="18" y2="10"/>
        <line x1="4.3" y1="4.3" x2="5.7" y2="5.7"/>
        <line x1="14.3" y1="14.3" x2="15.7" y2="15.7"/>
        <line x1="4.3" y1="15.7" x2="5.7" y2="14.3"/>
        <line x1="14.3" y1="5.7" x2="15.7" y2="4.3"/>
      </svg>
    </button>
    <div class="theme-dots">
      <span class="theme-dot" data-theme="sepia" title="Sepia"></span>
      <span class="theme-dot" data-theme="light-azure" title="Light Azure"></span>
      <span class="theme-dot active" data-theme="light-purple" title="Light Purple"></span>
      <span class="theme-dot" data-theme="dark-violet" title="Dark Violet"></span>
      <span class="theme-dot" data-theme="dark-blue" title="Dark Blue"></span>
    </div>
  </div>
</div>

<!-- Hidden measurement div -->
<div id="measure-box">
  <div class="measure-content" id="measure-content"></div>
</div>

<script>
// ===================================================================
