্বতি প্রাণদেজৎ সা নো ভূমিঃ পূর্বপেয়ে দধাতু ॥", "transliteration": "yasyāṁ samudra uta sindhur āpo yasyām annaṁ kṛṣṭayaḥ sambabhūvuḥ |\nyasyām idaṁ jinvati prāṇad ejat sā no bhūmiḥ pūrvapeye dadhātu ||", "meaning_bn": "যাঁর উপর সমুদ্র, নদী ও জলরাশি রয়েছে, যাঁর উপর অন্ন ও কৃষিজীবী মানুষ সৃষ্ট হয়েছে, যাঁর উপর এই প্রাণবান ও চলমান সব কিছু বিরাজ করে — সেই ভূমি আমাদের প্রথম পানীয় (জীবনের প্রথম অধিকার) প্রদান করুন।", "meaning_en": "Upon whom are the ocean, the river, and the waters, upon whom food and the ploughmen have come to be, upon whom moves all that breathes and stirs — may that Earth grant us the first draught of sustenance."}, {"num": 12, "sa_devanagari": "माता भूमिः पुत्रो अहं पृथिव्याः पर्जन्यः पिता स उ नः पिपर्तु ॥", "sa_bengali": "মাতা ভূমিঃ পুত্রো অহং পৃথিব্যাঃ পর্জন্যঃ পিতা স উ নঃ পিপর্তু ॥", "transliteration": "mātā bhūmiḥ putro ahaṁ pṛthivyāḥ parjanyaḥ pitā sa u naḥ pipartu ||", "meaning_bn": "ভূমি আমার মাতা, আমি পৃথিবীর পুত্র। পর্জন্য (মেঘ/বৃষ্টি) আমার পিতা — তিনি আমাদের রক্ষা করুন।", "meaning_en": "The Earth is my mother, I am the son of the Earth. Parjanya (the rain-cloud) is my father — may he nourish and protect us."}, {"num": 15, "sa_devanagari": "यस्यां पूर्वे पूर्वजना विचक्रिरे यस्यां देवा असुरानभ्यवर्तयन् ।\nगवामश्वानां वयसश्च विष्ठा भगं वर्चः पृथिवी नो दधातु ॥", "sa_bengali": "যস্যাং পূর্বে পূর্বজনা বিচক্রিরে যস্যাং দেবা অসুরানভ্যবর্তয়ন্ ।\nগবামশ্বানাং বয়সশ্চ বিষ্ঠা ভগং বর্চঃ পৃথিবী নো দধাতু ॥", "transliteration": "yasyāṁ pūrve pūrvajanā vicakrire yasyāṁ devā asurān abhyavartayan |\ngavām aśvānāṁ vayasaś ca viṣṭhā bhagaṁ varcaḥ pṛthivī no dadhātu ||", "meaning_bn": "যাঁর উপর পূর্বকালে পূর্বপুরুষেরা কর্ম করেছেন, যাঁর উপর দেবতারা অসুরদের পরাজিত করেছেন, যিনি গো, অশ্ব ও পক্ষীদের আশ্রয় — সেই পৃথিবী আমাদের ভাগ্য ও তেজ প্রদান করুন।", "meaning_en": "Upon whom the men of old performed their deeds, upon whom the gods overcame the demons, the abode of cattle, horses, and birds — may that Earth bestow upon us fortune and splendour."}, {"num": 16, "sa_devanagari": "विश्वम्भरा वसुधानी प्रतिष्ठा हिरण्यवक्षा जगतो निवेशनी ।\nवैश्वानरं बिभ्रती भूमिरग्निमिन्द्र ऋषभा द्रविणे नो दधातु ॥", "sa_bengali": "বিশ্বম্ভরা বসুধানী প্রতিষ্ঠা হিরণ্যবক্ষা জগতো নিবেশনী ।\nবৈশ্বানরং বিভ্রতী ভূমিরগ্নিমিন্দ্র ঋষভা দ্রবিণে নো দধাতু ॥", "transliteration": "viśvambharā vasudhānī pratiṣṭhā hiraṇyavakṣā jagato niveśanī |\nvaiśvānaraṁ bibhratī bhūmir agnim indra ṛṣabhā draviṇe no dadhātu ||", "meaning_bn": "বিশ্বধারিণী, ধনধারিণী, সকলের আশ্রয়, স্বর্ণবক্ষা, জগতের নিবাসভূমি, বৈশ্বানর অগ্নি ধারণকারিণী — সেই ভূমি, ইন্দ্রের সাথে বৃষভতুল্যা, আমাদের ধন প্রদান করুন।", "meaning_en": "She who bears all things, the treasure-holder, the firm foundation, golden-breasted, the dwelling of all life, who carries the universal fire (Vaishvanara Agni) — may that Earth, mighty as Indra, grant us wealth."}, {"num": 17, "sa_devanagari": "यां रक्षन्त्यस्वप्ना विश्वदानीं देवा भूमिं पृथिवीमप्रमादम् ।\nसा नो मधु प्रियं दुहामथो उक्षतु वर्चसा ॥", "sa_bengali": "যাং রক্ষন্ত্যস্বপ্না বিশ্বদানীং দেবা ভূমিং পৃথিবীমপ্রমাদম্ ।\nসা নো মধু প্রিয়ং দুহামথো উক্ষতু বর্চসা ॥", "transliteration": "yāṁ rakṣanty asvaprā viśvadānīṁ devā bhūmiṁ pṛthivīm apramādam |\nsā no madhu priyaṁ duhām atho ukṣatu varcasā ||", "meaning_bn": "নিদ্রাহীন দেবতারা যাঁকে সর্বদা অপ্রমত্তভাবে রক্ষা করেন, সেই সর্বদায়িনী ভূমি আমাদের জন্য প্রিয় মধু দোহন করুন এবং আমাদের তেজে সিঞ্চিত করুন।", "meaning_en": "She whom the sleepless gods protect at all times with unwearying vigilance — may that all-giving Earth yield sweet honey for us and shower us with splendour."}, {"num": 35, "sa_devanagari": "जनं बिभ्रती बहुधा विवाचसं नानाधर्माणं पृथिवी यथौकसम् ।\nसहस्रं धारा द्रविणस्य मे दुहां ध्रुवेव धेनुरनपस्फुरन्ती ॥", "sa_bengali": "জনং বিভ্রতী বহুধা বিবাচসং নানাধর্মাণং পৃথিবী যথৌকসম্ ।\nসহস্রং ধারা দ্রবিণস্য মে দুহাং ধ্রুবেব ধেনুরনপস্ফুরন্তী ॥", "transliteration": "janaṁ bibhratī bahudhā vivācasaṁ nānādharmāṇaṁ pṛthivī yathaukasam |\nsahasraṁ dhārā draviṇasya me duhāṁ dhruveva dhenur anapasphurantī ||", "meaning_bn": "বিভিন্ন ভাষাভাষী, নানা ধর্মাচরণকারী মানুষকে নিজ নিজ গৃহে যথাযোগ্যভাবে ধারণকারিণী পৃথিবী — সহস্র ধারায় ধনের ধারা আমার জন্য দোহন করুন, স্থির ধেনুর মতো অক্ষুণ্ণ থেকে।", "meaning_en": "Bearing people of many tongues, of diverse customs, as befits their dwelling — may the Earth, like a steady, unflinching cow, yield for me a thousand streams of wealth."}, {"num": 45, "sa_devanagari": "यस्यां वृक्षा वानस्पत्या ध्रुवास्तिष्ठन्ति विश्वहा ।\nपृथिवीं विश्वधायसं धृतामच्छावदामसि ॥", "sa_bengali": "যস্যাং বৃক্ষা বানস্পত্যা ধ্রুবাস্তিষ্ঠন্তি বিশ্বহা ।\nপৃথিবীং বিশ্বধায়সং ধৃতামচ্ছাবদামসি ॥", "transliteration": "yasyāṁ vṛkṣā vānaspatyā dhruvās tiṣṭhanti viśvahā |\npṛthivīṁ viśvadhāyasaṁ dhṛtām acchāvadāmasi ||", "meaning_bn": "যাঁর উপর বৃক্ষ ও বনস্পতিসমূহ চিরকাল সুদৃঢ়ভাবে দাঁড়িয়ে আছে, সেই বিশ্বপোষিণী, সুদৃঢ়া পৃথিবীকে আমরা আহ্বান করি।", "meaning_en": "Upon whom trees and forests stand firm forever — that all-sustaining, steadfast Earth, we invoke."}, {"num": 63, "sa_devanagari": "श्यामं च मे हरितं च मे भूमिः पृथिवी ददातु ।\nभूमिर्मातादितिर्नो यथा सुमनस्यमानाः ॥", "sa_bengali": "শ্যামং চ মে হরিতং চ মে ভূমিঃ পৃথিবী দদাতু ।\nভূমির্মাতাদিতির্নো যথা সুমনস্যমানাঃ ॥", "transliteration": "śyāmaṁ ca me haritaṁ ca me bhūmiḥ pṛthivī dadātu |\nbhūmir mātāditir no yathā sumanasyamānāḥ ||", "meaning_bn": "শ্যামবর্ণ ও হরিৎবর্ণ (ফসল ও সবুজ) পৃথিবী ভূমি আমাকে প্রদান করুন। ভূমি আমাদের মাতা, অদিতি — যেন আমরা সুমনা (সুখী) থাকি।", "meaning_en": "May the dark and the green — may the Earth bestow them upon me. The Earth is our mother, Aditi — may we dwell in happiness."}]}]}, {"title_bn": "ঊনবিংশ কাণ্ড", "title_en": "Nineteenth Kanda", "num": 19, "suktas": [{"sukta_num": 53, "title_bn": "কাল সূক্ত — কালের স্তুতি", "title_en": "Kala Sukta — Hymn to Time", "rishi": "অথর্বা / Atharvan", "devata": "কাল / Kala (Time)", "chanda": "অনুষ্টুপ ও ত্রিষ্টুপ / Anushtubh and Trishtubh", "note_en": "The Kala Sukta (Atharvaveda 19.53) is one of the most philosophically profound hymns of the Atharvaveda. It personifies Time (Kala) as the supreme cosmic force — the first cause from which all creation proceeds. Time is depicted as the ultimate reality that drives the sun, sustains all beings, and encompasses all worlds. This hymn profoundly influenced later Hindu and Buddhist concepts of time.", "note_bn": "কাল সূক্ত (অথর্ববেদ ১৯.৫৩) অথর্ববেদের সবচেয়ে দার্শনিকভাবে গভীর সূক্তগুলির অন্যতম। এতে কালকে (সময়কে) পরম মহাজাগতিক শক্তি রূপে মূর্ত করা হয়েছে — আদি কারণ যা থেকে সমস্ত সৃষ্টি প্রবাহিত হয়। কালকে চিত্রিত করা হয়েছে চরম সত্তা রূপে যিনি সূর্যকে চালিত করেন, সকল প্রাণী পালন করেন এবং সমস্ত লোক পরিবেষ্টন করেন। এই সূক্ত পরবর্তী হিন্দু ও বৌদ্ধ কাল-দর্শনকে গভীরভাবে প্রভাবিত করেছে।", "mantras": [{"num": 1, "sa_devanagari": "कालो अश्वो वहति सप्तरश्मिः सहस्राक्षो अजरो भूरिरेताः ।\nतमा रोहन्ति कवयो विपश्चितस्तस्य चक्रा भुवनानि विश्वा ॥", "sa_bengali": "কালো অশ্বো বহতি সপ্তরশ্মিঃ সহস্রাক্ষো অজরো ভূরিরেতাঃ ।\nতমা রোহন্তি কবয়ো বিপশ্চিতস্তস্য চক্রা ভুবনানি বিশ্বা ॥", "transliteration": "kālo aśvo vahati saptaraśmiḥ sahasrākṣo ajaro bhūriretāḥ |\ntam ā rohanti kavayo vipaścitas tasya cakrā bhuvanāni viśvā ||", "meaning_bn": "কাল হলেন সপ্তরশ্মিযুক্ত অশ্ব, সহস্রচক্ষু, অজর, বহু বীর্যবান। জ্ঞানী কবিগণ তাঁকে আরোহণ করেন; তাঁর চক্র হলো সমস্ত ভুবন।", "meaning_en": "Time is a horse with seven reins, thousand-eyed, ageless, rich in seed. The wise sages mount him — all the worlds are his wheels."}, {"num": 2, "sa_devanagari": "सप्त चक्रान्वहति कालः स एष सप्तास्य नाभीरमृतं न्वक्षः ।\nस इमा विश्वा भुवनान्यञ्जत्कालः स ईयते प्रथमो नु देवः ॥", "sa_bengali": "সপ্ত চক্রান্বহতি কালঃ স এষ সপ্তাস্য নাভীরমৃতং ন্বক্ষঃ ।\nস ইমা বিশ্বা ভুবনান্যঞ্জৎকালঃ স ঈয়তে প্রথমো নু দেবঃ ॥", "transliteration": "sapta cakrān vahati kālaḥ sa eṣa saptāsya nābhīr amṛtaṁ nv akṣaḥ |\nsa imā viśvā bhuvanāny añjat kālaḥ sa īyate prathamo nu devaḥ ||", "meaning_bn": "কাল সপ্ত চক্র বহন করেন, তাঁর সাতটি নাভি, তাঁর অক্ষ অমৃত। তিনিই এই সমস্ত ভুবনকে অভিষিক্ত (সচল) করেন — কালই প্রথম দেব, তিনি গতিশীল।", "meaning_en": "Time carries seven wheels; he has seven navels; his axle is immortality. He anoints all these worlds — Time moves forward as the first god."}, {"num": 3, "sa_devanagari": "पूर्णः कुम्भोऽधि काल आहितस्तं वै पश्यामो बहुधा नु सन्तः ।\nस इमा विश्वा भुवनानि प्रत्यङ्कालं तमाहुः परमे व्योमन् ॥", "sa_bengali": "পূর্ণঃ কুম্ভোঽধি কাল আহিতস্তং বৈ পশ্যামো বহুধা নু সন্তঃ ।\nস ইমা বিশ্বা ভুবনানি প্রত্যঙ্কালং তমাহুঃ পরমে ব্যোমন্ ॥", "transliteration": "pūrṇaḥ kumbho 'dhi kāla āhitas taṁ vai paśyāmo bahudhā nu santaḥ |\nsa imā viśvā bhuvanāni pratyaṅ kālaṁ tam āhuḥ parame vyoman ||", "meaning_bn": "কালের উপর এক পূর্ণ কুম্ভ স্থাপিত — আমরা তাঁকে বহুরূপে দেখি, যদিও তিনি এক। তিনিই এই সমস্ত ভুবনের অভিমুখে — তাঁকে পরম ব্যোমে (পরম আকাশে) কাল বলে অভিহিত করেন।", "meaning_en": "A full vessel is placed upon Time — we see him in many forms though he is one. He faces all these worlds — they call him Time in the highest heaven."}, {"num": 4, "sa_devanagari": "स एव सं भुवनान्याभरत् स एव सं भुवनानि परि ।\nपिता सन्नभवत्पुत्र एषां तस्मात्वै नान्यत्परमस्ति तेजः ॥", "sa_bengali": "স এব সং ভুবনান্যাভরৎ স এব সং ভুবনানি পরি ।\nপিতা সন্নভবৎপুত্র এষাং তস্মাৎবৈ নান্যৎপরমস্তি তেজঃ ॥", "transliteration": "sa eva saṁ bhuvanāny ābharat sa eva saṁ bhuvanāni pari |\npitā sann abhavat putra eṣāṁ tasmād vai nānyat param asti tejaḥ ||", "meaning_bn": "তিনিই সকল ভুবন একত্রিত করেছেন, তিনিই সকল ভুবন পরিবেষ্টন করেছেন। পিতা হয়েও তিনি এদের পুত্র হলেন — তাঁর চেয়ে শ্রেষ্ঠ অন্য কোনো তেজ নেই।", "meaning_en": "He indeed gathered together all the worlds, he indeed encompasses all the worlds. Being their father, he became their son — there is no other power higher than him."}, {"num": 5, "sa_devanagari": "कालो अमूं दिवमजनयत् कालः इमाः पृथिवीरुत ।\nकाले ह भूतं भव्यं चेषितं ह वि तिष्ठते ॥", "sa_bengali": "কালো অমূং দিবমজনয়ৎ কালঃ ইমাঃ পৃথিবীরুত ।\nকালে হ ভূতং ভব্যং চেষিতং হ বি তিষ্ঠতে ॥", "transliteration": "kālo amūṁ divam ajanayat kālaḥ imāḥ pṛthivīr uta |\nkāle ha bhūtaṁ bhavyaṁ ceṣitaṁ ha vi tiṣṭhate ||", "meaning_bn": "কাল সেই স্বর্গলোক সৃষ্টি করেছেন, কালই এই পৃথিবীসমূহ সৃষ্টি করেছেন। কালের মধ্যেই অতীত ও ভবিষ্যৎ, এবং যা কিছু প্রেরিত — সমস্তই বিরাজ করে।", "meaning_en": "Time generated that heaven yonder, Time also generated these earths. In Time the past and the future, and all that is set in motion, have their being."}, {"num": 6, "sa_devanagari": "कालो भूतिमसृजत कालो अग्रे प्रजापतिम् ।\nस्वयम्भूः कश्यपः कालात्तपः कालादजायत ॥", "sa_bengali": "কালো ভূতিমসৃজত কালো অগ্রে প্রজাপতিম্ ।\nস্বয়ম্ভূঃ কশ্যপঃ কালাত্তপঃ কালাদজায়ত ॥", "transliteration": "kālo bhūtim asṛjata kālo agre prajāpatim |\nsvayambhūḥ kaśyapaḥ kālāt tapaḥ kālād ajāyata ||", "meaning_bn": "কাল সমৃদ্ধি সৃষ্টি করেছেন, কালই প্রথমে প্রজাপতিকে সৃষ্টি করেছেন। স্বয়ম্ভূ কশ্যপ কাল থেকে, এবং তপস্যাও কাল থেকে জন্ম নিয়েছে।", "meaning_en": "Time created prosperity, Time in the beginning created Prajapati (the Lord of Creatures). The self-born Kashyapa was born from Time, and austerity was born from Time."}, {"num": 7, "sa_devanagari": "कालादापः समभवन् कालाद्ब्रह्म तपो दिशः ।\nकालेनोदेति सूर्यः काले नि विशते पुनः ॥", "sa_bengali": "কালাদাপঃ সমভবন্ কালাদ্ব্রহ্ম তপো দিশঃ ।\nকালেনোদেতি সূর্যঃ কালে নি বিশতে পুনঃ ॥", "transliteration": "kālād āpaḥ samabhavan kālād brahma tapo diśaḥ |\nkālenodeti sūryaḥ kāle ni viśate punaḥ ||", "meaning_bn": "কাল থেকে জল উৎপন্ন হয়েছে, কাল থেকে ব্রহ্ম, তপ ও দিকসমূহ। কালের দ্বারাই সূর্য উদিত হন, কালেই সূর্য পুনরায় অস্ত যান।", "meaning_en": "From Time the waters were born, from Time came sacred knowledge, austerity, and the directions. By Time the sun rises, and in Time he sets again."}, {"num": 8, "sa_devanagari": "कालेन वातः पवते कालेन पृथिवी मही ।\nद्यौर्महिकाले आहिता कालो ह भूतं भव्यं च ॥", "sa_bengali": "কালেন বাতঃ পবতে কালেন পৃথিবী মহী ।\nদ্যৌর্মহীকালে আহিতা কালো হ ভূতং ভব্যং চ ॥", "transliteration": "kālena vātaḥ pavate kālena pṛthivī mahī |\ndyaur mahī kāle āhitā kālo ha bhūtaṁ bhavyaṁ ca ||", "meaning_bn": "কালের দ্বারাই বায়ু প্রবাহিত হয়, কালের দ্বারাই মহীয়সী পৃথিবী বিদ্যমান। মহতী দ্যুলোক কালের মধ্যে স্থাপিত — কালই অতীত ও ভবিষ্যৎ।", "meaning_en": "By Time the wind blows, by Time the vast earth exists. The great heaven is established in Time — Time is both the past and the future."}, {"num": 9, "sa_devanagari": "कालो ह सर्वमीशते यो ह प्रजापतेः परः ।\nतस्मात्सृष्टमिदं सर्वं तस्मिन्निदं प्रतिष्ठितम् ।\nकालो ह ब्रह्म भूत्वा बिभर्ति परमेष्ठिनम् ॥", "sa_bengali": "কালো হ সর্বমীশতে যো হ প্রজাপতেঃ পরঃ ।\nতস্মাৎসৃষ্টমিদং সর্বং তস্মিন্নিদং প্রতিষ্ঠিতম্ ।\nকালো হ ব্রহ্ম ভূত্বা বিভর্তি পরমেষ্ঠিনম্ ॥", "transliteration": "kālo ha sarvam īśate yo ha prajāpateḥ paraḥ |\ntasmāt sṛṣṭam idaṁ sarvaṁ tasminn idaṁ pratiṣṭhitam |\nkālo ha brahma bhūtvā bibharti parameṣṭhinam ||", "meaning_bn": "কালই সকলের ঈশ্বর, তিনি প্রজাপতিরও ঊর্ধ্বে। তাঁর থেকেই এই সমস্ত সৃষ্ট, তাঁর মধ্যেই এই সমস্ত প্রতিষ্ঠিত। কালই ব্রহ্ম হয়ে পরমেষ্ঠীকে (সৃষ্টিকর্তাকে) ধারণ করেন।", "meaning_en": "Time rules over all — he who is beyond even Prajapati. From him all this was created, in him all this is established. Time, having become Brahman, sustains Parameshtin (the Supreme Creator)."}]}]}]}]};

  // Flatten all 4 Vedas into SUKTAS array
  for (const veda of vedas.vedas) {
    for (const section of veda.sections) {
      for (const sukta of section.suktas) {
        SUKTAS.push({
          veda_title: veda.title,
          veda_title_en: veda.title_en,
          veda_id: veda.id,
          mandala: section,
          ...sukta
        });
      }
    }
  }
})();

// ===================================================================
// PAGINATION: Build pages array
// Each mantra becomes a spread: left=Sanskrit, right=meaning
// ===================================================================
const pages = []; // Each: { type, html }
let suktaStartPages = {}; // suktaIdx -> page index

function buildPages() {
  pages.length = 0;

  SUKTAS.forEach((sukta, si) => {
    suktaStartPages[si] = pages.length;

    // First mantra gets sukta header on left page
    sukta.mantras.forEach((m, mi) => {
      const label = sukta.mandala.num + '.' + sukta.sukta_num + '.' + m.num;

      // Left page: Sanskrit text
      let leftHTML = '<div class="mantra-page">';
      if (mi === 0) {
        leftHTML += '<div class="sukta-spread-header">';
        leftHTML += '<div class="mandala-label">' + (sukta.veda_title_en || '') + ' \u2014 ' + sukta.mandala.title_en + '</div>';
        leftHTML += '<div class="sukta-title-bn">' + sukta.title_bn + '</div>';
        leftHTML += '<div class="sukta-title-en">' + sukta.title_en + '</div>';
        leftHTML += '<div class="ornament">\u2014 \u0950 \u2014</div>';
        leftHTML += '<div class="sukta-meta">';
        leftHTML += '<span class="meta-label">Rishi</span> ' + sukta.rishi;
        leftHTML += ' &nbsp;|&nbsp; <span class="meta-label">Devat\u0101</span> ' + sukta.devata;
        leftHTML += ' &nbsp;|&nbsp; <span class="meta-label">Chanda</span> ' + sukta.chanda;
        leftHTML += '</div>';
        leftHTML += '</div>';
      }
      leftHTML += '<div class="mantra-num">' + label + '</div>';
      leftHTML += '<div class="sa-bengali">' + m.sa_bengali + '</div>';
      leftHTML += '<div class="sa-devanagari">' + m.sa_devanagari + '</div>';
      leftHTML += '<div class="sa-iast">' + m.transliteration + '</div>';
      leftHTML += '</div>';

      // Right page: meanings
      let rightHTML = '<div class="meaning-page">';
      rightHTML += '<div class="mantra-num" style="opacity:0.4">' + label + '</div>';
      rightHTML += '<div class="meaning-label">\u0985\u09B0\u09CD\u09A5 (Bengali)</div>';
      rightHTML += '<div class="meaning-bn">' + m.meaning_bn + '</div>';
      rightHTML += '<div class="meaning-label">Meaning (English)</div>';
      rightHTML += '<div class="meaning-en">' + m.meaning_en + '</div>';

      // Add note on first mantra
      if (mi === 0 && sukta.note_bn) {
        rightHTML += '<div class="sukta-note">' + sukta.note_bn + '</div>';
      }
      rightHTML += '</div>';

      pages.push({ left: leftHTML, right: rightHTML, suktaIdx: si });
    });
  });
}

buildPages();

const leftInner = document.getElementById('left-inner');
const rightInner = document.getElementById('right-inner');
const leftPageNum = document.getElementById('left-page-num');
const rightPageNum = document.getElementById('right-page-num');
const leftHalf = document.getElementById('left-half');
const rightHalf = document.getElementById('right-half');
const coverSpread = document.getElementById('cover-spread');
const bookEl = document.getElementById('book');

// Spread 0 = cover, 1 = title, 2 = TOC, 3+ = content
let currentSpread = 0;
let totalSpreads = 0;
let busy = false;

function isMobile() { return window.innerWidth < 768; }

function computeTotalSpreads() {
  if (isMobile()) {
    totalSpreads = 3 + pages.length * 2; // each page has left+right as separate pages
  } else {
    totalSpreads = 3 + pages.length;
  }
}

computeTotalSpreads();

function buildTitlePage() {
  return '<div class="title-page">' +
    '<h1>\u09AC\u09C7\u09A6 \u09B8\u0982\u09B9\u09BF\u09A4\u09BE</h1>' +
    '<div class="subtitle">The Vedas</div>' +
    '<div class="pub-ornament">\u2014 \u0950 \u2014</div>' +
    '<div class="pub-info">c. 1500 \u2013 1200 BCE</div>' +
    '</div>';
}

function buildTOC() {
  let html = '<div class="toc-page"><h2>\u09B8\u09C2\u099A\u09BF\u09AA\u09A4\u09CD\u09B0 / Contents</h2><ol class="toc-list">';
  SUKTAS.forEach((s, i) => {
    const pageNum = suktaStartPages[i] !== undefined ? suktaStartPages[i] + 1 : '';
    html += '<li data-sukta="' + i + '">' +
      '<span class="toc-num">' + s.mandala.num + '.' + s.sukta_num + '</span>' +
      '<span class="toc-title">' + s.title_bn + '</span>' +
      '<span class="toc-page-num">' + pageNum + '</span>' +
      '</li>';
  });
  html += '</ol></div>';
  return html;
}

function renderSpread(s) {
  const footer = document.getElementById('footer');

  if (s === 0) {
    coverSpread.style.display = 'flex';
    leftHalf.style.display = 'none';
    rightHalf.style.display = 'none';
    footer.style.display = 'flex';
    document.querySelector('.footer-nav').style.display = 'none';
    document.getElementById('chapter-scrubber').style.display = 'none';
  } else if (isMobile()) {
    coverSpread.style.display = 'none';
    leftHalf.style.display = 'none';
    rightHalf.style.display = '';
    footer.style.display = 'flex';
    document.querySelector('.footer-nav').style.display = '';
    document.getElementById('chapter-scrubber').style.display = '';

    if (s === 1) {
      rightInner.innerHTML = buildTitlePage();
      rightPageNum.textContent = '';
    } else if (s === 2) {
      rightInner.innerHTML = buildTOC();
      rightPageNum.textContent = '';
      attachTOCHandlers();
    } else {
      // Mobile: alternate left/right pages
      const contentIdx = s - 3;
      const pageIdx = Math.floor(contentIdx / 2);
      const isLeft = contentIdx % 2 === 0;
      if (pageIdx < pages.length) {
        rightInner.innerHTML = isLeft ? pages[pageIdx].left : pages[pageIdx].right;
        rightPageNum.textContent = String(pageIdx + 1);
      }
    }
  } else {
    coverSpread.style.display = 'none';
    leftHalf.style.display = '';
    rightHalf.style.display = '';
    footer.style.display = 'flex';
    document.querySelector('.footer-nav').style.display = '';
    document.getElementById('chapter-scrubber').style.display = '';

    if (s === 1) {
      leftInner.innerHTML = '';
      rightInner.innerHTML = buildTitlePage();
      leftPageNum.textContent = '';
      rightPageNum.textContent = '';
    } else if (s === 2) {
      leftInner.innerHTML = '';
      rightInner.innerHTML = buildTOC();
      leftPageNum.textContent = '';
      rightPageNum.textContent = '';
      attachTOCHandlers();
    } else {
      const pi = s - 3;
      if (pi < pages.length) {
        leftInner.innerHTML = pages[pi].left;
        rightInner.innerHTML = pages[pi].right;
        leftPageNum.textContent = String(pi * 2 + 1);
        rightPageNum.textContent = String(pi * 2 + 2);
      } else {
        leftInner.innerHTML = '';
        rightInner.innerHTML = '<div style="text-align:center;padding-top:40%;color:var(--text-muted);font-style:italic">\u0950 \u0987\u09A4\u09BF \u0965</div>';
        leftPageNum.textContent = '';
        rightPageNum.textContent = '';
      }
    }
  }

  updateIndicator();
}

function updateIndicator() {
  const pageNumEl = document.getElementById('page-num');
  const pageTotalEl = document.getElementById('page-total');

  if (currentSpread === 0) {
    pageNumEl.textContent = '';
    pageTotalEl.textContent = '';
  } else if (currentSpread <= 2) {
    pageNumEl.textContent = '';
    pageTotalEl.textContent = '';
  } else {
    const pi = isMobile() ? Math.floor((currentSpread - 3) / 2) : currentSpread - 3;
    pageNumEl.textContent = Math.min(pi + 1, pages.length);
    pageTotalEl.textContent = ' / ' + pages.length;
  }

  // Update scrubber
  const si = getCurrentSukta();
  document.querySelectorAll('.chapter-scrubber span').forEach((s, i) => {
    s.classList.toggle('active', i === si);
  });
}

function getCurrentSukta() {
  if (currentSpread < 3) return -1;
  const pi = isMobile() ? Math.floor((currentSpread - 3) / 2) : currentSpread - 3;
  if (pi >= 0 && pi < pages.length) return pages[pi].suktaIdx;
  return -1;
}

function attachTOCHandlers() {
  document.querySelectorAll('.toc-list li[data-sukta]').forEach(item => {
    item.addEventListener('click', () => {
      const si = parseInt(item.dataset.sukta);
      const pi = suktaStartPages[si];
      if (pi !== undefined) {
        currentSpread = isMobile() ? 3 + pi * 2 : 3 + pi;
        renderSpread(currentSpread);
      }
    });
  });
}

function goNext() {
  if (busy || currentSpread >= totalSpreads - 1) return;
  currentSpread++;
  renderSpread(currentSpread);
}

function goPrev() {
  if (busy || currentSpread <= 0) return;
  currentSpread--;
  renderSpread(currentSpread);
}

// ===================================================================
// NAVIGATION
// ===================================================================
document.getElementById('next-btn').addEventListener('click', goNext);
document.getElementById('prev-btn').addEventListener('click', goPrev);

// Click zones
bookEl.addEventListener('click', (e) => {
  if (currentSpread === 0) { goNext(); return; }
  const x = e.clientX / window.innerWidth;
  if (x > 0.5) goNext(); else goPrev();
});

// Keyboard
document.addEventListener('keydown', (e) => {
  switch(e.key) {
    case 'ArrowRight': case 'ArrowDown': case ' ': case 'j':
      goNext(); e.preventDefault(); break;
    case 'ArrowLeft': case 'ArrowUp': case 'k':
      goPrev(); e.preventDefault(); break;
    case 'Home':
      currentSpread = 0; renderSpread(0); e.preventDefault(); break;
    case 'End':
      currentSpread = totalSpreads - 1; renderSpread(currentSpread); e.preventDefault(); break;
  }
});

// Touch swipe
let touchStartX = 0;
bookEl.addEventListener('touchstart', (e) => { touchStartX = e.changedTouches[0].clientX; }, { passive: true });
bookEl.addEventListener('touchend', (e) => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  if (Math.abs(dx) > 50) {
    dx < 0 ? goNext() : goPrev();
  }
}, { passive: true });

// ===================================================================
// THEME
// ===================================================================
const themes = ['sepia','light-purple','light-azure','dark-violet','dark-blue'];

document.querySelectorAll('.td').forEach(dot => {
  dot.addEventListener('click', (e) => {
    e.stopPropagation();
    setTheme(dot.dataset.theme);
  });
});

function setTheme(t) {
  document.documentElement.dataset.theme = t;
  document.querySelectorAll('.td').forEach(d => d.classList.toggle('active', d.dataset.theme === t));
  try { localStorage.setItem('vedas-fb-theme', t); } catch(e) {}
}

// ===================================================================
// CHAPTER SCRUBBER
// ===================================================================
(function buildScrubber() {
  const scrubber = document.getElementById('chapter-scrubber');
  SUKTAS.forEach((s, i) => {
    const span = document.createElement('span');
    span.textContent = s.mandala.num + '.' + s.sukta_num;
    span.dataset.title = s.title_bn;
    span.addEventListener('click', (e) => {
      e.stopPropagation();
      const pi = suktaStartPages[i];
      if (pi !== undefined) {
        currentSpread = isMobile() ? 3 + pi * 2 : 3 + pi;
        renderSpread(currentSpread);
      }
    });
    scrubber.appendChild(span);
  });
})();

// ===================================================================
// INIT
// ===================================================================
(function init() {
  try {
    const t = localStorage.getItem('vedas-fb-theme');
    if (t && themes.includes(t)) setTheme(t);
  } catch(e) {}
  renderSpread(0);

  window.addEventListener('resize', () => {
    computeTotalSpreads();
    renderSpread(currentSpread);
  });
})();
</script>
</body>
</html>
